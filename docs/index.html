                    fk = fdv if np.ndim(fdv) == 0 else fdv[k]\n                                    pk[k] += fk\n                                    _, rk = vJ(pk)\n                                    lm[\"Jac\"][:, k] = (rk - lm[\"r\"]) / fk\n                                    lm[\"col\"] += 1\n                                    if lm[\"col\"] >= np.asarray(lm[\"p\"]).size:\n                                        lm[\"sub\"] = \"trial\"; lm[\"trial\"] = 0\n                                else:                               # trial\n                                    Jc = lm[\"Jac\"]\n                                    gv = Jc.T @ lm[\"r\"]\n                                    Hm = Jc.T @ Jc\n                                    step = np.linalg.solve(\n                                        Hm + lm[\"lam\"] * np.diag(np.diag(Hm) + 1e-30),\n                                        -gv)\n                                    p_try = np.asarray(lm[\"p\"]) + step\n                                    J_try, _ = vJ(p_try)\n                                    n_lm = 2 if vjob[\"polish\"] else vs_lm\n                                    if J_try < lm[\"J\"]:\n                                        lm[\"p\"] = p_try\n                                        lm[\"lam\"] = max(lm[\"lam\"] / 3.0, 1e-8)\n                                        lm[\"it\"] += 1\n                                        lm[\"sub\"] = \"base\"\n                                        if lm[\"it\"] >= n_lm:\n                                            done = _finish_lm()\n                                    else:\n                                        lm[\"lam\"] *= 5.0\n                                        lm[\"trial\"] += 1\n                                        if lm[\"trial\"] >= 5:\n                                            done = _finish_lm()\n                            vjob[\"evals\"] += 1\n                            if not done:\n                                st.rerun()\n                        except _PendingEval:\n                            st.rerun()\n                        js_progress(done=True)\n                        lab_f = vi.hard_labels(vjob[\"seeds\"], vs_mask, h)\n                        par_f = cof.params_from_axes(vjob[\"axes\"])\n                        colat_f = np.zeros(vs_mask.shape)\n                        azim_f = np.zeros(vs_mask.shape)\n                        for _k in range(vs_g):\n                            _m = lab_f == _k\n                            colat_f[_m] = par_f[_k, 0]\n                            azim_f[_m] = par_f[_k, 1]\n                        true_ax_map = np.zeros(vs_mask.shape + (3,))\n                        for _k in range(len(axes3)):\n                            true_ax_map[labels == _k] = axes3[_k]\n                        errm = axisfield.axis_error_map(colat_f, azim_f,\n                                                        true_ax_map, vs_mask)\n                        st.session_state.vs_result = dict(\n                            labels=lab_f, axes=np.asarray(vjob[\"axes\"]),\n                            colat_deg=np.degrees(par_f[:, 0]),\n                            err=np.where(vs_mask, errm, np.nan),\n                            mean_err=float(errm[vs_mask].mean()),\n                            max_err=float(errm[vs_mask].max()),\n                            hist=list(vjob[\"hist\"]), evals=vjob[\"evals\"],\n                            secs=time.time() - vjob[\"t0\"])\n                        del st.session_state.vs_job\n\n                    vres = st.session_state.get(\"vs_result\")\n                    if vres is not None:\n                        import plotly.graph_objects as go\n                        st.success(f\"Voronoi grains recovered (geometry + axes, no \"\n                                   f\"prior) in {vres['evals']} evaluations \"\n                                   f\"({hms(vres['secs'])}): mean axis error \"\n                                   f\"{vres['mean_err']:.1f} deg, max \"\n                                   f\"{vres['max_err']:.1f} deg\")\n                        colat_t3 = np.degrees(np.arccos(np.clip(\n                            np.abs(axes3[:, 2]), 0, 1)))\n                        vca, vcb = st.columns(2)\n                        with vca:\n                            st.plotly_chart(render3d.polycrystal_figure(\n                                labels, colat_t3, h, \"True grains (colatitude)\",\n                                vmin=0, vmax=90), width=\"stretch\")\n                        with vcb:\n                            st.plotly_chart(render3d.polycrystal_figure(\n                                vres[\"labels\"], vres[\"colat_deg\"], h,\n                                \"Recovered grains (geometry + colatitude)\",\n                                vmin=0, vmax=90), width=\"stretch\")\n                        mmv = np.arange(n) * h * 1e3\n                        verr = np.nan_to_num(vres[\"err\"], nan=-1e3)\n                        zc, yc, xc = np.meshgrid(mmv, mmv, mmv, indexing=\"ij\")\n                        fe = go.Figure(go.Volume(\n                            x=xc.ravel(), y=yc.ravel(), z=zc.ravel(),\n                            value=verr.ravel(), isomin=5.0, isomax=45.0,\n                            opacity=0.15, surface_count=17, colorscale=\"Inferno\",\n                            colorbar=dict(title=\"deg\"),\n                            caps=dict(x_show=False, y_show=False, z_show=False)))\n                        fe.add_trace(go.Scatter3d(\n                            x=elem_abs[:, 0] * 1e3, y=elem_abs[:, 1] * 1e3,\n                            z=elem_abs[:, 2] * 1e3, mode=\"markers\",\n                            marker=dict(size=3, color=\"#00e5ff\"),\n                            showlegend=False, hoverinfo=\"skip\"))\n                        fe.update_layout(title=\"Axis error (only regions above 5 deg \"\n                                               \"shown; empty box = perfect)\",\n                                         height=430, margin=dict(l=0, r=0, t=40, b=0),\n                                         scene=dict(xaxis_title=\"x (mm)\",\n                                                    yaxis_title=\"y (mm)\",\n                                                    zaxis_title=\"z (mm)\"))\n                        st.plotly_chart(fe, width=\"stretch\")\n                        try:\n                            _slv = np.full(vres[\"labels\"].shape, np.nan)\n                            for _g in range(len(vres[\"colat_deg\"])):\n                                _slv[vres[\"labels\"] == _g] = vres[\"colat_deg\"][_g]\n                            live_panel(_slv[n // 2], \"Final mid-plane colatitude\")\n                        except Exception:\n                            pass\n                        fv = go.Figure(go.Scatter(y=vres[\"hist\"],\n                                                  mode=\"lines+markers\"))\n                        fv.update_yaxes(type=\"log\", title=\"misfit\")\n                        fv.update_layout(title=\"Voronoi-seed convergence (accepted \"\n                                               \"improvements)\",\n                                         xaxis_title=\"accepted update\", height=260,\n                                         margin=dict(l=10, r=10, t=40, b=10))\n                        st.plotly_chart(fv, width=\"stretch\")\n", "software/gui/hw_cosim.py": "\"\"\"Run the FPGA capture RTL on acquisition data, from the GUI.\n\nGenerates a testbench sized to the current acquisition, feeds the (quantised)\nreceived channel data through the ``rx_capture`` SystemVerilog module in Icarus\nVerilog, and returns the RTL-captured frames. This lets the GUI show the real\nFPGA capture datapath processing the simulated acquisition.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\nimport shutil\nimport subprocess\nimport tempfile\n\nimport numpy as np\n\n_TB = \"\"\"`timescale 1ns/1ps\nmodule tb_gui;\n  localparam int N_CH={n_ch};\n  localparam int DEPTH={depth};\n  localparam int SAMPLE_W=16;\n  localparam int ADDR_W=$clog2(DEPTH);\n  localparam int LEN={nt};\n  localparam int TOTAL={nt};\n  localparam int NFRAMES={n_frames};\n  logic clk=0,rst_n=0; always #5 clk=~clk;\n  logic trigger; logic [ADDR_W-1:0] acq_delay, acq_len;\n  logic adc_valid; logic signed [SAMPLE_W-1:0] adc_data [0:N_CH-1];\n  logic done; logic [ADDR_W-1:0] rd_addr; logic [$clog2(N_CH)-1:0] rd_ch;\n  logic signed [SAMPLE_W-1:0] rd_data;\n  rx_capture #(.N_CH(N_CH),.DEPTH(DEPTH),.SAMPLE_W(SAMPLE_W)) dut\n    (.clk,.rst_n,.trigger,.acq_delay,.acq_len,.adc_valid,.adc_data,.done,.rd_addr,.rd_ch,.rd_data);\n  logic signed [SAMPLE_W-1:0] smem [0:NFRAMES*N_CH*TOTAL-1];\n  integer fout,f,t,ch;\n  initial begin\n    $readmemh(\"gui_samples.hex\", smem);\n    fout=$fopen(\"gui_out.txt\",\"w\");\n    trigger=0; adc_valid=0; acq_len=LEN[ADDR_W-1:0]; acq_delay='0;\n    for(ch=0;ch<N_CH;ch++) adc_data[ch]='0;\n    repeat(3)@(posedge clk); rst_n=1; @(posedge clk);\n    for(f=0;f<NFRAMES;f++) begin\n      trigger=1; @(posedge clk); trigger=0; @(posedge clk);\n      for(t=0;t<TOTAL;t++) begin\n        adc_valid=1;\n        for(ch=0;ch<N_CH;ch++) adc_data[ch]=smem[f*N_CH*TOTAL+ch*TOTAL+t];\n        @(posedge clk);\n      end\n      adc_valid=0;\n      while(!done) @(posedge clk);\n      for(ch=0;ch<N_CH;ch++) for(t=0;t<LEN;t++) begin\n        rd_ch=ch[$clog2(N_CH)-1:0]; rd_addr=t[ADDR_W-1:0];\n        @(posedge clk); @(posedge clk); $fdisplay(fout,\"%0d\",rd_data);\n      end\n    end\n    $fclose(fout); $finish;\n  end\nendmodule\n\"\"\"\n\n\ndef _tool(name):\n    p = shutil.which(name)\n    if p:\n        return p\n    cand = os.path.join(r\"C:\\iverilog\\bin\", name + \".exe\")\n    return cand if os.path.exists(cand) else None\n\n\ndef available():\n    return _tool(\"iverilog\") is not None and _tool(\"vvp\") is not None\n\n\ndef run_rx_capture(frames_ch_t, rx_capture_sv):\n    \"\"\"frames_ch_t: (n_frames, n_ch, nt) int array -> RTL-captured (same shape).\"\"\"\n    iverilog, vvp = _tool(\"iverilog\"), _tool(\"vvp\")\n    if not iverilog or not vvp:\n        raise RuntimeError(\"Icarus Verilog (iverilog/vvp) not found\")\n\n    rx_capture_sv = os.path.abspath(rx_capture_sv)\n    n_frames, n_ch, nt = frames_ch_t.shape\n    work = tempfile.mkdtemp(prefix=\"uap_hwcosim_\")\n    with open(os.path.join(work, \"gui_samples.hex\"), \"w\") as f:\n        for fr in range(n_frames):\n            for ch in range(n_ch):\n                for t in range(nt):\n                    f.write(format(int(frames_ch_t[fr, ch, t]) & 0xFFFF, \"04x\") + \"\\n\")\n\n    with open(os.path.join(work, \"tb_gui.sv\"), \"w\") as f:\n        f.write(_TB.format(n_ch=n_ch, depth=nt, nt=nt, n_frames=n_frames))\n\n    out = os.path.join(work, \"gui.out\")\n    subprocess.run([iverilog, \"-g2012\", \"-o\", out, rx_capture_sv, \"tb_gui.sv\"],\n                   cwd=work, check=True, capture_output=True, text=True)\n    subprocess.run([vvp, out], cwd=work, check=True, capture_output=True, text=True)\n\n    vals = []\n    with open(os.path.join(work, \"gui_out.txt\")) as f:\n        for line in f:\n            if line.strip():\n                vals.append(int(line))\n    return np.array(vals, dtype=np.int64).reshape(n_frames, n_ch, nt)\n", "software/gui/webgpu_client.py": "\"\"\"Client-GPU acoustic FMC for the in-browser (stlite/Pyodide) build.\n\nRuns the acoustic full-matrix-capture forward model on the *visitor's* GPU via\nWebGPU compute shaders, orchestrated from Python through the Pyodide-JS\nbridge. WebGPU is asynchronous and the Streamlit script is synchronous, so the\nAPI is job-based: :func:`start` launches the whole FMC on the GPU and returns\nimmediately; the app polls :func:`poll` across Streamlit reruns (the worker's\nevent loop advances the GPU promises between reruns) and fetches the data with\n:func:`result` when done.\n\nThe WGSL step kernel is the exact discrete leapfrog of ringfwi.solver: the\n7-point Laplacian on interior cells only (one-cell border stays zero), source\nsample added to the Laplacian before the m-scaling, receivers recorded at each\nnew time level. float32 on the GPU; the app verifies one transmit against the\nCPU reference before accepting the data.\n\nOn desktop Python there is no ``js`` module, so :func:`available` is False and\nnothing here runs.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n_JS = r\"\"\"\nglobalThis.__OU = globalThis.__OU || { jobs: {}, device: null, pipe: null };\n\nasync function __ouDevice() {\n  if (globalThis.__OU.device) return globalThis.__OU.device;\n  const ad = await navigator.gpu.requestAdapter();\n  if (!ad) throw new Error(\"no WebGPU adapter\");\n  globalThis.__OU.device = await ad.requestDevice();\n  return globalThis.__OU.device;\n}\n\nconst __OU_WGSL = `\nstruct U {\n  nz: u32, ny: u32, nx: u32, srcLin: u32,\n  step: u32, nrx: u32, pad0: u32, pad1: u32,\n  wav: f32, invH2: f32, pad2: f32, pad3: f32,\n};\n@group(0) @binding(0) var<uniform> P: U;\n@group(0) @binding(1) var<storage, read> S: array<f32>;\n@group(0) @binding(2) var<storage, read> pPrev: array<f32>;\n@group(0) @binding(3) var<storage, read> pCur: array<f32>;\n@group(0) @binding(4) var<storage, read_write> pNew: array<f32>;\n@group(0) @binding(5) var<storage, read> recLin: array<u32>;\n@group(0) @binding(6) var<storage, read_write> rec: array<f32>;\n\n@compute @workgroup_size(64)\nfn step(@builtin(global_invocation_id) gid: vec3<u32>) {\n  let i = gid.x;\n  let nyx = P.ny * P.nx;\n  let N = P.nz * nyx;\n  if (i >= N) { return; }\n  let iz = i / nyx;\n  let rem = i % nyx;\n  let iy = rem / P.nx;\n  let ix = rem % P.nx;\n  var lap: f32 = 0.0;\n  // Interior-only stencil: the one-cell border keeps lap = 0 (matches the\n  // Python reference).\n  if (ix > 0u && ix < P.nx - 1u && iy > 0u && iy < P.ny - 1u\n      && iz > 0u && iz < P.nz - 1u) {\n    lap = -6.0 * pCur[i]\n        + pCur[i - 1u] + pCur[i + 1u]\n        + pCur[i - P.nx] + pCur[i + P.nx]\n        + pCur[i - nyx] + pCur[i + nyx];\n    lap = lap * P.invH2;\n  }\n  if (i == P.srcLin) { lap = lap + P.wav; }\n  pNew[i] = 2.0 * pCur[i] - pPrev[i] + S[i] * lap;\n}\n\n@compute @workgroup_size(64)\nfn gather(@builtin(global_invocation_id) gid: vec3<u32>) {\n  let j = gid.x;\n  if (j >= P.nrx) { return; }\n  rec[P.step * P.nrx + j] = pNew[recLin[j]];\n}\n`;\n\nglobalThis.__ouStartFmc = function (id, nz, ny, nx, nt, invH2,\n                                    sB, wavB, recLinB, srcLinB, nrx) {\n  const job = { done: false, prog: 0, total: 0, error: null, result: null };\n  globalThis.__OU.jobs[id] = job;\n  const asU8 = (b) => (b instanceof Uint8Array) ? b : new Uint8Array(b);\n  (async () => {\n    try {\n      const dev = await __ouDevice();\n      const N = nz * ny * nx;\n      const S = new Float32Array(asU8(sB).slice().buffer);\n      const wav = new Float32Array(asU8(wavB).slice().buffer);\n      const recLin = new Uint32Array(asU8(recLinB).slice().buffer);\n      const srcLin = new Uint32Array(asU8(srcLinB).slice().buffer);\n      const nTx = srcLin.length;\n      job.total = nTx;\n\n      const mk = (sz, usage) => dev.createBuffer({ size: sz, usage: usage });\n      const ST = GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST;\n      const bufS = mk(N * 4, ST);\n      dev.queue.writeBuffer(bufS, 0, S);\n      const bufRecLin = mk(Math.max(nrx, 1) * 4, ST);\n      dev.queue.writeBuffer(bufRecLin, 0, recLin);\n      const p = [mk(N * 4, ST | GPUBufferUsage.COPY_SRC),\n                 mk(N * 4, ST | GPUBufferUsage.COPY_SRC),\n                 mk(N * 4, ST | GPUBufferUsage.COPY_SRC)];\n      const bufRec = mk(nt * nrx * 4, ST | GPUBufferUsage.COPY_SRC);\n      const uStride = 256;\n      const bufU = dev.createBuffer({\n        size: nt * uStride,\n        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });\n      const staging = dev.createBuffer({\n        size: nt * nrx * 4,\n        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });\n\n      if (!globalThis.__OU.pipe) {\n        const mod = dev.createShaderModule({ code: __OU_WGSL });\n        const bgl = dev.createBindGroupLayout({ entries: [\n          { binding: 0, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"uniform\", hasDynamicOffset: true } },\n          { binding: 1, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"read-only-storage\" } },\n          { binding: 2, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"read-only-storage\" } },\n          { binding: 3, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"read-only-storage\" } },\n          { binding: 4, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"storage\" } },\n          { binding: 5, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"read-only-storage\" } },\n          { binding: 6, visibility: GPUShaderStage.COMPUTE,\n            buffer: { type: \"storage\" } },\n        ]});\n        const lay = dev.createPipelineLayout({ bindGroupLayouts: [bgl] });\n        globalThis.__OU.pipe = {\n          bgl: bgl,\n          step: dev.createComputePipeline({\n            layout: lay, compute: { module: mod, entryPoint: \"step\" } }),\n          gather: dev.createComputePipeline({\n            layout: lay, compute: { module: mod, entryPoint: \"gather\" } }),\n        };\n      }\n      const pipe = globalThis.__OU.pipe;\n\n      // Three bind groups rotate the (prev, cur, new) roles of the p buffers.\n      const bgs = [];\n      for (let r = 0; r < 3; r++) {\n        bgs.push(dev.createBindGroup({ layout: pipe.bgl, entries: [\n          { binding: 0, resource: { buffer: bufU, size: 48 } },\n          { binding: 1, resource: { buffer: bufS } },\n          { binding: 2, resource: { buffer: p[r % 3] } },\n          { binding: 3, resource: { buffer: p[(r + 1) % 3] } },\n          { binding: 4, resource: { buffer: p[(r + 2) % 3] } },\n          { binding: 5, resource: { buffer: bufRecLin } },\n          { binding: 6, resource: { buffer: bufRec } },\n        ]}));\n      }\n\n      const result = new Float32Array(nTx * nt * nrx);\n      const uData = new ArrayBuffer(nt * uStride);\n      for (let t = 0; t < nTx; t++) {\n        for (let n = 1; n < nt; n++) {\n          const dv = new DataView(uData, n * uStride, 48);\n          dv.setUint32(0, nz, true); dv.setUint32(4, ny, true);\n          dv.setUint32(8, nx, true); dv.setUint32(12, srcLin[t], true);\n          dv.setUint32(16, n, true); dv.setUint32(20, nrx, true);\n          dv.setFloat32(32, wav[n - 1], true);\n          dv.setFloat32(36, invH2, true);\n        }\n        dev.queue.writeBuffer(bufU, 0, uData);\n        const enc = dev.createCommandEncoder();\n        for (const b of p) enc.clearBuffer(b);\n        enc.clearBuffer(bufRec);\n        const pass = enc.beginComputePass();\n        const wgN = Math.ceil(N / 64), wgR = Math.ceil(nrx / 64);\n        for (let n = 1; n < nt; n++) {\n          const bg = bgs[(n - 1) % 3];\n          pass.setPipeline(pipe.step);\n          pass.setBindGroup(0, bg, [n * uStride]);\n          pass.dispatchWorkgroups(wgN);\n          pass.setPipeline(pipe.gather);\n          pass.setBindGroup(0, bg, [n * uStride]);\n          pass.dispatchWorkgroups(wgR);\n        }\n        pass.end();\n        enc.copyBufferToBuffer(bufRec, 0, staging, 0, nt * nrx * 4);\n        dev.queue.submit([enc.finish()]);\n        await staging.mapAsync(GPUMapMode.READ);\n        result.set(new Float32Array(staging.getMappedRange().slice(0)),\n                   t * nt * nrx);\n        staging.unmap();\n        job.prog = t + 1;\n        try {\n          globalThis.__ouProgChan = globalThis.__ouProgChan\n            || new BroadcastChannel('ou_progress');\n          globalThis.__ouProgChan.postMessage({\n            frac: (t + 1) / nTx,\n            text: 'Acquisition on YOUR GPU (WebGPU): transmit '\n                  + (t + 1) + '/' + nTx });\n        } catch (e) {}\n      }\n      job.result = result;\n      job.done = true;\n    } catch (e) {\n      job.error = String(e);\n      job.done = true;\n    }\n  })();\n};\n\"\"\"\n\n_loaded = False\n_counter = [0]\n\n\ndef available():\n    \"\"\"True inside a browser (Pyodide) whose runtime exposes WebGPU.\"\"\"\n    try:\n        import js\n        return getattr(js.navigator, \"gpu\", None) is not None\n    except Exception:\n        return False\n\n\ndef _js_source():\n    \"\"\"Main-thread GPU engine source (embedded in index.html at build).\"\"\"\n    return _JS\n\n\ndef _ensure_js():\n    # Jobs run on the MAIN thread (stlite parks this worker, so WebGPU\n    # promises never advance here); reuse the elastic client's bridge.\n    global _loaded\n    if not _loaded:\n        import webgpu_elastic\n        webgpu_elastic._ensure_js()\n        _loaded = True\n\n\ndef start(m, geom, wavelet, dt, h, nt, src_list):\n    \"\"\"Launch the full FMC on the client GPU; returns a job id immediately.\"\"\"\n    import js\n    from pyodide.ffi import to_js\n\n    _ensure_js()\n    m = np.asarray(m, float)\n    nz, ny, nx = m.shape\n    S = (dt * dt / m).astype(np.float32).ravel()\n\n    def lin(t):\n        return (t[0] * ny + t[1]) * nx + t[2]\n\n    rec_lin = np.array([lin(t) for t in geom.idx], dtype=np.uint32)\n    src_lin = np.array([lin(geom.element_index(s)) for s in src_list],\n                       dtype=np.uint32)\n    _counter[0] += 1\n    job_id = f\"fmc{_counter[0]}\"\n    msg = to_js(dict(\n        type=\"ac_start\", id=job_id, nz=nz, ny=ny, nx=nx, nt=int(nt),\n        invH2=float(1.0 / (h * h)), S=S.tobytes(),\n        wav=np.asarray(wavelet, np.float32).tobytes(),\n        recLin=rec_lin.tobytes(), srcLin=src_lin.tobytes(),\n        nrx=int(len(rec_lin))),\n        dict_converter=js.Object.fromEntries)\n    js.__oubStart(job_id, msg)\n    return job_id\n\n\ndef poll(job_id):\n    \"\"\"{'done': bool, 'prog': int, 'total': int, 'error': str|None}.\"\"\"\n    import js\n    job = getattr(js.__OUB.jobs, job_id)\n    return dict(done=bool(job.done), prog=int(job.prog),\n                total=int(job.total), error=(str(job.error) if job.error else None))\n\n\ndef result(job_id, n_tx, nt, n_rx):\n    \"\"\"Fetch the finished FMC data as (n_tx, nt, n_rx) float64.\"\"\"\n    import js\n    job = getattr(js.__OUB.jobs, job_id)\n    buf = np.asarray(job.result.to_py(), dtype=np.float32)\n    js.eval(\"delete globalThis.__OUB.jobs['\" + job_id + \"']\")\n    return buf.reshape(n_tx, nt, n_rx).astype(np.float64)\n", "software/gui/webgpu_elastic.py": "\"\"\"Client-GPU 3D anisotropic ELASTIC forward for the in-browser build.\n\nRuns the full 21-component staggered-grid elastic solver (the physics of\nringfwi.elastic3d.forward) on the visitor's GPU via WebGPU compute shaders,\nbatched over transmits -- the browser counterpart of the batched CuPy path,\nso the Voronoi-seed inversion and polycrystal acquisition reach native-like\nspeed online.\n\nThe WGSL stress-update terms are GENERATED from the same staggered-position\ntables (_POS/_VPOS) the verified CPU solver uses, so the shader cannot drift\nfrom the reference physics. float32 on the GPU; callers verify the first\nevaluation against the CPU reference before trusting the data (same\nself-check-then-fallback contract as the acoustic WebGPU path).\n\nJob-based API like webgpu_client: :func:`start` returns immediately,\n:func:`poll` across Streamlit reruns, :func:`result` fetches (B, nt, n_rx).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nKEYS21 = tuple(f\"C{i}{j}\" for i in range(1, 7) for j in range(i, 7))\n_POS = {\"c\": (0, 0, 0), \"yz\": (1, 1, 0), \"xz\": (1, 0, 1), \"xy\": (0, 1, 1)}\n_VPOS = {1: \"c\", 2: \"c\", 3: \"c\", 4: \"yz\", 5: \"xz\", 6: \"xy\"}\n\n\ndef _gen_stress_terms():\n    \"\"\"WGSL statements for s_I += dt * sum_J C_IJ * move(gam_J, J->I).\"\"\"\n    lines = []\n    for I in range(1, 7):\n        posI = _POS[_VPOS[I]]\n n  st.ch.onmessage = (ev) => handle(ev.data);\n  return st;\n})();\nglobalThis.__oubStart = function (id, msg) {\n  globalThis.__OUB.jobs[id] = { done: false, prog: 0, total: 0,\n                                error: null, result: null };\n  globalThis.__OUB.ch.postMessage(msg);\n};\n\"\"\"\n\n\ndef available():\n    \"\"\"True inside a browser (Pyodide) whose runtime exposes WebGPU.\"\"\"\n    try:\n        import js\n        return getattr(js.navigator, \"gpu\", None) is not None\n    except Exception:\n        return False\n\n\ndef _js_source():\n    \"\"\"Main-thread GPU engine source (embedded in index.html at build).\"\"\"\n    return _JS_TEMPLATE.replace(\"__STRESS_TERMS__\", _gen_stress_terms())\n\n\ndef _ensure_js():\n    global _loaded\n    if not _loaded:\n        import js\n        js.eval(_BRIDGE_JS)\n        _loaded = True\n\n\ndef start(Cmaps, rho, h, dt, nt, wavelet, src_pts_list, rec_idx):\n    \"\"\"Launch a batched elastic FMC on the client GPU; returns a job id.\"\"\"\n    import js\n    from pyodide.ffi import to_js\n\n    _ensure_js()\n    rho = np.asarray(rho, float)\n    nz, ny, nx = rho.shape\n    N = nz * ny * nx\n    B = len(src_pts_list)\n\n    mat = np.empty((22, N), np.float32)\n    for k, key in enumerate(KEYS21):\n        v = Cmaps[key]\n        mat[k] = (np.full(N, float(v), np.float32) if np.ndim(v) == 0\n                  else np.asarray(v, np.float32).ravel())\n    mat[21] = rho.astype(np.float32).ravel()\n\n    def lin(t):\n        return (t[0] * ny + t[1]) * nx + t[2]\n\n    rec_lin = np.array([lin(t) for t in rec_idx], dtype=np.uint32)\n    src = []\n    for b, pts in enumerate(src_pts_list):\n        for idx, w in pts:\n            src.append([float(lin(idx)), float(b), float(w), 0.0])\n    src = np.asarray(src, np.float32)\n\n    _counter[0] += 1\n    job_id = f\"el{_counter[0]}\"\n    msg = to_js(dict(\n        type=\"el_start\", id=job_id, nz=nz, ny=ny, nx=nx, B=int(B),\n        nt=int(nt), invh=float(1.0 / h), dt=float(dt),\n        mat=mat.tobytes(),\n        wav=np.asarray(wavelet, np.float32).tobytes(),\n        recLin=rec_lin.tobytes(), src=src.tobytes(),\n        nrx=int(len(rec_lin)), nsrc=int(len(src))),\n        dict_converter=js.Object.fromEntries)\n    js.__oubStart(job_id, msg)\n    return job_id\n\n\ndef poll(job_id):\n    \"\"\"{'done': bool, 'prog': int, 'total': int, 'error': str|None}.\"\"\"\n    import js\n    job = getattr(js.__OUB.jobs, job_id)\n    return dict(done=bool(job.done), prog=int(job.prog),\n                total=int(job.total),\n                error=(str(job.error) if job.error else None))\n\n\ndef result(job_id, B, nt, n_rx):\n    \"\"\"Fetch the finished batched FMC as (B, nt, n_rx) float64.\"\"\"\n    import js\n    job = getattr(js.__OUB.jobs, job_id)\n    buf = np.asarray(job.result.to_py(), dtype=np.float32)\n    js.eval(\"delete globalThis.__OUB.jobs['\" + job_id + \"']\")\n    return buf.reshape(B, nt, n_rx).astype(np.float64)\n\n\ndef sa_start(shape, mat_base, cells, px, py, pz, base6, h, dt, nt, tau,\n             wavelet, src_cells, rec_lin, dobs, W, sos, seeds0, axes0,\n             steps, rng_seed, tau_end=0.5, restarts=3):\n    \"\"\"Launch the ENTIRE annealing loop as one main-thread job.\n\n    The main thread does proposals, soft-Voronoi model building, batched GPU\n    forwards, RX-filtered weighted residuals and Metropolis acceptance -- no\n    Streamlit rerun per step. Returns a job id; poll as usual and fetch the\n    packed result with :func:`sa_result`.\n    \"\"\"\n    import js\n    from pyodide.ffi import to_js\n\n    _ensure_js()\n    nz, ny, nx = (int(v) for v in shape)\n    src = np.asarray([[float(c), float(b), 1.0, 0.0]\n                      for b, c in enumerate(src_cells)], np.float32)\n    G = int(np.asarray(seeds0).size // 3)\n    _counter[0] += 1\n    job_id = f\"sa{_counter[0]}\"\n    msg = to_js(dict(\n        type=\"sa_start\", id=job_id, nz=nz, ny=ny, nx=nx,\n        B=int(len(src_cells)), nt=int(nt), nrx=int(len(rec_lin)), G=G,\n        invh=float(1.0 / h), dt=float(dt), h=float(h), tau=float(tau),\n        tauEnd=float(tau_end), restarts=int(restarts),\n        steps=int(steps), rngSeed=int(rng_seed) & 0x7FFFFFFF,\n        matBase=np.asarray(mat_base, np.float32).ravel().tobytes(),\n        cells=np.asarray(cells, np.uint32).tobytes(),\n        px=np.asarray(px, np.float32).tobytes(),\n        py=np.asarray(py, np.float32).tobytes(),\n        pz=np.asarray(pz, np.float32).tobytes(),\n        base6=np.asarray(base6, np.float32).ravel().tobytes(),\n        wav=np.asarray(wavelet, np.float32).tobytes(),\n        recLin=np.asarray(rec_lin, np.uint32).tobytes(),\n        src=src.tobytes(),\n        dobs=np.asarray(dobs, np.float32).ravel().tobytes(),\n        W=np.asarray(W, np.float32).ravel().tobytes(),\n        sos=np.asarray(sos, np.float32).ravel().tobytes()),\n        dict_converter=js.Object.fromEntries)\n    js.__oubStart(job_id, msg)\n    return job_id\n\n\ndef sa_result(job_id):\n    \"\"\"Fetch a finished annealing job's packed result (flat float32).\"\"\"\n    import js\n    job = getattr(js.__OUB.jobs, job_id)\n    buf = np.asarray(job.result.to_py(), dtype=np.float32)\n    js.eval(\"delete globalThis.__OUB.jobs['\" + job_id + \"']\")\n    return buf\n", "simulation/ringfwi/__init__.py": "\"\"\"OpenUSCT: full waveform inversion for ring-array ultrasound tomography.\n\nA compact, dependency-light research framework for reconstructing the sound\nspeed of a cylindrical specimen from full-matrix-capture data recorded on a\nring transducer array. The forward model is a 2D acoustic finite-difference\nsolver; the inverse solver is adjoint-state full waveform inversion.\n\n(``ringfwi`` is the import package name; OpenUSCT is the project.)\n\"\"\"\n\nfrom . import (acquire, anisotropy, attenuation, cof, dataset, elastic,\n               elastic3d, fwi, geometry, imaging, phantom, plugins, render3d,\n               solver, sources, transducer, uarp_format)\nfrom .dataset import ArrayGeometry, Dataset\n\n__all__ = [\n    \"acquire\",\n    \"anisotropy\",\n    \"attenuation\",\n    \"cof\",\n    \"dataset\",\n    \"elastic\",\n    \"elastic3d\",\n    \"fwi\",\n    \"geometry\",\n    \"imaging\",\n    \"phantom\",\n    \"plugins\",\n    \"render3d\",\n    \"solver\",\n    \"sources\",\n    \"transducer\",\n    \"uarp_format\",\n    \"ArrayGeometry\",\n    \"Dataset\",\n]\n__version__ = \"0.1.0\"\n", "simulation/ringfwi/acquire.py": "\"\"\"Simulation backend of the acquisition API.\n\nThis is the software equivalent of pressing \"acquire\" on the hardware: it runs\nthe wave solver and returns a :class:`~ringfwi.dataset.Dataset` in exactly the\nsame form the physical board will produce. Application and imaging code targets\nthe Dataset, so nothing downstream needs to know whether the data came from a\nsolver or a PCB. That is the hardware abstraction layer, seen from the software\nside.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom .dataset import ArrayGeometry, Dataset\nfrom .fwi import forward_fmc\nfrom .phantom import velocity_to_m\n\n\ndef simulate_dataset(\n    c_model,\n    array_geom,\n    wavelet,\n    dt,\n    nominal_speed_m_s,\n    src_list=None,\n    store_ground_truth=True,\n    description=\"\",\n):\n    \"\"\"Simulate a full-matrix-capture acquisition and return a Dataset.\n\n    Works in 2D or 3D depending on the array passed.\n\n    Parameters\n    ----------\n    c_model : ndarray\n        True sound-speed field (m/s); 2D for a ring, 3D for a cylinder.\n    array_geom : RingArray or CylinderArray\n        Grid-mapped array used by the solver.\n    wavelet : (nt,) ndarray\n        Transmit wavelet.\n    dt : float\n        Time step (seconds); the dataset sample rate is 1 / dt.\n    nominal_speed_m_s : float\n        Assumed background speed recorded for delay-based imaging.\n    \"\"\"\n    m = velocity_to_m(c_model)\n    data = forward_fmc(m, array_geom, wavelet, dt, array_geom.h, len(wavelet), src_list=src_list)\n\n    geom = ArrayGeometry(\n        element_pos=array_geom.element_positions,\n        radius_m=array_geom.radius_m,\n        centre_freq_hz=_peak_freq(wavelet, dt),\n        array_type=getattr(array_geom, \"array_type\", \"ring\"),\n    )\n\n    tx_elements = (list(range(array_geom.n_elements)) if src_list is None\n                   else list(src_list))\n    gt = {\"c\": c_model, \"h_m\": array_geom.h} if store_ground_truth else None\n    return Dataset(\n        geometry=geom,\n        data=data,\n        sample_rate_hz=1.0 / dt,\n        tx_wavelet=wavelet,\n        tx_centre_freq_hz=_peak_freq(wavelet, dt),\n        nominal_speed_m_s=nominal_speed_m_s,\n        tx_elements=tx_elements,\n        ground_truth=gt,\n        metadata={\"description\": description, \"created_by\": \"OpenUSCT simulator\"},\n    )\n\n\ndef _peak_freq(wavelet, dt):\n    \"\"\"Estimate the wavelet centre frequency from its amplitude spectrum.\"\"\"\n    import numpy as np\n\n    spec = np.abs(np.fft.rfft(wavelet))\n    freqs = np.fft.rfftfreq(len(wavelet), dt)\n    return float(freqs[int(np.argmax(spec))])\n", "simulation/ringfwi/anisotropy.py": "\"\"\"2D anisotropic elastic wave propagation (rotated staggered grid).\n\nAnisotropic elastodynamics for media with a full in-plane stiffness tensor\n(C11, C12, C22, C16, C26, C66). The motivating case is single-crystal ice Ih,\nwhich is hexagonal (transversely isotropic): its P-wave speed depends on the\npropagation direction relative to the c-axis. Resolving that directional\nvelocity anisotropy is the physical basis of crystal-orientation-fabric (COF)\nestimation in ice cores.\n\nThe solver extends the verified isotropic velocity-stress staggered grid\n(see elastic.py). Diagonal anisotropy (C11 != C22, plus C12 and C66) is captured\nwith no interpolation: those terms only need dvx/dx and dvy/dy, which live at the\ncell centre where sxx/syy do. An arbitrary c-axis orientation additionally makes\nC16/C26 non-zero (monoclinic in-plane); those couple the normal stresses to the\nshear strain (and vice versa), which lives on the staggered corner, so they are\nhandled by a 4-point average between the centre and corner grids.\n\nThe analytical Christoffel equation Gamma_ik = C_ijkl n_j n_l gives the exact\nphase velocities used to verify the solver.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n# Single-crystal ice Ih stiffness (GPa) and density (kg/m^3), ~ -16 C.\n# Hexagonal symmetry axis (c-axis) = x3. (Gammon et al. 1983 / Gagnon et al. 1988.)\nICE_C11 = 13.93e9\nICE_C33 = 15.01e9\nICE_C44 = 3.01e9\nICE_C12 = 7.08e9\nICE_C13 = 5.77e9\nICE_RHO = 917.0\n\n_VOIGT = ((0, 0), (1, 1), (0, 1))   # 2D Voigt index -> tensor index pair\n\n\ndef voigt_to_tensor(C):\n    \"\"\"3x3 Voigt stiffness (engineering strain) -> 2x2x2x2 tensor.\"\"\"\n    T = np.zeros((2, 2, 2, 2))\n    for a, (i, j) in enumerate(_VOIGT):\n        for b, (k, l) in enumerate(_VOIGT):\n            v = C[a, b]\n            for ii, jj in {(i, j), (j, i)}:\n                for kk, ll in {(k, l), (l, k)}:\n                    T[ii, jj, kk, ll] = v\n    return T\n\n\ndef tensor_to_voigt(T):\n    \"\"\"2x2x2x2 tensor -> 3x3 Voigt stiffness.\"\"\"\n    C = np.zeros((3, 3))\n    for a, (i, j) in enumerate(_VOIGT):\n        for b, (k, l) in enumerate(_VOIGT):\n            C[a, b] = T[i, j, k, l]\n    return C\n\n\ndef rotate_voigt(C, theta):\n    \"\"\"Rotate a 3x3 Voigt stiffness by angle theta (radians) in the plane.\"\"\"\n    c, s = np.cos(theta), np.sin(theta)\n    R = np.array([[c, -s], [s, c]])\n    T = voigt_to_tensor(C)\n    Tr = np.einsum(\"pi,qj,rk,sl,ijkl->pqrs\", R, R, R, R, T)\n    return tensor_to_voigt(Tr)\n\n\ndef theta_stiffness_maps(theta_map, base3):\n    \"\"\"Per-voxel rotated stiffness maps and their exact theta-derivatives.\n\n    ``theta_map`` is a per-voxel in-plane c-axis angle field; ``base3`` the\n    unrotated 3x3 in-plane Voigt stiffness (for example\n    :func:`ice_stiffness_2d` at theta=0). Returns two dicts of (ny, nx) maps,\n    ``C`` and ``dC/dtheta``, with keys C11, C12, C22, C66, C16, C26. The\n    derivative is analytic (rotation generator), so the chained orientation\n    gradient stays exact.\n    \"\"\"\n    T = voigt_to_tensor(np.asarray(base3, float))\n    shape = np.asarray(theta_map).shape\n    th = np.asarray(theta_map, float).ravel()\n    c, s = np.cos(th), np.sin(th)\n    R = np.stack([np.stack([c, -s], -1), np.stack([s, c], -1)], -2)   # (P,2,2)\n    dR = np.stack([np.stack([-s, -c], -1), np.stack([c, -s], -1)], -2)\n\n    def rot(Ra, Rb, Rc, Rd):\n        return np.einsum(\"pai,pbj,pck,pdl,ijkl->pabcd\", Ra, Rb, Rc, Rd, T)\n\n    Cv = rot(R, R, R, R)\n    dCv = (rot(dR, R, R, R) + rot(R, dR, R, R)\n           + rot(R, R, dR, R) + rot(R, R, R, dR))\n    keys = {\"C11\": (0, 0), \"C12\": (0, 1), \"C22\": (1, 1),\n            \"C66\": (2, 2), \"C16\": (0, 2), \"C26\": (1, 2)}\n\n    def pick(Tv, a, b):\n        i, j = _VOIGT[a]\n        k, l = _VOIGT[b]\n        return np.ascontiguousarray(Tv[:, i, j, k, l]).reshape(shape)\n\n    C = {key: pick(Cv, a, b) for key, (a, b) in keys.items()}\n    dC = {key: pick(dCv, a, b) for key, (a, b) in keys.items()}\n    return C, dC\n\n\ndef theta_misfit_and_gradient(theta_map, base3, rho, h, dt, nt, sources,\n                              wavelet, rec_idx, dobs_list):\n    \"\"\"Misfit and its gradient w.r.t. the per-voxel ORIENTATION field.\n\n    This is the physically meaningful parameterisation for a known TI\n    material: each voxel carries the full direction-dependent velocity\n    function, encoded by one angle. Chain rule through the tensor rotation:\n    g_theta = sum_ij g_Cij * dCij/dtheta, with every factor exact.\n    \"\"\"\n    C, dC = theta_stiffness_maps(theta_map, base3)\n    J = 0.0\n    g_theta = np.zeros_like(np.asarray(theta_map, float))\n    for src, dobs in zip(sources, dobs_list):\n        Ji, g = misfit_and_gradient(C[\"C11\"], C[\"C12\"], C[\"C22\"], C[\"C66\"],\n                                    rho, h, dt, nt, src, wavelet, rec_idx,\n                                    dobs, C[\"C16\"], C[\"C26\"])\n        J += Ji\n        for k in g:\n            g_theta += g[k] * dC[k]\n    return J, g_theta\n\n\ndef invert_theta(theta0, base3, rho, h, dt, nt, sources, wavelet, rec_idx,\n                 dobs_list, n_iter=15, step_rad=0.15, smooth_sigma=1.5,\n                 update_mask=None, n_linesearch=5, verbose=False,\n                 progress=None):\n    \"\"\"Voxel-wise orientation-field FWI (steepest descent with line search).\n\n    Inverts the in-plane c-axis angle map of a known TI material directly:\n    no grain geometry prior, no scalar-velocity approximation. The angle is\n    defined modulo pi (TI symmetry).\n    \"\"\"\n    from scipy.ndimage import gaussian_filter\n\n    theta = np.asarray(theta0, float).copy()\n    mask = update_mask if update_mask is not None else 1.0\n    history = []\n    J, g = theta_misfit_and_gradient(theta, base3, rho, h, dt, nt, sources,\n                                     wavelet, rec_idx, dobs_list)\n    for it in range(n_iter):\n        history.append(J)\n        if verbose:\n            print(f\"  theta-FWI iter {it:2d}  misfit = {J:.6e}\", flush=True)\n        gm = g * mask\n        if smooth_sigma:\n            gm = gaussian_filter(gm, smooth_sigma) * mask\n        gmax = float(np.max(np.abs(gm)))\n        if gmax == 0.0:\n            break\n        step = step_rad\n        accepted = False\n        for _ in range(n_linesearch):\n            th_try = theta - step * gm / gmax\n            J_try, g_try = theta_misfit_and_gradient(th_try, base3, rho, h,\n                                                     dt, nt, sources, wavelet,\n                                                     rec_idx, dobs_list)\n            if J_try < J:\n                theta, J, g = th_try, J_try, g_try\n                accepted = True\n                break\n            step *= 0.5\n        if not accepted:\n            if verbose:\n                print(\"  line search failed; stopping\")\n            break\n        if progress is not None:\n            progress(it + 1, n_iter)\n    history.append(J)\n    return theta, history\n\n\ndef ice_stiffness_2d(theta=0.0):\n    \"\"\"In-plane Voigt stiffness for ice Ih in the plane containing the c-axis.\n\n    With theta = 0 the c-axis lies along the 2D-y axis (orthotropic). Rotating by\n    theta turns the c-axis in the imaging plane and introduces C16/C26.\n    Mapping: 2D-x = crystal x1, 2D-y = crystal x3 (c-axis); shear = crystal 1-3\n    plane (C55 = C44).\n    \"\"\"\n    C = np.array([\n        [ICE_C11, ICE_C13, 0.0],\n        [ICE_C13, ICE_C33, 0.0],\n        [0.0,     0.0,     ICE_C44],\n    ])\n    return rotate_voigt(C, theta) if theta else C\n\n\ndef christoffel_velocities(C, rho, phi):\n    \"\"\"Phase velocities (qP, qS) for propagation direction phi (radians).\n\n    Returns (v_qP, v_qS) with v_qP >= v_qS, from the eigenvalues of the 2D\n    Christoffel matrix Gamma_ik = C_ijkl n_j n_l, rho v^2 = eig(Gamma).\n    \"\"\"\n    T = voigt_to_tensor(np.asarray(C, float))\n    n = np.array([np.cos(phi), np.sin(phi)])\n    Gamma = np.einsum(\"ijkl,j,l->ik\", T, n, n)\n    ev = np.sort(np.linalg.eigvalsh(Gamma))[::-1]\n    return np.sqrt(ev[0] / rho), np.sqrt(ev[1] / rho)\n\n\ndef polycrystal_stiffness(labels, angles, c_couplant=1480.0, rho_couplant=1000.0,\n                          fluid_mask=None):\n    \"\"\"Stiffness and density maps for an ice polycrystal in a fluid couplant.\n\n    Each grain (``labels`` >= 0, from :func:`ringfwi.phantom.voronoi_polycrystal`)\n    gets the single-crystal ice Ih stiffness rotated by its c-axis ``angle``.\n    Cells outside the specimen are the fluid couplant, expressed in the same\n    velocity-stress framework as a solid with zero shear stiffness:\n    C11 = C22 = C12 = rho c^2 (bulk modulus), C16 = C26 = C66 = 0 (the acoustic\n    limit). ``fluid_mask`` optionally forces extra cells to fluid, modelling an\n    isotropic pocket inside the polycrystal (for example a melt inclusion).\n\n    Returns (C11, C12, C22, C16, C26, C66), rho \u2014 ready for :func:`forward`.\n    \"\"\"\n    shape = labels.shape\n    K = rho_couplant * c_couplant * c_couplant\n    C11 = np.full(shape, K); C12 = np.full(shape, K); C22 = np.full(shape, K)\n    C16 = np.zeros(shape); C26 = np.zeros(shape); C66 = np.zeros(shape)\n    rho = np.full(shape, rho_couplant)\n\n    base = ice_stiffness_2d(0.0)\n    for k, th in enumerate(np.asarray(angles, float)):\n        msk = labels == k\n        if not msk.any():\n            continue\n        Ck = rotate_voigt(base, th)\n        C11[msk] = Ck[0, 0]; C12[msk] = Ck[0, 1]; C22[msk] = Ck[1, 1]\n        C16[msk] = Ck[0, 2]; C26[msk] = Ck[1, 2]; C66[msk] = Ck[2, 2]\n        rho[msk] = ICE_RHO\n\n    if fluid_mask is not None:\n        m = fluid_mask.astype(bool)\n        C11[m] = K; C12[m] = K; C22[m] = K\n        C16[m] = 0.0; C26[m] = 0.0; C66[m] = 0.0\n        rho[m] = rho_couplant\n\n    return (C11, C12, C22, C16, C26, C66), rho\n\n\ndef polycrystal_apparent_speed(labels, angles, c_couplant=1480.0, phi=0.0,\n                               fluid_mask=None):\n    \"\"\"Per-grain apparent qP speed along direction ``phi`` (display / FWI ref).\n\n    A polycrystal of identical crystals differing only in orientation has no\n    isotropic velocity contrast; what a fixed propagation direction sees is the\n    directional qP speed of each grain. This is the \"apparent velocity\" field\n    an acoustic reconstruction of anisotropic data is probing.\n    \"\"\"\n    base = ice_stiffness_2d(0.0)\n    capp = np.full(labels.shape, float(c_couplant))\n    for k, th in enumerate(np.asarray(angles, float)):\n        msk = labels == k\n        if not msk.any():\n            continue\n        vqp, _ = christoffel_velocities(rotate_voigt(base, th), ICE_RHO, phi)\n        capp[msk] = vqp\n    if fluid_mask is not None:\n        capp[fluid_mask.astype(bool)] = c_couplant\n    return capp\n\n\ndef ice_qp_vs_caxis(psi):\n    \"\"\"qP phase speed at angle ``psi`` between propagation and the c-axis.\n\n    Ice Ih is transversely isotropic, so qP depends only on this angle; the\n    exact value comes from the 2D Christoffel solution in the plane containing\n    the c-axis (where the 2D convention has the c-axis along y, so a\n    propagation angle phi from x gives psi = pi/2 - phi).\n    \"\"\"\n    vqp, _ = christoffel_velocities(ice_stiffness_2d(0.0), ICE_RHO,\n                                    np.pi / 2.0 - psi)\n    return vqp\n\n\ndef polycrystal_apparent_speed_3d(labels, axes, c_couplant=1480.0,\n                                  prop_dir=(1.0, 0.0, 0.0), fluid_mask=None,\n                                  material=None):\n    \"\"\"Per-grain apparent qP speed map for a 3D polycrystal.\n\n    Each grain's scalar is the exact transversely-isotropic qP phase speed of\n    ``material`` (defaults to ice Ih) for propagation along ``prop_dir`` given\n    the grain's 3D c-axis. Used as the display / reconstruction reference for\n    the full elastic simulation.\n    \"\"\"\n    mat = ICE_MATERIAL if material is None else material\n    base6 = ti_stiffness_6(**mat)\n    d = np.asarray(prop_dir, float)\n    d = d / np.linalg.norm(d)\n    capp = np.full(labels.shape, float(c_couplant))\n    for k, ax in enumerate(np.asarray(axes, float)):\n        msk = labels == k\n        if not msk.any():\n            continue\n        psi = np.arccos(np.clip(abs(float(np.dot(ax, d))), 0.0, 1.0))\n        vqp, _, _ = christoffel_3d(base6, mat[\"rho\"],\n                                   (np.sin(psi), 0.0, np.cos(psi)))\n        capp[msk] = vqp\n    if fluid_mask is not None:\n        capp[fluid_mask.astype(bool)] = c_couplant\n    return capp\n\n\n# --- Full 3D stiffness machinery ---------------------------------------------\n\n_VOIGT3 = ((0, 0), (1, 1), (2, 2), (1, 2), (0, 2), (0, 1))\n\n\ndef voigt6_to_tensor(C):\n    \"\"\"6x6 Voigt stiffness (engineering strain) -> 3x3x3x3 tensor.\"\"\"\n    T = np.zeros((3, 3, 3, 3))\n    for a, (i, j) in enumerate(_VOIGT3):\n        for b, (k, l) in enumerate(_VOIGT3):\n            v = C[a, b]\n            for ii, jj in {(i, j), (j, i)}:\n                for kk, ll in {(k, l), (l, k)}:\n                    T[ii, jj, kk, ll] = v\n    return T\n\n\ndef tensor_to_voigt6(T):\n    \"\"\"3x3x3x3 tensor -> 6x6 Voigt stiffness.\"\"\"\n    C = np.zeros((6, 6))\n    for a, (i, j) in enumerate(_VOIGT3):\n        for b, (k, l) in enumerate(_VOIGT3):\n            C[a, b] = T[i, j, k, l]\n    return C\n\n\ndef rotate_voigt_3d(C, R):\n    \"\"\"Rotate a 6x6 Voigt stiffness by the 3x3 rotation matrix ``R``.\"\"\"\n    T = voigt6_to_tensor(np.asarray(C, float))\n    Tr = np.einsum(\"pi,qj,rk,sl,ijkl->pqrs\", R, R, R, R, T)\n    return tensor_to_voigt6(Tr)\n\n\ndef _rotation_z_to(axis):\n    \"\"\"Rotation matrix taking the z axis onto the unit vector ``axis``.\"\"\"\n    a = np.asarray(axis, float)\n    a = a / np.linalg.norm(a)\n    z = np.array([0.0, 0.0, 1.0])\n    v = np.cross(z, a)\n    c = float(np.dot(z, a))\n    if np.linalg.norm(v) < 1e-12:\n        return np.eye(3) if c > 0 else np.diag([1.0, -1.0, -1.0])\n    vx = np.array([[0, -v[2], v[1]], [v[2], 0, -v[0]], [-v[1], v[0], 0]])\n    return np.eye(3) + vx + vx @ vx / (1.0 + c)         # Rodrigues\n\n\n# Registry of common transversely isotropic (hexagonal) materials.\n# Typical literature single-crystal constants (Pa; density kg/m^3); the five\n# independent TI constants are C11, C33, C44, C12, C13 with C66 = (C11-C12)/2\n# and the symmetry (c) axis along z.\nTI_MATERIALS = {\n    \"Ice Ih (-16 C)\": dict(C11=13.93e9, C33=15.01e9, C44=3.01e9,\n                           C12=7.08e9, C13=5.77e9, rho=917.0),\n    \"Titanium (alpha)\": dict(C11=162.4e9, C33=180.7e9, C44=46.7e9,\n                             C12=92.0e9, C13=69.0e9, rho=4506.0),\n    \"Zinc\": dict(C11=161.0e9, C33=61.0e9, C44=38.3e9,\n                 C12=34.2e9, C13=50.1e9, rho=7140.0),\n    \"Magnesium\": dict(C11=59.7e9, C33=61.7e9, C44=16.4e9,\n                      C12=26.2e9, C13=21.7e9, rho=1738.0),\n    \"Zirconium (alpha)\": dict(C11=143.4e9, C33=164.8e9, C44=32.0e9,\n                              C12=72.8e9, C13=65.3e9, rho=6511.0),\n    \"Graphite (pyrolytic)\": dict(C11=1060.0e9, C33=36.5e9, C44=4.5e9,\n                                 C12=180.0e9, C13=15.0e9, rho=2266.0),\n}\nICE_MATERIAL = TI_MATERIALS[\"Ice Ih (-16 C)\"]\n\n\ndef ti_stiffness_6(C11, C33, C44, C12, C13, **_):\n    \"\"\"6x6 Voigt stiffness of a transversely isotropic solid, c-axis along z.\"\"\"\n    return np.array([\n        [C11, C12, C13, 0, 0, 0],\n        [C12, C11, C13, 0, 0, 0],\n        [C13, C13, C33, 0, 0, 0],\n        [0, 0, 0, C44, 0, 0],\n        [0, 0, 0, 0, C44, 0],\n        [0, 0, 0, 0, 0, (C11 - C12) / 2.0],\n    ])\n\n\ndef ti_stiffness_3d(axis, material):\n    \"\"\"Full 6x6 stiffness of a TI ``material`` with the c-axis along ``axis``.\"\"\"\n    return rotate_voigt_3d(ti_stiffness_6(**material), _rotation_z_to(axis))\n\n\ndef ti_max_speed(material, n_psi=181):\n    \"\"\"Maximum phase speed of a TI material over all directions (for CFL).\"\"\"\n    base = ti_stiffness_6(**material)\n    vmax = 0.0\n    for psi in np.linspace(0.0, np.pi / 2.0, n_psi):\n        v = christoffel_3d(base, material[\"rho\"], (np.sin(psi), 0.0, np.cos(psi)))\n        vmax = max(vmax, v[0])\n    return vmax\n\n\ndef ice_stiffness_3d(axis=(0.0, 0.0, 1.0)):\n    \"\"\"Full 6x6 stiffness of single-crystal ice Ih with the c-axis along ``axis``.\"\"\"\n    return ti_stiffness_3d(axis, ICE_MATERIAL)\n\n\ndef christoffel_3d(C6, rho, n):\n    \"\"\"Phase velocities (qP, qS1, qS2) for propagation direction ``n`` (3D).\"\"\"\n    T = voigt6_to_tensor(np.asarray(C6, float))\n    n = np.asarray(n, float)\n    n = n / np.linalg.norm(n)\n    Gamma = np.einsum(\"ijkl,j,l->ik\", T, n, n)\n    ev = np.sort(np.linalg.eigvalsh(Gamma))[::-1]\n    return tuple(np.sqrt(e / rho) for e in ev)\n\n\n_KEYS21 = [f\"C{i}{j}\" for i in range(1, 7) for j in range(i, 7)]\n\n\ndef polycrystal_stiffness_3d(labels, axes, c_couplant=1480.0, rho_couplant=1000.0,\n                             fluid_mask=None, material=None):\n    \"\"\"Full 21-component stiffness + density maps for a 3D polycrystal.\n\n    Each grain gets the complete rotated single-crystal tensor of ``material``\n    (a dict with C11, C33, C44, C12, C13, rho \u2014 see :data:`TI_MATERIALS`;\n    defaults to ice Ih) for its 3D c-axis; the couplant is fluid (bulk stiffness\n    only, zero shear). Returns (Cmaps, rho) with ``Cmaps`` a dict of the 21\n    upper-triangle Voigt maps, ready for :func:`ringfwi.elastic3d.forward`.\n    \"\"\"\n    mat = ICE_MATERIAL if material is None else material\n    shape = labels.shape\n    K = rho_couplant * c_couplant * c_couplant\n    fluid6 = np.zeros((6, 6))\n    fluid6[:3, :3] = K\n    Cmaps = {}\n    for key in _KEYS21:\n        i, j = int(key[1]) - 1, int(key[2]) - 1\n        Cmaps[key] = np.full(shape, fluid6[i, j])\n    rho = np.full(shape, rho_couplant)\n\n    for k, ax in enumerate(np.asarray(axes, float)):\n        msk = labels == k\n        if not msk.any():\n            continue\n        C6 = ti_stiffness_3d(ax, mat)\n        for key in _KEYS21:\n            i, j = int(key[1]) - 1, int(key[2]) - 1\n            Cmaps[key][msk] = C6[i, j]\n        rho[msk] = mat[\"rho\"]\n\n    if fluid_mask is not None:\n        m = fluid_mask.astype(bool)\n        for key in _KEYS21:\n            i, j = int(key[1]) - 1, int(key[2]) - 1\n            Cmaps[key][m] = fluid6[i, j]\n        rho[m] = rho_couplant\n\n    return Cmaps, rho\n\n\ndef _corner_to_centre(g):\n    \"\"\"Average a corner-grid field (sxy location) onto the centre grid.\"\"\"\n    out = np.zeros_like(g)\n    out[1:, 1:] = 0.25 * (g[1:, 1:] + g[:-1, 1:] + g[1:, :-1] + g[:-1, :-1])\n    return out\n\n\ndef _centre_to_corner(f):\n    \"\"\"Average a centre-grid field (sxx location) onto the corner grid.\"\"\"\n    out = np.zeros_like(f)\n    out[:-1, :-1] = 0.25 * (f[:-1, :-1] + f[1:, :-1] + f[:-1, 1:] + f[1:, 1:])\n    return out\n\n\ndef forward(C, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n            source=\"explosive\", record=\"pressure\", store=False):\n    \"\"\"Anisotropic elastic forward model on a velocity-stress staggered grid.\n\n    C : dict or sequence (C11, C12, C22, C16, C26, C66); each entry a scalar or\n        an (ny, nx) array. rho : scalar or (ny, nx) array.\n    Sources/receivers are (iy, ix). \"explosive\" injects into sxx+syy (P);\n    \"fx\"/\"fy\" inject a body force. record: \"pressure\", \"vx\" or \"vy\".\n    \"\"\"\n    if isinstance(C, dict):\n        C11, C12, C22, C16, C26, C66 = (C[\"C11\"], C[\"C12\"], C[\"C22\"],\n                                        C[\"C16\"], C[\"C26\"], C[\"C66\"])\n    else:\n        C11, C12, C22, C16, C26, C66 = C\n\n    rho_arr = np.asarray(rho, float)\n    ny, nx = rho_arr.shape\n    inv_h = 1.0 / h\n    mono = np.any(C16) or np.any(C26)      # off-diagonal (rotated c-axis) present\n\n    vx = np.zeros((ny, nx)); vy = np.zeros((ny, nx))\n    sxx = np.zeros((ny, nx)); syy = np.zeros((ny, nx)); sxy = np.zeros((ny, nx))\n    rec = np.zeros((nt, len(rec_idx)))\n    hist = None if not store else np.zeros((nt, ny, nx))\n\n    for n in range(nt):\n        # --- stress update ---\n        dvx_dx = np.zeros((ny, nx)); dvx_dx[:, 1:] = (vx[:, 1:] - vx[:, :-1]) * inv_h  # centre\n        dvy_dy = np.zeros((ny, nx)); dvy_dy[1:, :] = (vy[1:, :] - vy[:-1, :]) * inv_h  # centre\n        dvy_dx = np.zeros((ny, nx)); dvy_dx[:, :-1] = (vy[:, 1:] - vy[:, :-1]) * inv_h  # corner\n        dvx_dy = np.zeros((ny, nx)); dvx_dy[:-1, :] = (vx[1:, :] - vx[:-1, :]) * inv_h  # corner\n        gxy_c = dvy_dx + dvx_dy                                   # shear strain at corner\n\n        sxx_rate = C11 * dvx_dx + C12 * dvy_dy\n        syy_rate = C12 * dvx_dx + C22 * dvy_dy\n        sxy_rate = C66 * gxy_c\n        if mono:\n            gxy_centre = _corner_to_centre(gxy_c)                 # shear strain at centre\n            sxx_rate = sxx_rate + C16 * gxy_centre\n            syy_rate = syy_rate + C26 * gxy_centre\n            sxy_rate = sxy_rate + (C16 * _centre_to_corner(dvx_dx)\n                                   + C26 * _centre_to_corner(dvy_dy))\n        sxx += dt * sxx_rate; syy += dt * syy_rate; sxy += dt * sxy_rate\n\n        if source == \"explosive\":\n            sxx[src_idx] += wavelet[n]; syy[src_idx] += wavelet[n]\n\n        # --- velocity update ---\n        dsxx_dx = np.zeros((ny, nx)); dsxx_dx[:, :-1] = (sxx[:, 1:] - sxx[:, :-1]) * inv_h\n        dsxy_dy = np.zeros((ny, nx)); dsxy_dy[1:, :] = (sxy[1:, :] - sxy[:-1, :]) * inv_h\n        vx += (dt / rho_arr) * (dsxx_dx + dsxy_dy)\n        dsxy_dx = np.zeros((ny, nx)); dsxy_dx[:, 1:] = (sxy[:, 1:] - sxy[:, :-1]) * inv_h\n        dsyy_dy = np.zeros((ny, nx)); dsyy_dy[:-1, :] = (syy[1:, :] - syy[:-1, :]) * inv_h\n        vy += (dt / rho_arr) * (dsxy_dx + dsyy_dy)\n\n        if source == \"fx\":\n            vx[src_idx] += wavelet[n] * dt\n        elif source == \"fy\":\n            vy[src_idx] += wavelet[n] * dt\n\n        if record == \"pressure\":\n            field = -(sxx + syy) / 2.0\n        else:\n            field = vx if record == \"vx\" else vy\n        for j, idx in enumerate(rec_idx):\n            rec[n, j] = field[idx]\n        if hist is not None:\n            hist[n] = np.sqrt(vx * vx + vy * vy)\n\n    return rec, hist\n\n\n# ---------------------------------------------------------------------------\n# Elastic FWI gradient (exact discrete adjoint).\n#\n# The gradient of the data misfit with respect to the stiffness maps is obtained\n# by reverse-mode differentiation of the exact discrete forward, so it matches a\n# finite-difference check to machine precision. Only the diagonal stiffnesses\n# (C11, C12, C22, C66) are differentiated here -- the on-axis / orthotropic case,\n# which already covers isotropic and c-axis-aligned ice. The off-diagonal\n# C16/C26 gradient (rotated c-axis) is a follow-on.\n#\n# Forward difference operators and their exact transposes (adjoints). \"b\"/\"f\"\n# denote the backward/forward one-sided stencils used in the forward solver.\n# ---------------------------------------------------------------------------\n\ndef _Dbx(f, inv_h):\n    o = np.zeros_like(f); o[:, 1:] = (f[:, 1:] - f[:, :-1]) * inv_h; return o\n\n\ndef _Dby(f, inv_h):\n    o = np.zeros_like(f); o[1:, :] = (f[1:, :] - f[:-1, :]) * inv_h; return o\n\n\ndef _Dfx(f, inv_h):\n    o = np.zeros_like(f); o[:, :-1] = (f[:, 1:] - f[:, :-1]) * inv_h; return o\n\n\ndef _Dfy(f, inv_h):\n    o = np.zeros_like(f); o[:-1, :] = (f[1:, :] - f[:-1, :]) * inv_h; return o\n\n\ndef _DbxT(g, inv_h):\n    gf = np.zeros_like(g); gf[:, 1:] += g[:, 1:] * inv_h; gf[:, :-1] -= g[:, 1:] * inv_h; return gf\n\n\ndef _DbyT(g, inv_h):\n    gf = np.zeros_like(g); gf[1:, :] += g[1:, :] * inv_h; gf[:-1, :] -= g[1:, :] * inv_h; return gf\n\n\ndef _DfxT(g, inv_h):\n    gf = np.zeros_like(g); gf[:, 1:] += g[:, :-1] * inv_h; gf[:, :-1] -= g[:, :-1] * inv_h; return gf\n\n\ndef _DfyT(g, inv_h):\n    gf = np.zeros_like(g); gf[1:, :] += g[:-1, :] * inv_h; gf[:-1, :] -= g[:-1, :] * inv_h; return gf\n\n\ndef _c2k_T(g):\n    \"\"\"Exact transpose of :func:`_centre_to_corner`.\"\"\"\n    out = np.zeros_like(g)\n    q = 0.25 * g[:-1, :-1]\n    out[:-1, :-1] += q\n    out[1:, :-1] += q\n    out[:-1, 1:] += q\n    out[1:, 1:] += q\n    return out\n\n\ndef _k2c_T(g):\n    \"\"\"Exact transpose of :func:`_corner_to_centre`.\"\"\"\n    out = np.zeros_like(g)\n    q = 0.25 * g[1:, 1:]\n    out[1:, 1:] += q\n    out[:-1, 1:] += q\n    out[1:, :-1] += q\n    out[:-1, :-1] += q\n    return out\n\n\ndef _grad_forward(C11, C12, C22, C66, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n                  C16=0.0, C26=0.0):\n    \"\"\"Full-stiffness forward that stores the velocity history for the adjoint.\n\n    Identical physics to :func:`forward` (including the C16/C26 monoclinic\n    coupling via centre/corner averaging) but keeps vx/vy at every step.\n    \"\"\"\n    ny, nx = rho.shape\n    inv_h = 1.0 / h\n    mono = np.any(C16) or np.any(C26)\n    vx = np.zeros((ny, nx)); vy = np.zeros((ny, nx))\n    sxx = np.zeros((ny, nx)); syy = np.zeros((ny, nx)); sxy = np.zeros((ny, nx))\n    rec = np.zeros((nt, len(rec_idx)))\n    vxh = np.zeros((nt, ny, nx)); vyh = np.zeros((nt, ny, nx))\n    for n in range(nt):\n        vxh[n] = vx; vyh[n] = vy                      # state used by the strains\n        exx = _Dbx(vx, inv_h); eyy = _Dby(vy, inv_h)\n        gxy = _Dfx(vy, inv_h) + _Dfy(vx, inv_h)\n        sxx_rate = C11 * exx + C12 * eyy\n        syy_rate = C12 * exx + C22 * eyy\n        sxy_rate = C66 * gxy\n        if mono:\n            gc = _corner_to_centre(gxy)\n            sxx_rate = sxx_rate + C16 * gc\n            syy_rate = syy_rate + C26 * gc\n            sxy_rate = sxy_rate + C16 * _centre_to_corner(exx) \\\n                                + C26 * _centre_to_corner(eyy)\n        sxx += dt * sxx_rate; syy += dt * syy_rate; sxy += dt * sxy_rate\n        sxx[src_idx] += wavelet[n]; syy[src_idx] += wavelet[n]\n        vx += (dt / rho) * (_Dfx(sxx, inv_h) + _Dby(sxy, inv_h))\n        vy += (dt / rho) * (_Dbx(sxy, inv_h) + _Dfy(syy, inv_h))\n        field = -(sxx + syy) / 2.0\n        for j, idx in enumerate(rec_idx):\n            rec[n, j] = field[idx]\n    return rec, vxh, vyh\n\n\ndef misfit_and_gradient(C11, C12, C22, C66, rho, h, dt, nt,\n                        src_idx, wavelet, rec_idx, dobs, C16=0.0, C26=0.0):\n    \"\"\"Data misfit J and its gradient w.r.t. all six in-plane stiffness maps.\n\n    Returns (J, {\"C11\", \"C12\", \"C22\", \"C66\", \"C16\", \"C26\"}) for one explosive\n    source recorded as pressure, by reverse-mode differentiation of the exact\n    discrete forward (verified against finite differences; see\n    tests/test_gradient_elastic.py and tests/test_gradient_theta.py). The\n    C16/C26 gradients are what carry c-axis orientation information.\n    \"\"\"\n    ny, nx = rho.shape\n    inv_h = 1.0 / h\n    mono = np.any(C16) or np.any(C26)\n    rec, vxh, vyh = _grad_forward(C11, C12, C22, C66, rho, h, dt, nt,\n                                  src_idx, wavelet, rec_idx, C16, C26)\n    res = rec - dobs\n    J = 0.5 * float(np.sum(res * res))\n\n    lvx = np.zeros((ny, nx)); lvy = np.zeros((ny, nx))\n    lsxx = np.zeros((ny, nx)); lsyy = np.zeros((ny, nx)); lsxy = np.zeros((ny, nx))\n    zeros = np.zeros((ny, nx))\n    g = {k: zeros.copy() for k in (\"C11\", \"C12\", \"C22\", \"C66\", \"C16\", \"C26\")}\n    dtr = dt / rho\n\n    for n in range(nt - 1, -1, -1):\n        vx = vxh[n]; vy = vyh[n]\n        exx = _Dbx(vx, inv_h); eyy = _Dby(vy, inv_h)\n        gxy = _Dfx(vy, inv_h) + _Dfy(vx, inv_h)\n        gc = _corner_to_centre(gxy)\n        exk = _centre_to_corner(exx)\n        eyk = _centre_to_corner(eyy)\n\n        # adjoint of the pressure recording\n        for j, idx in enumerate(rec_idx):\n            lsxx[idx] -= 0.5 * res[n, j]\n            lsyy[idx] -= 0.5 * res[n, j]\n\n        # adjoint of the velocity update (deposits into the stress adjoints)\n        lsxx += _DfxT(dtr * lvx, inv_h)\n        lsxy += _DbyT(dtr * lvx, inv_h) + _DbxT(dtr * lvy, inv_h)\n        lsyy += _DfyT(dtr * lvy, inv_h)\n\n        # gradient accumulation from the stress update\n        g[\"C11\"] += lsxx * dt * exx\n        g[\"C12\"] += lsxx * dt * eyy + lsyy * dt * exx\n        g[\"C22\"] += lsyy * dt * eyy\n        g[\"C66\"] += lsxy * dt * gxy\n        g[\"C16\"] += lsxx * dt * gc + lsxy * dt * exk\n        g[\"C26\"] += lsyy * dt * gc + lsxy * dt * eyk\n\n        # adjoint of the stress update (deposits into the velocity adjoints).\n        # Sensitivity routed through each strain component, including the\n        # centre/corner averaging paths of the monoclinic terms.\n        w_exx = dt * (C11 * lsxx + C12 * lsyy)\n        w_eyy = dt * (C12 * lsxx + C22 * lsyy)\n        w_gxy = dt * (C66 * lsxy)\n        if mono:\n            w_exx = w_exx + _c2k_T(dt * C16 * lsxy)\n            w_eyy = w_eyy + _c2k_T(dt * C26 * lsxy)\n            w_gxy = w_gxy + _k2c_T(dt * (C16 * lsxx + C26 * lsyy))\n        lvx += _DbxT(w_exx, inv_h) + _DfyT(w_gxy, inv_h)\n        lvy += _DbyT(w_eyy, inv_h) + _DfxT(w_gxy, inv_h)\n\n    return J, g\n\n\ndef invert(C11, C12, C22, C66, rho, h, dt, nt, sources, wavelet, rec_idx,\n           dobs_list, n_iter=12, steps=None, params=(\"C11\", \"C22\", \"C66\"),\n           update_mask=None, bounds=None, verbose=False):\n    \"\"\"Multi-source elastic FWI by normalised steepest descent.\n\n    Inverts the stiffness maps named in ``params`` (default: the P and S\n    stiffnesses C11, C22, C66; C12 held fixed to limit cross-talk). ``steps`` is\n    a per-parameter relative step size. Returns the updated maps and the misfit\n    history.\n    \"\"\"\n    C = {\"C11\": np.array(C11, float), \"C12\": np.array(C12, float),\n         \"C22\": np.array(C22, float), \"C66\": np.array(C66, float)}\n    if steps is None:\n        steps = {k: 0.05 for k in params}\n    mask = 1.0 if update_mask is None else update_mask\n    hist = []\n\n    for it in range(n_iter):\n        J = 0.0\n        gtot = {k: np.zeros_like(C[k]) for k in params}\n        for src, dobs in zip(sources, dobs_list):\n            Js, g = misfit_and_gradient(C[\"C11\"], C[\"C12\"], C[\"C22\"], C[\"C66\"],\n                                        rho, h, dt, nt, src, wavelet, rec_idx, dobs)\n            J += Js\n            for k in params:\n                gtot[k] += g[k]\n        for k in params:\n            gmax = np.max(np.abs(gtot[k])) + 1e-30\n            C[k] = C[k] - steps[k] * np.mean(C[k]) * (gtot[k] / gmax) * mask\n            if bounds and k in bounds:\n                C[k] = np.clip(C[k], bounds[k][0], bounds[k][1])\n        hist.append(J)\n        if verbose:\n            print(f\"  iter {it:2d}  misfit {J:.4e}\")\n\n    return C[\"C11\"], C[\"C12\"], C[\"C22\"], C[\"C66\"], hist\n", "simulation/ringfwi/attenuation.py": "\"\"\"Multi-parameter FWI: sound speed and attenuation.\n\nExtends the acoustic model with a viscous loss term so that both the\nsquared slowness ``m = 1/c^2`` and an attenuation field ``a`` can be\nreconstructed. The forward model is the damped wave equation\n\n    m d2p/dt2 + a dp/dt = laplacian(p) + f\n\ndiscretised with a time-symmetric leapfrog (the a-term centred as\n(p^n - p^{n-2}) / 2dt), which keeps the scheme self-adjoint. The exact discrete\nadjoint yields gradients for *both* parameters:\n\n    g_m(x) = (1/dt^2) sum_n lam^n (p^n - 2 p^{n-1} + p^{n-2})\n    g_a(x) = (1/2dt)  sum_n lam^n (p^n - p^{n-2})\n\nBoth are verified against finite differences in tests/test_gradient_attenuation.py.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom .solver import _laplacian\n\n\ndef _forward(m, a, h, dt, nt, sources, rec_idx=None, store=False):\n    \"\"\"Damped leapfrog. Returns (rec, hist).\"\"\"\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    alpha = m / (dt * dt)\n    beta = a / (2.0 * dt)\n    invA = 1.0 / (alpha + beta)\n\n    p_nm2 = np.zeros(shape)   # p^{n-2}\n    p_nm1 = np.zeros(shape)   # p^{n-1}\n    lap = np.zeros(shape)\n\n    rec = None if rec_idx is None else np.zeros((nt, len(rec_idx)))\n    hist = None if not store else np.zeros((nt,) + shape)\n\n    for n in range(1, nt):\n        _laplacian(p_nm1, inv_h2, lap)\n        for idx, series in sources:\n            lap[idx] += series[n - 1]\n        p_n = invA * (2.0 * alpha * p_nm1 + (beta - alpha) * p_nm2 + lap)\n        p_nm2, p_nm1 = p_nm1, p_n\n        if hist is not None:\n            hist[n] = p_n\n        if rec is not None:\n            for j, idx in enumerate(rec_idx):\n                rec[n, j] = p_n[idx]\n    return rec, hist\n\n\ndef forward_fmc(m, a, geom, wavelet, dt, h, nt, src_list=None):\n    \"\"\"Full-matrix-capture forward with attenuation.\"\"\"\n    src_list = list(range(geom.n_elements)) if src_list is None else list(src_list)\n    rec_idx = geom.idx\n    data = np.zeros((len(src_list), nt, geom.n_elements))\n    for i, s in enumerate(src_list):\n        rec, _ = _forward(m, a, h, dt, nt, [(geom.element_index(s), wavelet)], rec_idx)\n        data[i] = rec\n    return data\n\n\ndef misfit(m, a, geom, wavelet, dt, h, nt, dobs, src_list=None):\n    \"\"\"Least-squares waveform misfit (forward only).\"\"\"\n    dsyn = forward_fmc(m, a, geom, wavelet, dt, h, nt, src_list)\n    r = dsyn - dobs\n    return 0.5 * float(np.sum(r * r))\n\n\ndef misfit_and_gradients(m, a, geom, wavelet, dt, h, nt, dobs, src_list=None):\n    \"\"\"Misfit and adjoint-state gradients w.r.t. both m and a.\n\n    Returns (J, g_m, g_a).\n    \"\"\"\n    src_list = list(range(geom.n_elements)) if src_list is None else list(src_list)\n    rec_idx = geom.idx\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    alpha = m / (dt * dt)\n    beta = a / (2.0 * dt)\n    invA = 1.0 / (alpha + beta)\n\n    J = 0.0\n    g_alpha = np.zeros(shape)\n    g_beta = np.zeros(shape)\n    lap = np.zeros(shape)\n\n    for i, s in enumerate(src_list):\n        dsyn, U = _forward(m, a, h, dt, nt, [(geom.element_index(s), wavelet)],\n                           rec_idx, store=True)\n        res = dsyn - dobs[i]\n        J += 0.5 * float(np.sum(res * res))\n\n        lam_p1 = np.zeros(shape)   # lam^{k+1}\n        lam_p2 = np.zeros(shape)   # lam^{k+2}\n        for k in range(nt - 1, 0, -1):\n            _laplacian(lam_p1, inv_h2, lap)\n            lam_k = 2.0 * alpha * lam_p1 + (beta - alpha) * lam_p2 + lap\n            for j, idx in enumerate(rec_idx):\n                lam_k[idx] -= res[k, j]\n            lam_k = lam_k * invA\n\n            Uk = U[k]\n            Uk1 = U[k - 1]\n            Uk2 = U[k - 2] if k >= 2 else 0.0\n            g_alpha += lam_k * (Uk - 2.0 * Uk1 + Uk2)\n            g_beta += lam_k * (Uk - Uk2)\n\n            lam_p2, lam_p1 = lam_p1, lam_k\n\n    g_m = g_alpha / (dt * dt)\n    g_a = g_beta / (2.0 * dt)\n    return J, g_m, g_a\n\n\ndef invert(m0, a0, geom, wavelet, dt, h, nt, dobs, src_list=None, n_iter=12,\n           step_m=0.03, step_a=0.06, update_mask=None, m_bounds=None, a_bounds=None,\n           smooth=1.0, verbose=False):\n    \"\"\"Joint steepest-descent FWI for sound speed and attenuation.\n\n    The two parameters have very different scales, so each takes its own\n    normalised step. Returns (m, a, history).\n    \"\"\"\n    from scipy.ndimage import gaussian_filter\n\n    m = m0.copy()\n    a = a0.copy()\n    m_start, a_start = m0.copy(), a0.copy()\n    history = []\n    for it in range(n_iter):\n        J, gm, ga = misfit_and_gradients(m, a, geom, wavelet, dt, h, nt, dobs, src_list)\n        history.append(J)\n        if verbose:\n            print(f\"  iter {it:2d}  misfit = {J:.6e}\")\n        for g in (gm, ga):\n            if update_mask is not None:\n                g *= update_mask\n        if smooth:\n            gm = gaussian_filter(gm, smooth); ga = gaussian_filter(ga, smooth)\n            if update_mask is not None:\n                gm *= update_mask; ga *= update_mask\n        gmx, gax = float(np.max(np.abs(gm))), float(np.max(np.abs(ga)))\n        if gmx > 0:\n            m = m - step_m * float(np.mean(m)) * gm / gmx\n        if gax > 0:\n            a = a - step_a * float(np.mean(a)) * ga / gax\n        if m_bounds is not None:\n            cm = np.clip(m, m_bounds[0], m_bounds[1])\n            m = np.where(update_mask > 0, cm, m) if update_mask is not None else cm\n        if a_bounds is not None:\n            ca = np.clip(a, a_bounds[0], a_bounds[1])\n            a = np.where(update_mask > 0, ca, a) if update_mask is not None else ca\n    history.append(misfit(m, a, geom, wavelet, dt, h, nt, dobs, src_list))\n    return m, a, history\n", "simulation/ringfwi/axisfield.py": "\"\"\"Voxel-wise c-axis orientation-field FWI in 3D (unknown grain geometry).\n\nEvery voxel of the specimen carries its own crystal orientation (colatitude,\nazimuth) -- your \"each voxel is a function of velocity at every angle\" idea\ntaken literally, with no grain labels anywhere. Grains are not an input: they\nemerge as regions where the recovered axis field is constant.\n\nMachinery:\n* :func:`axis_stiffness_and_derivs` -- per-voxel rotated 21-component\n  stiffness plus analytic d/d(colatitude), d/d(azimuth) via the Bond 6x6\n  transformation (exact, vectorised over voxels).\n* :func:`misfit_and_gradient_axes` -- chains the exact 21-map adjoint of\n  :mod:`ringfwi.elastic3d` through the rotation, giving the exact per-voxel\n  orientation gradient.\n* :func:`block_partition` -- coarse regular blocks over the specimen mask, so\n  the globally-searchable COF machinery (:mod:`ringfwi.cof`) can initialise\n  the field without knowing the true geometry.\n* :func:`smooth_axes` -- orientation-tensor (Q = a a^T) smoothing, the\n  c/-c-safe regulariser that promotes grain-like piecewise-constant fields.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom . import anisotropy as _an\nfrom . import elastic3d as _e3d\n\n_VOIGT3 = ((0, 0), (1, 1), (2, 2), (1, 2), (0, 2), (0, 1))\nKEYS21 = tuple(f\"C{i}{j}\" for i in range(1, 7) for j in range(i, 7))\n\n\n# ---------------------------------------------------------------------------\n# Rotation of the stiffness tensor and its analytic angle derivatives.\n# ---------------------------------------------------------------------------\n\ndef rotations(colat, azim):\n    \"\"\"R = Rz(azim) Ry(colat) per voxel, plus dR/dcolat and dR/dazim.\n\n    ``colat``/``azim`` are flat (P,) arrays; returns three (P, 3, 3) arrays.\n    R maps the crystal frame (c-axis along z) into the lab frame:\n    R zhat = (sin t cos p, sin t sin p, cos t) -- the c-axis of\n    :func:`ringfwi.cof.axes_from_params`.\n    \"\"\"\n    t = np.asarray(colat, float).ravel()\n    p = np.asarray(azim, float).ravel()\n    ct, st = np.cos(t), np.sin(t)\n    cp, sp = np.cos(p), np.sin(p)\n    P = t.size\n    Ry = np.zeros((P, 3, 3)); dRy = np.zeros((P, 3, 3))\n    Ry[:, 0, 0] = ct;  Ry[:, 0, 2] = st\n    Ry[:, 1, 1] = 1.0\n    Ry[:, 2, 0] = -st; Ry[:, 2, 2] = ct\n    dRy[:, 0, 0] = -st; dRy[:, 0, 2] = ct\n    dRy[:, 2, 0] = -ct; dRy[:, 2, 2] = -st\n    Rz = np.zeros((P, 3, 3)); dRz = np.zeros((P, 3, 3))\n    Rz[:, 0, 0] = cp; Rz[:, 0, 1] = -sp\n    Rz[:, 1, 0] = sp; Rz[:, 1, 1] = cp\n    Rz[:, 2, 2] = 1.0\n    dRz[:, 0, 0] = -sp; dRz[:, 0, 1] = -cp\n    dRz[:, 1, 0] = cp;  dRz[:, 1, 1] = -sp\n    R = Rz @ Ry\n    dR_t = Rz @ dRy\n    dR_p = dRz @ Ry\n    return R, dR_t, dR_p\n\n\ndef _bond2(A, B):\n    \"\"\"Bilinear Bond form: (P,3,3),(P,3,3) -> (P,6,6).\n\n    ``_bond2(R, R)`` is the Bond stress-transformation matrix M(R) with\n    C' = M C M^T for engineering-strain Voigt stiffness; the bilinearity gives\n    dM = _bond2(dR, R) + _bond2(R, dR).\n    \"\"\"\n    P = A.shape[0]\n    M = np.zeros((P, 6, 6))\n    for a, (i, j) in enumerate(_VOIGT3):\n        for b, (k, l) in enumerate(_VOIGT3):\n            M[:, a, b] = A[:, i, k] * B[:, j, l]\n            if k != l:\n                M[:, a, b] += A[:, i, l] * B[:, j, k]\n    return M\n\n\ndef axis_stiffness_and_derivs(colat, azim, base6):\n    \"\"\"Per-voxel rotated stiffness and its exact angle derivatives.\n\n    Returns (C, dC_t, dC_p), each (P, 6, 6): the stiffness of ``base6``\n    (crystal frame, c along z) rotated so the c-axis points along\n    (colat, azim), and its derivatives with respect to the two angles.\n    \"\"\"\n    base6 = np.asarray(base6, float)\n    R, dR_t, dR_p = rotations(colat, azim)\n    M = _bond2(R, R)\n    dM_t = _bond2(dR_t, R) + _bond2(R, dR_t)\n    dM_p = _bond2(dR_p, R) + _bond2(R, dR_p)\n    MC = M @ base6\n    C = MC @ np.swapaxes(M, 1, 2)\n    dC_t = (dM_t @ base6) @ np.swapaxes(M, 1, 2) + MC @ np.swapaxes(dM_t, 1, 2)\n    dC_p = (dM_p @ base6) @ np.swapaxes(M, 1, 2) + MC @ np.swapaxes(dM_p, 1, 2)\n    return C, dC_t, dC_p\n\n\ndef build_maps(colat_map, azim_map, mask, base6, Cbg, rho_bg, rho_mat):\n    \"\"\"Full-grid 21 stiffness maps from a voxel axis field.\n\n    Voxels inside ``mask`` get the per-voxel rotated crystal stiffness;\n    everywhere else keeps the background maps ``Cbg`` (couplant). Returns\n    (Cmaps, rho).\n    \"\"\"\n    C, _, _ = axis_stiffness_and_derivs(colat_map[mask], azim_map[mask], base6)\n    Cmaps = {}\n    for key in KEYS21:\n        i, j = int(key[1]) - 1, int(key[2]) - 1\n        m = np.array(Cbg[key], float, copy=True)\n        m[mask] = C[:, i, j]\n        Cmaps[key] = m\n    rho = np.full(mask.shape, float(rho_bg))\n    rho[mask] = float(rho_mat)\n    return Cmaps, rho\n\n\ndef misfit_and_gradient_axes(colat_map, azim_map, mask, base6, Cbg, rho_bg,\n                             rho_mat, h, dt, nt, src_pts_list, wavelet,\n                             rec_groups, dobs, trace_weights=None):\n    \"\"\"Total misfit and exact per-voxel orientation gradient, all sources.\n\n    ``src_pts_list`` is a list (one per transmit) of element footprints;\n    ``dobs`` is (n_tx, nt, n_rx); ``trace_weights`` broadcasts against a\n    single shot (nt, n_rx) or is a list per transmit. Returns\n    (J, g_colat, g_azim) with the gradients full-grid (zero off the mask).\n    \"\"\"\n    Cmaps, rho = build_maps(colat_map, azim_map, mask, base6, Cbg,\n                            rho_bg, rho_mat)\n    J = 0.0\n    g21 = {k: np.zeros(mask.shape) for k in KEYS21}\n    for i_tx, src_pts in enumerate(src_pts_list):\n        tw = (trace_weights[i_tx] if isinstance(trace_weights, (list, tuple))\n              else trace_weights)\n        Js, g = _e3d.misfit_and_gradient(\n            Cmaps, rho, h, dt, nt, None, wavelet, None, dobs[i_tx],\n            src_pts=src_pts, rec_groups=rec_groups, trace_weights=tw)\n        J += Js\n        for k in KEYS21:\n            g21[k] += g[k]\n\n    _, dC_t, dC_p = axis_stiffness_and_derivs(colat_map[mask],\n                                              azim_map[mask], base6)\n    g_t = np.zeros(mask.shape); g_p = np.zeros(mask.shape)\n    gt = np.zeros(int(mask.sum())); gp = np.zeros_like(gt)\n    for key in KEYS21:\n        i, j = int(key[1]) - 1, int(key[2]) - 1\n        gk = g21[key][mask]\n        gt += gk * dC_t[:, i, j]\n        gp += gk * dC_p[:, i, j]\n    g_t[mask] = gt; g_p[mask] = gp\n    return J, g_t, g_p\n\n\n# ---------------------------------------------------------------------------\n# Coarse initialisation and orientation-tensor regularisation.\n# ---------------------------------------------------------------------------\n\ndef block_partition(mask, n_div):\n    \"\"\"Regular ``n_div``^3 block labels over the mask's bounding box.\n\n    Returns (labels, n_blocks) with labels = -1 outside the mask and blocks\n    renumbered densely (empty blocks dropped). These are pseudo-grains for\n    the global coarse search -- they need not match any true geometry.\n    \"\"\"\n    labels = np.full(mask.shape, -1, dtype=int)\n    zz, yy, xx = np.nonzero(mask)\n    edges = []\n    for lo, hi in ((zz.min(), zz.max() + 1), (yy.min(), yy.max() + 1),\n                   (xx.min(), xx.max() + 1)):\n        edges.append(np.linspace(lo, hi, n_div + 1))\n    bz = np.clip(np.searchsorted(edges[0], zz, side=\"right\") - 1, 0, n_div - 1)\n    by = np.clip(np.searchsorted(edges[1], yy, side=\"right\") - 1, 0, n_div - 1)\n    bx = np.clip(np.searchsorted(edges[2], xx, side=\"right\") - 1, 0, n_div - 1)\n    raw = (bz * n_div + by) * n_div + bx\n    uniq, dense = np.unique(raw, return_inverse=True)\n    labels[zz, yy, xx] = dense\n    return labels, len(uniq)\n\n\ndef axes_to_field(labels, axes, mask):\n    \"\"\"Per-block axes -> per-voxel (colat, azim) maps over ``mask``.\"\"\"\n    from .cof import params_from_axes\n    par = params_from_axes(axes)\n    colat = np.zeros(mask.shape); azim = np.zeros(mask.shape)\n    for k in range(len(axes)):\n        m = labels == k\n        colat[m] = par[k, 0]; azim[m] = par[k, 1]\n    return colat, azim\n\n\ndef field_to_axes(colat_map, azim_map):\n    \"\"\"(colat, azim) maps -> unit axis vectors, shape (nz, ny, nx, 3).\"\"\"\n    st, ct = np.sin(colat_map), np.cos(colat_map)\n    return np.stack([st * np.cos(azim_map), st * np.sin(azim_map), ct],\n                    axis=-1)\n\n\ndef smooth_axes(colat_map, azim_map, mask, sigma):\n    \"\"\"Orientation-tensor smoothing of the axis field (c/-c safe).\n\n    Averages Q = a a^T with a Gaussian (restricted to the mask) and returns\n    the principal eigenvector's angles -- the regulariser that respects the\n    axis topology (no angle-wrap seams) and promotes grain-like\n    piecewise-constant fields.\n    \"\"\"\n    from scipy.ndimage import gaussian_filter\n    a = field_to_axes(colat_map, azim_map)\n    w = gaussian_filter(mask.astype(float), sigma) + 1e-12\n    Q = np.zeros(mask.shape + (3, 3))\n    for i in range(3):\n        for j in range(i, 3):\n            q = gaussian_filter(a[..., i] * a[..., j] * mask, sigma) / w\n            Q[..., i, j] = q\n            Q[..., j, i] = q\n    vals, vecs = np.linalg.eigh(Q[mask])\n    v = vecs[..., -1]                                   # principal axis\n    v = np.where(v[:, 2:3] < 0, -v, v)                  # upper hemisphere\n    colat = colat_map.copy(); azim = azim_map.copy()\n    colat[mask] = np.arccos(np.clip(v[:, 2], -1.0, 1.0))\n    azim[mask] = np.arctan2(v[:, 1], v[:, 0])\n    return colat, azim\n\n\ndef gradient_step(colat_map, azim_map, mask, g_t, g_p, step_rad=0.1,\n                  smooth_sigma=0.0):\n    \"\"\"Normalised steepest-descent update of the axis field.\n\n    ``smooth_sigma`` > 0 Gaussian-smooths the GRADIENT (mask-normalised)\n    before the step -- the regularisation that worked for the 2D theta-field\n    FWI. Smoothing the field itself after each step fights the data term\n    (measured: the misfit rises); keep :func:`smooth_axes` for one-off field\n    polishing only. Both ang
