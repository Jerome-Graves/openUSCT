le maps move under one shared normalisation (so\n    azimuth, whose sensitivity vanishes near the poles, is not artificially\n    inflated).\n    \"\"\"\n    if smooth_sigma > 0:\n        from scipy.ndimage import gaussian_filter\n        w = gaussian_filter(mask.astype(float), smooth_sigma) + 1e-12\n        g_t = gaussian_filter(g_t * mask, smooth_sigma) / w * mask\n        g_p = gaussian_filter(g_p * mask, smooth_sigma) / w * mask\n    gmax = max(np.max(np.abs(g_t[mask])), np.max(np.abs(g_p[mask]))) + 1e-30\n    colat = colat_map - step_rad * (g_t / gmax) * mask\n    azim = azim_map - step_rad * (g_p / gmax) * mask\n    return colat, azim\n\n\ndef axis_error_map(colat_map, azim_map, true_axes_map, mask):\n    \"\"\"Per-voxel angular error (degrees) against a true axis field.\"\"\"\n    a = field_to_axes(colat_map, azim_map)\n    dot = np.abs(np.sum(a * true_axes_map, axis=-1))\n    err = np.degrees(np.arccos(np.clip(dot, 0.0, 1.0)))\n    return np.where(mask, err, 0.0)\n\n\n# ---------------------------------------------------------------------------\n# Segment-and-re-search: escape wrong-basin regions that local descent\n# cannot rescue (the measured ~15-20 degree basin limit).\n# ---------------------------------------------------------------------------\n\ndef field_misfit(colat_map, azim_map, mask, base6, Cbg, rho_bg, rho_mat,\n                 h, dt, nt, src_pts_list, wavelet, rec_groups, dobs,\n                 trace_weights=None, device=\"cpu\"):\n    \"\"\"Data misfit of an axis field, forward modelling only (no adjoint).\n\n    Same J as :func:`misfit_and_gradient_axes`, at a third of the cost --\n    what the global segment re-search evaluates per candidate direction.\n    \"\"\"\n    Cmaps, rho = build_maps(colat_map, azim_map, mask, base6, Cbg,\n                            rho_bg, rho_mat)\n    recs = _e3d.forward_batch(Cmaps, rho, h, dt, nt, src_pts_list, wavelet,\n                              rec_groups=rec_groups, device=device)\n    J = 0.0\n    for i_tx in range(len(src_pts_list)):\n        tw = (trace_weights[i_tx] if isinstance(trace_weights, (list, tuple))\n              else trace_weights)\n        res = recs[i_tx] - dobs[i_tx]\n        if tw is not None:\n            res = res * tw\n        J += 0.5 * float(np.sum(res * res))\n    return J\n\n\ndef segment_field(colat_map, azim_map, mask, n_clusters=8, seed=0,\n                  kmeans_iters=25):\n    \"\"\"Cluster the axis field into emergent grains (labels, sizes, order).\n\n    K-means on the orientation-tensor embedding (c/-c safe), then connected\n    components so every segment is spatially contiguous. Returns\n    (seg_labels, sizes, order) with seg_labels = -1 outside the mask and\n    ``order`` the segment ids sorted largest first.\n    \"\"\"\n    from scipy.ndimage import label as _cc_label\n    a = field_to_axes(colat_map, azim_map)[mask]\n    r2 = np.sqrt(2.0)\n    Q = np.stack([a[:, 0] ** 2, a[:, 1] ** 2, a[:, 2] ** 2,\n                  r2 * a[:, 0] * a[:, 1], r2 * a[:, 0] * a[:, 2],\n                  r2 * a[:, 1] * a[:, 2]], axis=1)\n    k = int(min(n_clusters, len(Q)))\n    rng = np.random.default_rng(seed)\n    centers = [Q[rng.integers(len(Q))]]\n    for _ in range(1, k):                                # k-means++ seeding\n        d2 = np.min(((Q[:, None, :] - np.asarray(centers)[None]) ** 2\n                     ).sum(-1), axis=1)\n        tot = d2.sum()\n        if tot <= 0:                     # all points already on a center\n            centers.append(Q[rng.integers(len(Q))])\n        else:\n            centers.append(Q[rng.choice(len(Q), p=d2 / tot)])\n    C = np.asarray(centers)\n    for _ in range(kmeans_iters):\n        idx = np.argmin(((Q[:, None, :] - C[None]) ** 2).sum(-1), axis=1)\n        for c in range(k):\n            m = idx == c\n            if m.any():\n                C[c] = Q[m].mean(0)\n    cl = np.full(mask.shape, -1, dtype=int)\n    cl[mask] = idx\n    seg = np.full(mask.shape, -1, dtype=int)\n    sizes = []\n    for c in range(k):                                   # spatial components\n        comp, ncomp = _cc_label(cl == c)\n        for j in range(1, ncomp + 1):\n            m = comp == j\n            seg[m] = len(sizes)\n            sizes.append(int(m.sum()))\n    order = [int(i) for i in np.argsort(sizes)[::-1]]\n    return seg, sizes, order\n\n\ndef set_segment_axis(colat_map, azim_map, seg_labels, seg_id, direction):\n    \"\"\"Copy of the field with one segment's axis set to ``direction``.\"\"\"\n    d = np.asarray(direction, float)\n    d = d / np.linalg.norm(d)\n    if d[2] < 0:\n        d = -d\n    m = seg_labels == seg_id\n    colat = colat_map.copy(); azim = azim_map.copy()\n    colat[m] = np.arccos(np.clip(d[2], -1.0, 1.0))\n    azim[m] = np.arctan2(d[1], d[0])\n    return colat, azim\n", "simulation/ringfwi/cof.py": "\"\"\"Grain-parameterised crystal-orientation-fabric (COF) inversion.\n\nRecovers per-grain c-axis orientations from elastic full-matrix-capture data\nwith known grain geometry and material: the unknowns are two angles per grain\n(colatitude, azimuth), so the Jacobian of the residual vector is cheap to form\nby finite differences and Gauss-Newton / Levenberg-Marquardt \"Jacobian\niterations\" converge quadratically near the optimum \u2014 the full-waveform\nupgrade of the reduced-forward-model Jacobian iteration used for travel-time\nCOF estimation.\n\nTypical use: a coarse per-grain hemisphere search for initialisation (global),\nthen :func:`jacobian_iterations` for fast, precise convergence.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom . import anisotropy as _an\nfrom . import elastic3d as _e3d\n\n\ndef axes_from_params(params):\n    \"\"\"(G, 2) [colatitude, azimuth] (radians) -> (G, 3) unit c-axis vectors.\"\"\"\n    p = np.asarray(params, float).reshape(-1, 2)\n    th, ph = p[:, 0], p[:, 1]\n    return np.column_stack([np.sin(th) * np.cos(ph),\n                            np.sin(th) * np.sin(ph),\n                            np.cos(th)])\n\n\ndef params_from_axes(axes):\n    \"\"\"(G, 3) unit axes -> (G, 2) [colatitude, azimuth]; upper hemisphere.\"\"\"\n    a = np.asarray(axes, float).reshape(-1, 3)\n    a = np.where(a[:, 2:3] < 0, -a, a)                  # c and -c are equivalent\n    th = np.arccos(np.clip(a[:, 2], -1.0, 1.0))\n    ph = np.arctan2(a[:, 1], a[:, 0])\n    return np.column_stack([th, ph])\n\n\ndef fmc(labels, axes, ring, h, dt, nt, wavelet, src_list, material=None,\n        device=\"auto\"):\n    \"\"\"Elastic full-matrix capture for a polycrystal with the given axes.\n\n    ``device=\"auto\"`` runs on the GPU (CuPy, float32) for grids large enough\n    to benefit; pass \"cpu\" for the float64 reference.\n    \"\"\"\n    Cm, rho = _an.polycrystal_stiffness_3d(labels, axes, material=material)\n    src_pts_list = [[(ring.element_index(s), 1.0)] for s in src_list]\n    return _e3d.forward_batch(Cm, rho, h, dt, nt, src_pts_list, wavelet,\n                              rec_idx=ring.idx, device=device)\n\n\ndef make_residual(labels, ring, h, dt, nt, wavelet, src_list, dobs,\n                  material=None, filter_fn=None, device=\"auto\"):\n    \"\"\"Per-trace-normalised residual vector r(params) and its half-SSQ misfit.\n\n    Each source-receiver trace is normalised by the observed trace energy and\n    the transmitter's own trace is excluded (its near-source blast carries no\n    orientation information and would otherwise dominate).\n\n    ``filter_fn`` is applied to the synthetic data before differencing (pass\n    the same RX front-end filter the observed data went through; the chain is\n    linear so filtering both sides is consistent).\n\n    Returns ``residual(params) -> r`` with J(params) = 0.5 * r.r matching the\n    misfit used by the search-based COF inversion.\n    \"\"\"\n    tr_norm = np.sqrt(np.sum(dobs ** 2, axis=1)) + 1e-30    # (n_tx, n_rx)\n    w = np.ones_like(tr_norm)\n    for i, s in enumerate(src_list):\n        w[i, s] = 0.0\n\n    def residual(params):\n        d = fmc(labels, axes_from_params(params), ring, h, dt, nt, wavelet,\n                src_list, material=material, device=device)\n        if filter_fn is not None:\n            d = filter_fn(d)\n        r = (d - dobs) * (w / tr_norm)[:, None, :]\n        return r.ravel()\n\n    return residual\n\n\ndef jacobian_iterations(residual, params0, n_iter=6, fd_step=np.radians(2.0),\n                        lam0=1e-2, tol=1e-12, verbose=False, n_cols=2):\n    \"\"\"Levenberg-Marquardt Gauss-Newton on a finite-difference Jacobian.\n\n    ``residual(params_flat) -> r``; the Jacobian is formed column-by-column by\n    forward differences with step ``fd_step`` (a scalar, or a per-parameter\n    vector for mixed-unit parameterisations such as the Voronoi-seed\n    inversion's [metres, metres, metres, radians, radians] layout). The\n    damping ``lam`` is adapted per iteration (decrease on success, increase\n    and retry on failure).\n\n    Returns (params, history) with ``history`` the half-SSQ misfit per accepted\n    iteration (first entry = starting misfit).\n    \"\"\"\n    p = np.asarray(params0, float).ravel().copy()\n    n_par = p.size\n    fd = (np.asarray(fd_step, float).ravel() if np.ndim(fd_step)\n          else np.full(n_par, float(fd_step)))\n    assert fd.size == n_par or fd.size == 1\n    if fd.size == 1:\n        fd = np.full(n_par, fd[0])\n    r = residual(p)\n    J_val = 0.5 * float(r @ r)\n    history = [J_val]\n    lam = lam0\n\n    for it in range(n_iter):\n        # finite-difference Jacobian (one forward evaluation per parameter)\n        Jac = np.empty((r.size, n_par))\n        for k in range(n_par):\n            pk = p.copy()\n            pk[k] += fd[k]\n            Jac[:, k] = (residual(pk) - r) / fd[k]\n\n        g = Jac.T @ r\n        H = Jac.T @ Jac\n        accepted = False\n        for _try in range(6):\n            step = np.linalg.solve(H + lam * np.diag(np.diag(H) + 1e-30), -g)\n            p_try = p + step\n            r_try = residual(p_try)\n            J_try = 0.5 * float(r_try @ r_try)\n            if J_try < J_val:\n                p, r, J_val = p_try, r_try, J_try\n                lam = max(lam / 3.0, 1e-8)\n                accepted = True\n                break\n            lam *= 5.0\n        history.append(J_val)\n        if verbose:\n            print(f\"  LM iter {it}: J={J_val:.6e} lam={lam:.1e} \"\n                  f\"{'accepted' if accepted else 'stalled'}\", flush=True)\n        if not accepted or J_val < tol:\n            break\n\n    return (p.reshape(-1, n_cols) if n_cols else p), history\n\n\ndef axis_error_deg(a, b):\n    \"\"\"Angle between two c-axes (degrees), respecting the c/-c symmetry.\"\"\"\n    return float(np.degrees(np.arccos(np.clip(\n        abs(float(np.dot(np.asarray(a, float), np.asarray(b, float)))), 0.0, 1.0))))\n", "simulation/ringfwi/dataset.py": "\"\"\"Portable acquisition dataset: the shared contract across the platform.\n\nA :class:`Dataset` is the raw product of an acquisition, whether it came from\nthe simulator or (later) from the hardware. It bundles the array geometry, the\nfull-matrix-capture channel data, and the acquisition parameters, and it\nserialises to a single self-describing HDF5 file so that Python, MATLAB, and C++\nall read and write the same thing.\n\nThe geometry is stored in physical coordinates (metres, origin at the array\ncentre) and is deliberately independent of any simulation grid, so the same\ndataset images identically no matter how it was produced. The HDF5 layout is\nspecified in software/schema/.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nFORMAT_VERSION = \"1.0\"\n\n\n@dataclass\nclass ArrayGeometry:\n    \"\"\"Transducer array geometry in physical coordinates.\n\n    element_pos : (n_elements, dim) ndarray\n        Element positions in metres, origin at the array centre. ``dim`` is 2\n        for a planar ring or 3 for a cylindrical array.\n    \"\"\"\n\n    element_pos: np.ndarray\n    radius_m: float\n    centre_freq_hz: float\n    array_type: str = \"ring\"\n\n    @property\n    def n_elements(self):\n        return self.element_pos.shape[0]\n\n    @property\n    def dim(self):\n        return self.element_pos.shape[1]\n\n    @classmethod\n    def ring(cls, n_elements, radius_m, centre_freq_hz):\n        \"\"\"Evenly spaced planar ring of elements centred on the origin (2D).\"\"\"\n        ang = np.linspace(0.0, 2.0 * np.pi, n_elements, endpoint=False)\n        xy = np.column_stack([radius_m * np.cos(ang), radius_m * np.sin(ang)])\n        return cls(xy, radius_m, centre_freq_hz, \"ring\")\n\n    @classmethod\n    def cylinder(cls, n_rings, per_ring, radius_m, height_m, centre_freq_hz):\n        \"\"\"Rings of elements stacked along the z axis, centred on the origin (3D).\"\"\"\n        zs = np.array([0.0]) if n_rings == 1 else np.linspace(-height_m / 2, height_m / 2, n_rings)\n        ang = np.linspace(0.0, 2.0 * np.pi, per_ring, endpoint=False)\n        pos = [[radius_m * np.cos(a), radius_m * np.sin(a), z] for z in zs for a in ang]\n        return cls(np.asarray(pos), radius_m, centre_freq_hz, \"cylinder\")\n\n\n@dataclass\nclass Dataset:\n    \"\"\"A full-matrix-capture acquisition plus its geometry and parameters.\n\n    data : (n_tx, n_samples, n_rx) ndarray\n        Channel time series; element ``i`` transmits, element ``j`` records.\n    sample_rate_hz : float\n    tx_wavelet : (n_samples,) ndarray\n    tx_centre_freq_hz : float\n    nominal_speed_m_s : float\n        Assumed background sound speed used by delay-based imaging.\n    ground_truth : dict or None\n        Optional simulation ground truth: {\"c\": (ny, nx), \"h_m\": float}.\n    \"\"\"\n\n    geometry: ArrayGeometry\n    data: np.ndarray\n    sample_rate_hz: float\n    tx_wavelet: np.ndarray\n    tx_centre_freq_hz: float\n    nominal_speed_m_s: float\n    tx_elements: np.ndarray | None = None\n    ground_truth: dict | None = None\n    metadata: dict = field(default_factory=dict)\n\n    def __post_init__(self):\n        # tx_elements maps each transmit index to an element index in the\n        # geometry. Defaults to \"every element transmitted, in order\".\n        if self.tx_elements is None:\n            self.tx_elements = np.arange(self.data.shape[0])\n        else:\n            self.tx_elements = np.asarray(self.tx_elements)\n\n    @property\n    def n_tx(self):\n        return self.data.shape[0]\n\n    @property\n    def n_samples(self):\n        return self.data.shape[1]\n\n    @property\n    def n_rx(self):\n        return self.data.shape[2]\n\n    @property\n    def dt(self):\n        return 1.0 / self.sample_rate_hz\n\n    # -- serialisation ---------------------------------------------------------\n    def save(self, path):\n        \"\"\"Write the dataset to a self-describing HDF5 file.\"\"\"\n        import h5py\n\n        with h5py.File(path, \"w\") as f:\n            f.attrs[\"format_version\"] = FORMAT_VERSION\n            f.attrs[\"description\"] = self.metadata.get(\"description\", \"\")\n            f.attrs[\"created_by\"] = self.metadata.get(\"created_by\", \"OpenUSCT\")\n\n            g = f.create_group(\"geometry\")\n            g.attrs[\"n_elements\"] = self.geometry.n_elements\n            g.attrs[\"radius_m\"] = self.geometry.radius_m\n            g.attrs[\"centre_freq_hz\"] = self.geometry.centre_freq_hz\n            g.attrs[\"array_type\"] = self.geometry.array_type\n            g.create_dataset(\"element_pos\", data=self.geometry.element_pos)\n\n            a = f.create_group(\"acquisition\")\n            a.attrs[\"sample_rate_hz\"] = self.sample_rate_hz\n            a.attrs[\"tx_centre_freq_hz\"] = self.tx_centre_freq_hz\n            a.attrs[\"nominal_speed_m_s\"] = self.nominal_speed_m_s\n            a.create_dataset(\"data\", data=self.data.astype(np.float32), compression=\"gzip\")\n            a.create_dataset(\"tx_wavelet\", data=self.tx_wavelet)\n            a.create_dataset(\"tx_elements\", data=np.asarray(self.tx_elements))\n\n            if self.ground_truth is not None:\n                t = f.create_group(\"ground_truth\")\n                t.attrs[\"h_m\"] = self.ground_truth[\"h_m\"]\n                t.create_dataset(\"c\", data=self.ground_truth[\"c\"], compression=\"gzip\")\n\n    @classmethod\n    def load(cls, path):\n        \"\"\"Read a dataset from an HDF5 file written by :meth:`save`.\"\"\"\n        import h5py\n\n        with h5py.File(path, \"r\") as f:\n            g = f[\"geometry\"]\n            geom = ArrayGeometry(\n                element_pos=g[\"element_pos\"][()],\n                radius_m=float(g.attrs[\"radius_m\"]),\n                centre_freq_hz=float(g.attrs[\"centre_freq_hz\"]),\n                array_type=str(g.attrs[\"array_type\"]),\n            )\n            a = f[\"acquisition\"]\n            gt = None\n            if \"ground_truth\" in f:\n                t = f[\"ground_truth\"]\n                gt = {\"c\": t[\"c\"][()], \"h_m\": float(t.attrs[\"h_m\"])}\n            tx_elements = a[\"tx_elements\"][()] if \"tx_elements\" in a else None\n            return cls(\n                geometry=geom,\n                data=a[\"data\"][()],\n                sample_rate_hz=float(a.attrs[\"sample_rate_hz\"]),\n                tx_wavelet=a[\"tx_wavelet\"][()],\n                tx_centre_freq_hz=float(a.attrs[\"tx_centre_freq_hz\"]),\n                nominal_speed_m_s=float(a.attrs[\"nominal_speed_m_s\"]),\n                tx_elements=tx_elements,\n                ground_truth=gt,\n                metadata={\n                    \"description\": str(f.attrs.get(\"description\", \"\")),\n                    \"created_by\": str(f.attrs.get(\"created_by\", \"\")),\n                    \"format_version\": str(f.attrs.get(\"format_version\", \"\")),\n                },\n            )\n", "simulation/ringfwi/elastic.py": "\"\"\"2D elastic wave propagation (velocity-stress staggered grid).\n\nIsotropic elastodynamics solved with the standard Virieux (1986) velocity-stress\nstaggered-grid scheme, which supports both compressional (P) and shear (S)\nwaves. This is the forward-model foundation for elastic FWI and matches the\nstaggered-grid elastodynamic framework used for crystal-orientation-fabric work\nin ice cores.\n\nFields (each stored on an [iy, ix] grid, staggered in the usual way):\n    vx  at (ix+1/2, iy)      vy  at (ix, iy+1/2)\n    sxx, syy at (ix, iy)     sxy at (ix+1/2, iy+1/2)\n\nGoverning equations (density rho, Lame parameters lambda, mu):\n    rho dvx/dt = dsxx/dx + dsxy/dy\n    rho dvy/dt = dsxy/dx + dsyy/dy\n    dsxx/dt = (lambda+2mu) dvx/dx + lambda dvy/dy\n    dsyy/dt = lambda dvx/dx + (lambda+2mu) dvy/dy\n    dsxy/dt = mu (dvy/dx + dvx/dy)\n\nwith wave speeds Vp = sqrt((lambda+2mu)/rho), Vs = sqrt(mu/rho).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef lame_from_speeds(vp, vs, rho):\n    \"\"\"Lame parameters from P/S speeds and density.\"\"\"\n    mu = rho * vs * vs\n    lam = rho * vp * vp - 2.0 * mu\n    return lam, mu\n\n\ndef forward(vp, vs, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n            source=\"explosive\", record=\"pressure\", store=False):\n    \"\"\"Elastic forward model.\n\n    source : \"explosive\" injects into sxx+syy (pure P); \"fx\"/\"fy\" inject a body\n             force into vx/vy (radiates P and S).\n    record : \"pressure\" records -(sxx+syy)/2; \"vx\"/\"vy\" record a velocity.\n    Returns (rec, hist) where hist is the pressure field history if ``store``.\n    \"\"\"\n    ny, nx = vp.shape\n    lam, mu = lame_from_speeds(vp, vs, rho)\n    lam2mu = lam + 2.0 * mu\n    inv_h = 1.0 / h\n\n    vx = np.zeros((ny, nx)); vy = np.zeros((ny, nx))\n    sxx = np.zeros((ny, nx)); syy = np.zeros((ny, nx)); sxy = np.zeros((ny, nx))\n    rec = np.zeros((nt, len(rec_idx)))\n    hist = None if not store else np.zeros((nt, ny, nx))\n\n    for n in range(nt):\n        # --- stress update (uses current velocities) ---\n        dvx_dx = np.zeros((ny, nx)); dvx_dx[:, 1:] = (vx[:, 1:] - vx[:, :-1]) * inv_h\n        dvy_dy = np.zeros((ny, nx)); dvy_dy[1:, :] = (vy[1:, :] - vy[:-1, :]) * inv_h\n        sxx += dt * (lam2mu * dvx_dx + lam * dvy_dy)\n        syy += dt * (lam * dvx_dx + lam2mu * dvy_dy)\n        dvy_dx = np.zeros((ny, nx)); dvy_dx[:, :-1] = (vy[:, 1:] - vy[:, :-1]) * inv_h\n        dvx_dy = np.zeros((ny, nx)); dvx_dy[:-1, :] = (vx[1:, :] - vx[:-1, :]) * inv_h\n        sxy += dt * mu * (dvy_dx + dvx_dy)\n\n        if source == \"explosive\":\n            sxx[src_idx] += wavelet[n]; syy[src_idx] += wavelet[n]\n\n        # --- velocity update (uses new stresses) ---\n        dsxx_dx = np.zeros((ny, nx)); dsxx_dx[:, :-1] = (sxx[:, 1:] - sxx[:, :-1]) * inv_h\n        dsxy_dy = np.zeros((ny, nx)); dsxy_dy[1:, :] = (sxy[1:, :] - sxy[:-1, :]) * inv_h\n        vx += (dt / rho) * (dsxx_dx + dsxy_dy)\n        dsxy_dx = np.zeros((ny, nx)); dsxy_dx[:, 1:] = (sxy[:, 1:] - sxy[:, :-1]) * inv_h\n        dsyy_dy = np.zeros((ny, nx)); dsyy_dy[:-1, :] = (syy[1:, :] - syy[:-1, :]) * inv_h\n        vy += (dt / rho) * (dsxy_dx + dsyy_dy)\n\n        if source == \"fx\":\n            vx[src_idx] += wavelet[n] * (dt / rho[src_idx] if np.ndim(rho) else dt / rho)\n        elif source == \"fy\":\n            vy[src_idx] += wavelet[n] * (dt / rho[src_idx] if np.ndim(rho) else dt / rho)\n\n        field = (-(sxx + syy) / 2.0 if record == \"pressure\"\n                 else vx if record == \"vx\" else vy)\n        for j, idx in enumerate(rec_idx):\n            rec[n, j] = field[idx]\n        if hist is not None:\n            hist[n] = np.sqrt(vx * vx + vy * vy)   # shows both P and S fronts\n\n    return rec, hist\n", "simulation/ringfwi/elastic3d.py": "\"\"\"3D anisotropic elastic wave propagation (velocity-stress staggered grid).\n\nFull elastodynamics with a general 21-component stiffness tensor, so an\narbitrarily oriented anisotropic crystal (for example ice Ih with any 3D c-axis)\nis propagated with its complete physics: quasi-P, both quasi-S waves, and all\nmode conversion. This is the 3D extension of the verified 2D solvers in\n:mod:`ringfwi.elastic` / :mod:`ringfwi.anisotropy`.\n\nGrid (axis order (z, y, x), offsets in half cells):\n    vx (0,0,+)  vy (0,+,0)  vz (+,0,0)\n    sxx, syy, szz at cell centres (0,0,0)\n    syz (+,+,0)  sxz (+,0,+)  sxy (0,+,+)\n\nStress rates follow sigma_I = C_IJ gamma_J in Voigt notation with engineering\nshear strains gamma = (exx, eyy, ezz, 2eyz, 2exz, 2exy). Each strain component\nlives at its natural staggered position; off-diagonal stiffness couplings move\nstrains between positions with half-cell averaging (the same treatment the 2D\nmonoclinic C16/C26 terms use).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n# Half-cell offsets (z, y, x) of each staggered position.\n_POS = {\"c\": (0, 0, 0), \"yz\": (1, 1, 0), \"xz\": (1, 0, 1), \"xy\": (0, 1, 1)}\n# Voigt index -> position of that stress/strain component.\n_VPOS = {1: \"c\", 2: \"c\", 3: \"c\", 4: \"yz\", 5: \"xz\", 6: \"xy\"}\n_AX = {\"z\": -3, \"y\": -2, \"x\": -1}\n\n\ndef _sl(f, ax):\n    \"\"\"(hi, lo) slicing tuples along ``ax`` for arrays with any lead axes.\"\"\"\n    hi = [slice(None)] * f.ndim; lo = [slice(None)] * f.ndim\n    hi[ax] = slice(1, None); lo[ax] = slice(0, -1)\n    return tuple(hi), tuple(lo)\n\n\ndef _Db(f, ax, inv_h):\n    \"\"\"Backward difference along ``ax`` (half -> integer position).\"\"\"\n    g = np.zeros_like(f)\n    hi, lo = _sl(f, ax)\n    g[hi] = (f[hi] - f[lo]) * inv_h\n    return g\n\n\ndef _Df(f, ax, inv_h):\n    \"\"\"Forward difference along ``ax`` (integer -> half position).\"\"\"\n    g = np.zeros_like(f)\n    hi, lo = _sl(f, ax)\n    g[lo] = (f[hi] - f[lo]) * inv_h\n    return g\n\n\ndef _avg_axis(f, ax, d):\n    \"\"\"Half-cell average along ``ax``: d=+1 integer->half, d=-1 half->integer.\"\"\"\n    g = np.zeros_like(f)\n    hi, lo = _sl(f, ax)\n    if d > 0:\n        g[lo] = 0.5 * (f[lo] + f[hi])\n    else:\n        g[hi] = 0.5 * (f[lo] + f[hi])\n    return g\n\n\ndef _move(f, src, dst):\n    \"\"\"Move a field between staggered positions by half-cell averaging.\"\"\"\n    for ax in range(3):\n        d = _POS[dst][ax] - _POS[src][ax]\n        if d:\n            f = _avg_axis(f, ax - 3, d)     # last three axes (batch-safe)\n    return f\n\n\ndef _DbT(g, ax, inv_h):\n    \"\"\"Exact transpose of :func:`_Db`.\"\"\"\n    o = np.zeros_like(g)\n    hi, lo = _sl(g, ax)\n    q = g[hi] * inv_h\n    o[hi] += q\n    o[lo] -= q\n    return o\n\n\ndef _DfT(g, ax, inv_h):\n    \"\"\"Exact transpose of :func:`_Df`.\"\"\"\n    o = np.zeros_like(g)\n    hi, lo = _sl(g, ax)\n    q = g[lo] * inv_h\n    o[hi] += q\n    o[lo] -= q\n    return o\n\n\ndef _avg_axis_T(g, ax, d):\n    \"\"\"Exact transpose of :func:`_avg_axis`.\"\"\"\n    o = np.zeros_like(g)\n    hi, lo = _sl(g, ax)\n    q = 0.5 * (g[lo] if d > 0 else g[hi])\n    o[lo] += q\n    o[hi] += q\n    return o\n\n\ndef _move_T(g, src, dst):\n    \"\"\"Exact transpose of ``_move(., src, dst)`` (maps adjoints dst -> src).\"\"\"\n    for ax in (2, 1, 0):\n        d = _POS[dst][ax] - _POS[src][ax]\n        if d:\n            g = _avg_axis_T(g, ax - 3, d)   # last three axes (batch-safe)\n    return g\n\n\nGRAD_KEYS = tuple(f\"C{i}{j}\" for i in range(1, 7) for j in range(i, 7))\n\n\ndef gpu_available():\n    \"\"\"True when CuPy and a CUDA device are usable.\"\"\"\n    try:\n        import cupy as cp\n        return cp.cuda.runtime.getDeviceCount() > 0\n    except Exception:\n        return False\n\n\ndef forward(C, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n            source=\"explosive\", record=\"pressure\", store=False,\n            src_pts=None, rec_groups=None, device=\"cpu\"):\n    \"\"\"Full 3D anisotropic elastic forward model.\n\n    C : dict with the 21 upper-triangle Voigt stiffnesses, keys \"C11\"..\"C66\"\n        (engineering-strain convention); each a scalar or (nz, ny, nx) array.\n    rho : (nz, ny, nx) array. Indices are (iz, iy, ix).\n    source : \"explosive\" (into sxx+syy+szz, quasi-P) or \"fx\"/\"fy\"/\"fz\".\n    record : \"pressure\" (-(sxx+syy+szz)/3), \"vx\", \"vy\" or \"vz\".\n\n    Finite-aperture elements: ``src_pts`` (list of (idx, weight)) spreads the\n    transmit over an element footprint; ``rec_groups`` (list over receivers of\n    (idx_list, weights)) records the weighted-average field over each footprint.\n\n    device : \"cpu\" (float64 NumPy, the verified reference), \"gpu\" (float32\n    CuPy) or \"auto\" (GPU when available). The wavefield history (``store``)\n    stays on the CPU path.\n    \"\"\"\n    use_gpu = False\n    if device in (\"auto\", \"gpu\") and not store:\n        big_enough = device == \"gpu\" or np.asarray(rho).size >= 40000\n        if gpu_available() and big_enough:\n            use_gpu = True                  # below ~40k cells launch overhead\n        elif device == \"gpu\":               # loses to the CPU, so \"auto\" stays\n            raise RuntimeError(\"device='gpu' requested but CuPy/CUDA unavailable\")\n    if use_gpu:\n        import cupy as xp\n        dtype = xp.float32\n    else:\n        xp = np\n        dtype = np.float64\n\n    rho_h = np.asarray(rho, float)\n    nz, ny, nx = rho_h.shape\n    inv_h = 1.0 / h\n\n    # Activity decided on the host arrays (avoids device syncs per pair).\n    def cij_host(i, j):\n        return C[f\"C{min(i, j)}{max(i, j)}\"]\n\n    active = {(I, J): bool(np.any(cij_host(I, J))) for I in range(1, 7)\n              for J in range(1, 7)}\n    Cd = {k: (xp.asarray(v, dtype) if np.ndim(v) else float(v))\n          for k, v in C.items()}\n\n    def cij(i, j):\n        return Cd[f\"C{min(i, j)}{max(i, j)}\"]\n\n    rho = xp.asarray(rho_h, dtype)\n    if src_pts is None:\n        src_pts = [(src_idx, 1.0)]\n\n    def _lin(t):\n        return (t[0] * ny + t[1]) * nx + t[2]\n\n    # Vectorised receiver sampling (per-element reads would sync the GPU).\n    if rec_groups is not None:\n        kmax = max(len(idxs) for idxs, _ in rec_groups)\n        idx_mat = np.zeros((len(rec_groups), kmax), dtype=np.int64)\n        w_mat = np.zeros((len(rec_groups), kmax))\n        for j, (idxs, ws) in enumerate(rec_groups):\n            for k_, (ix, wi) in enumerate(zip(idxs, ws)):\n                idx_mat[j, k_] = _lin(ix)\n                w_mat[j, k_] = wi\n        idx_mat = xp.asarray(idx_mat)\n        w_mat = xp.asarray(w_mat, dtype)\n        n_rx = len(rec_groups)\n    else:\n        rec_lin = xp.asarray(np.array([_lin(t) for t in rec_idx], dtype=np.int64))\n        n_rx = len(rec_idx)\n\n    vx = xp.zeros((nz, ny, nx), dtype); vy = xp.zeros((nz, ny, nx), dtype)\n    vz = xp.zeros((nz, ny, nx), dtype)\n    s = {I: xp.zeros((nz, ny, nx), dtype) for I in range(1, 7)}\n    rec = xp.zeros((nt, n_rx), dtype)\n    hist = None if not store else np.zeros((nt, nz, ny, nx))\n    Z, Y, X = _AX[\"z\"], _AX[\"y\"], _AX[\"x\"]\n\n    for n in range(nt):\n        # --- strain rates at their native positions (engineering shears) ---\n        gam = {1: _Db(vx, X, inv_h), 2: _Db(vy, Y, inv_h), 3: _Db(vz, Z, inv_h),\n               4: _Df(vz, Y, inv_h) + _Df(vy, Z, inv_h),\n               5: _Df(vz, X, inv_h) + _Df(vx, Z, inv_h),\n               6: _Df(vy, X, inv_h) + _Df(vx, Y, inv_h)}\n\n        moved = {}\n\n        def strain_at(J, pos):\n            key = (J, pos)\n            if key not in moved:\n                moved[key] = (gam[J] if _VPOS[J] == pos\n                              else _move(gam[J], _VPOS[J], pos))\n            return moved[key]\n\n        # --- stress update: sigma_I += dt * C_IJ gamma_J ---\n        for I in range(1, 7):\n            pos = _VPOS[I]\n            rate = None\n            for J in range(1, 7):\n                if not active[(I, J)]:\n                    continue\n                term = cij(I, J) * strain_at(J, pos)\n                rate = term if rate is None else rate + term\n            if rate is not None:\n                s[I] += dt * rate\n\n        if source == \"explosive\":\n            for idx, w in src_pts:\n                for I in (1, 2, 3):\n                    s[I][idx] += wavelet[n] * w\n\n        # --- velocity update ---\n        vx += (dt / rho) * (_Df(s[1], X, inv_h) + _Db(s[6], Y, inv_h) + _Db(s[5], Z, inv_h))\n        vy += (dt / rho) * (_Db(s[6], X, inv_h) + _Df(s[2], Y, inv_h) + _Db(s[4], Z, inv_h))\n        vz += (dt / rho) * (_Db(s[5], X, inv_h) + _Db(s[4], Y, inv_h) + _Df(s[3], Z, inv_h))\n\n        if source == \"fx\":\n            vx[src_idx] += wavelet[n] * dt\n        elif source == \"fy\":\n            vy[src_idx] += wavelet[n] * dt\n        elif source == \"fz\":\n            vz[src_idx] += wavelet[n] * dt\n\n        if record == \"pressure\":\n            field = -(s[1] + s[2] + s[3]) / 3.0\n        else:\n            field = {\"vx\": vx, \"vy\": vy, \"vz\": vz}[record]\n        flat = field.ravel()\n        if rec_groups is not None:\n            rec[n] = (flat[idx_mat] * w_mat).sum(axis=1)\n        else:\n            rec[n] = flat[rec_lin]\n        if hist is not None:\n            hist[n] = np.sqrt(vx * vx + vy * vy + vz * vz)\n\n    if use_gpu:\n        import cupy as cp\n        rec = cp.asnumpy(rec).astype(np.float64)\n    return rec, hist\n\n\n# ---------------------------------------------------------------------------\n# Exact discrete adjoint: gradient of the data misfit with respect to all 21\n# stiffness maps, by reverse-mode differentiation of the forward above. The\n# same construction as the verified 2D full-stiffness adjoint in\n# ringfwi.anisotropy (see tests/test_gradient_elastic3d.py for the\n# finite-difference verification).\n# ---------------------------------------------------------------------------\n\ndef _grad_forward(C, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n                  src_pts=None, rec_groups=None):\n    \"\"\"Explosive-source / pressure-record forward storing velocity history.\n\n    Identical physics to :func:`forward` (CPU float64 path) but keeps\n    vx/vy/vz at the start of every step -- the state the adjoint needs to\n    rebuild the strain rates in reverse.\n    \"\"\"\n    rho = np.asarray(rho, float)\n    nz, ny, nx = rho.shape\n    inv_h = 1.0 / h\n\n    def cij(i, j):\n        return C[f\"C{min(i, j)}{max(i, j)}\"]\n\n    active = {(I, J): bool(np.any(cij(I, J))) for I in range(1, 7)\n              for J in range(1, 7)}\n    if src_pts is None:\n        src_pts = [(src_idx, 1.0)]\n    n_rx = len(rec_groups) if rec_groups is not None else len(rec_idx)\n\n    vx = np.zeros((nz, ny, nx)); vy = np.zeros((nz, ny, nx))\n    vz = np.zeros((nz, ny, nx))\n    s = {I: np.zeros((nz, ny, nx)) for I in range(1, 7)}\n    rec = np.zeros((nt, n_rx))\n    vh = np.zeros((nt, 3, nz, ny, nx))\n    Z, Y, X = _AX[\"z\"], _AX[\"y\"], _AX[\"x\"]\n\n    for n in range(nt):\n        vh[n, 0] = vx; vh[n, 1] = vy; vh[n, 2] = vz\n        gam = {1: _Db(vx, X, inv_h), 2: _Db(vy, Y, inv_h), 3: _Db(vz, Z, inv_h),\n               4: _Df(vz, Y, inv_h) + _Df(vy, Z, inv_h),\n               5: _Df(vz, X, inv_h) + _Df(vx, Z, inv_h),\n               6: _Df(vy, X, inv_h) + _Df(vx, Y, inv_h)}\n        moved = {}\n\n        def strain_at(J, pos):\n            key = (J, pos)\n            if key not in moved:\n                moved[key] = (gam[J] if _VPOS[J] == pos\n                              else _move(gam[J], _VPOS[J], pos))\n            return moved[key]\n\n        for I in range(1, 7):\n            pos = _VPOS[I]\n            rate = None\n            for J in range(1, 7):\n                if not active[(I, J)]:\n                    continue\n                term = cij(I, J) * strain_at(J, pos)\n                rate = term if rate is None else rate + term\n            if rate is not None:\n                s[I] += dt * rate\n\n        for idx, w in src_pts:\n            for I in (1, 2, 3):\n                s[I][idx] += wavelet[n] * w\n\n        vx += (dt / rho) * (_Df(s[1], X, inv_h) + _Db(s[6], Y, inv_h) + _Db(s[5], Z, inv_h))\n        vy += (dt / rho) * (_Db(s[6], X, inv_h) + _Df(s[2], Y, inv_h) + _Db(s[4], Z, inv_h))\n        vz += (dt / rho) * (_Db(s[5], X, inv_h) + _Db(s[4], Y, inv_h) + _Df(s[3], Z, inv_h))\n\n        field = -(s[1] + s[2] + s[3]) / 3.0\n        if rec_groups is not None:\n            for j, (idxs, ws) in enumerate(rec_groups):\n                rec[n, j] = sum(wi * field[ix] for ix, wi in zip(idxs, ws))\n        else:\n            for j, idx in enumerate(rec_idx):\n                rec[n, j] = field[idx]\n    return rec, vh\n\n\ndef misfit_and_gradient(C, rho, h, dt, nt, src_idx, wavelet, rec_idx, dobs,\n                        src_pts=None, rec_groups=None, trace_weights=None,\n                        grad_keys=None):\n    \"\"\"Data misfit J and its gradient w.r.t. the 21 stiffness maps.\n\n    One explosive source recorded as pressure; J = 0.5 ||W (rec - dobs)||^2\n    with optional ``trace_weights`` W (broadcast against (nt, n_rx)).\n    Returns (J, {key: (nz, ny, nx) gradient}) for ``grad_keys`` (default: all\n    21 upper-triangle keys). Exact to the discrete forward, so gradients are\n    returned even for stiffnesses that are currently zero (the angle chain\n    rule needs them).\n    \"\"\"\n    rho = np.asarray(rho, float)\n    nz, ny, nx = rho.shape\n    inv_h = 1.0 / h\n    if grad_keys is None:\n        grad_keys = GRAD_KEYS\n\n    def cij(i, j):\n        return C[f\"C{min(i, j)}{max(i, j)}\"]\n\n    active = {(I, J): bool(np.any(cij(I, J))) for I in range(1, 7)\n              for J in range(1, 7)}\n    rec, vh = _grad_forward(C, rho, h, dt, nt, src_idx, wavelet, rec_idx,\n                            src_pts=src_pts, rec_groups=rec_groups)\n    res = rec - dobs\n    if trace_weights is not None:\n        res = res * trace_weights\n    J = 0.5 * float(np.sum(res * res))\n    if trace_weights is not None:\n        res = res * trace_weights        # adjoint source: W^T W (rec - dobs)\n\n    lv = {a: np.zeros((nz, ny, nx)) for a in \"xyz\"}\n    ls = {I: np.zeros((nz, ny, nx)) for I in range(1, 7)}\n    g = {k: np.zeros((nz, ny, nx)) for k in grad_keys}\n    dtr = dt / rho\n    Z, Y, X = _AX[\"z\"], _AX[\"y\"], _AX[\"x\"]\n\n    for n in range(nt - 1, -1, -1):\n        vx, vy, vz = vh[n, 0], vh[n, 1], vh[n, 2]\n        gam = {1: _Db(vx, X, inv_h), 2: _Db(vy, Y, inv_h), 3: _Db(vz, Z, inv_h),\n               4: _Df(vz, Y, inv_h) + _Df(vy, Z, inv_h),\n               5: _Df(vz, X, inv_h) + _Df(vx, Z, inv_h),\n               6: _Df(vy, X, inv_h) + _Df(vx, Y, inv_h)}\n        moved = {}\n\n        def strain_at(J, pos):\n            key = (J, pos)\n            if key not in moved:\n                moved[key] = (gam[J] if _VPOS[J] == pos\n                              else _move(gam[J], _VPOS[J], pos))\n            return moved[key]\n\n        # adjoint of the pressure recording\n        if rec_groups is not None:\n            for j, (idxs, ws) in enumerate(rec_groups):\n                for ix, wi in zip(idxs, ws):\n                    q = res[n, j] * wi / 3.0\n                    ls[1][ix] -= q; ls[2][ix] -= q; ls[3][ix] -= q\n        else:\n            for j, idx in enumerate(rec_idx):\n                q = res[n, j] / 3.0\n                ls[1][idx] -= q; ls[2][idx] -= q; ls[3][idx] -= q\n\n        # adjoint of the velocity update (deposits into the stress adjoints)\n        ls[1] += _DfT(dtr * lv[\"x\"], X, inv_h)\n        ls[6] += _DbT(dtr * lv[\"x\"], Y, inv_h) + _DbT(dtr * lv[\"y\"], X, inv_h)\n        ls[5] += _DbT(dtr * lv[\"x\"], Z, inv_h) + _DbT(dtr * lv[\"z\"], X, inv_h)\n        ls[2] += _DfT(dtr * lv[\"y\"], Y, inv_h)\n        ls[4] += _DbT(dtr * lv[\"y\"], Z, inv_h) + _DbT(dtr * lv[\"z\"], Y, inv_h)\n        ls[3] += _DfT(dtr * lv[\"z\"], Z, inv_h)\n\n        # gradient accumulation from the stress update\n        for key in grad_keys:\n            i, j = int(key[1]), int(key[2])\n            if i == j:\n                g[key] += ls[i] * dt * gam[i]\n            else:\n                g[key] += (ls[i] * dt * strain_at(j, _VPOS[i])\n                           + ls[j] * dt * strain_at(i, _VPOS[j]))\n\n        # adjoint of the stress update (deposits into the velocity adjoints).\n        # w_J collects, at gamma_J's native position, the sensitivity routed\n        # through every active C_IJ coupling (transposed half-cell averaging).\n        w = {}\n        for Jv in range(1, 7):\n            acc = None\n            for p in (\"c\", \"yz\", \"xz\", \"xy\"):\n                tmp = None\n                for I in range(1, 7):\n                    if _VPOS[I] != p or not active[(I, Jv)]:\n                        continue\n                    term = dt * cij(I, Jv) * ls[I]\n                    tmp = term if tmp is None else tmp + term\n                if tmp is None:\n                    continue\n                if p != _VPOS[Jv]:\n                    tmp = _move_T(tmp, _VPOS[Jv], p)\n                acc = tmp if acc is None else acc + tmp\n            if acc is not None:\n                w[Jv] = acc\n\n        if 1 in w:\n            lv[\"x\"] += _DbT(w[1], X, inv_h)\n        if 2 in w:\n            lv[\"y\"] += _DbT(w[2], Y, inv_h)\n        if 3 in w:\n            lv[\"z\"] += _DbT(w[3], Z, inv_h)\n        if 4 in w:\n            lv[\"z\"] += _DfT(w[4], Y, inv_h); lv[\"y\"] += _DfT(w[4], Z, inv_h)\n        if 5 in w:\n            lv[\"z\"] += _DfT(w[5], X, inv_h); lv[\"x\"] += _DfT(w[5], Z, inv_h)\n        if 6 in w:\n            lv[\"y\"] += _DfT(w[6], X, inv_h); lv[\"x\"] += _DfT(w[6], Y, inv_h)\n\n    return J, g\n\n\ndef _fwd_worker(args):\n    \"\"\"One transmit of the batched CPU fallback (runs in a worker process).\"\"\"\n    C, rho, h, dt, nt, wavelet, rec_idx, src_pts, rec_groups = args\n    rec, _ = forward(C, rho, h, dt, nt, None, wavelet, rec_idx,\n                     src_pts=src_pts, rec_groups=rec_groups, device=\"cpu\")\n    return rec\n\n\ndef forward_batch(C, rho, h, dt, nt, src_pts_list, wavelet, rec_idx=None,\n                  rec_groups=None, device=\"auto\"):\n    \"\"\"All transmits of an FMC in ONE batched array pass (explosive/pressure).\n\n    ``src_pts_list`` is a list over B transmits of element footprints\n    [(idx, w), ...]; returns (B, nt, n_rx) float64. Batching amortises the\n    per-op Python overhead of the step loop across transmits and lifts the\n    effective array size over the GPU threshold (B x cells), so the CuPy\n    path engages at grid sizes where a single transmit stays CPU-bound.\n    Physics per transmit is identical to :func:`forward` (the operators are\n    batch-transparent), so results match the sequential loop exactly on CPU.\n    \"\"\"\n    B = len(src_pts_list)\n    rho_h = np.asarray(rho, float)\n    nz, ny, nx = rho_h.shape\n    inv_h = 1.0 / h\n\n    use_gpu = False\n    if device in (\"auto\", \"gpu\"):\n        big_enough = device == \"gpu\" or B * rho_h.size >= 40000\n        if gpu_available() and big_enough:\n            use_gpu = True\n        elif device == \"gpu\":\n            raise RuntimeError(\"device='gpu' requested but CuPy/CUDA unavailable\")\n    if use_gpu:\n        import cupy as xp\n        dtype = xp.float32\n    elif device == \"cpu-batch\":              # batched math on CPU (tests)\n        xp = np\n        dtype = np.float64\n    else:\n        # A CPU batch is math-bound and beats nothing (measured 0.5x), so\n        # fall back to the verified per-transmit forward. For real problems\n        # the transmits run across CPU CORES via a persistent process pool\n        # (threads gain nothing here: the small per-op arrays keep NumPy in\n        # GIL-held dispatch). Tiny problems and Pyodide/WASM (no processes)\n        # stay sequential.\n        import sys\n        n_rx = (len(rec_groups) if rec_groups is not None else len(rec_idx))\n        rec = np.zeros((B, nt, n_rx))\n        big = B * rho_h.size * nt >= 10_000_000\n        if B > 1 and big and sys.platform != \"emscripten\":\n            try:\n                import os\n                from joblib import Parallel, delayed\n                args = [(C, rho_h, h, dt, nt, wavelet, rec_idx,\n                         src_pts_list[b], rec_groups) for b in range(B)]\n                outs = Parallel(n_jobs=min(os.cpu_count() or 1, 8),\n                                backend=\"loky\")(\n                    delayed(_fwd_worker)(a) for a in args)\n                for b, r in enumerate(outs):\n                    rec[b] = r\n                return rec\n            except Exception:\n                pass\n        for b in range(B):\n            rec[b], _ = forward(C, rho, h, dt, nt, None, wavelet, rec_idx,\n                                src_pts=src_pts_list[b],\n                                rec_groups=rec_groups, device=\"cpu\")\n        return rec\n\n    def cij_host(i, j):\n        return C[f\"C{min(i, j)}{max(i, j)}\"]\n\n    active = {(I, J): bool(np.any(cij_host(I, J))) for I in range(1, 7)\n              for J in range(1, 7)}\n    Cd = {k: (xp.asarray(v, dtype) if np.ndim(v) else float(v))\n          for k, v in C.items()}\n\n    def cij(i, j):\n        return Cd[f\"C{min(i, j)}{max(i, j)}\"]\n\n    rho_d = xp.asarray(rho_h, dtype)\n\n    def _lin(t):\n        return (t[0] * ny + t[1]) * nx + t[2]\n\n    if rec_groups is not None:\n        kmax = max(len(idxs) for idxs, _ in rec_groups)\n        idx_mat = np.zeros((len(rec_groups), kmax), dtype=np.int64)\n        w_mat = np.zeros((len(rec_groups), kmax))\n        for j, (idxs, ws) in enumerate(rec_groups):\n            for k_, (ix, wi) in enumerate(zip(idxs, ws)):\n                idx_mat[j, k_] = _lin(ix)\n                w_mat[j, k_] = wi\n        idx_mat = xp.asarray(idx_mat)\n        w_mat = xp.asarray(w_mat, dtype)\n        n_rx = len(rec_groups)\n    else:\n        rec_lin = xp.asarray(np.array([_lin(t) for t in rec_idx],\n                                      dtype=np.int64))\n        n_rx = len(rec_idx)\n\n    # per-transmit source injection as flat scatter indices\n    src_flat = []\n    for b, pts in enumerate(src_pts_list):\n        for idx, wgt in pts:\n            src_flat.append((b * nz * ny * nx + _lin(idx), float(wgt)))\n    src_idx_d = xp.asarray(np.array([i for i, _ in src_flat],\n                                    dtype=np.int64))\n    src_w_d = xp.asarray(np.array([w for _, w in src_flat]), dtype)\n\n    vx = xp.zeros((B, nz, ny, nx), dtype)\n    vy = xp.zeros((B, nz, ny, nx), dtype)\n    vz = xp.zeros((B, nz, ny, nx), dtype)\n    s = {I: xp.zeros((B, nz, ny, nx), dtype) for I in range(1, 7)}\n    rec = xp.zeros((B, nt, n_rx), dtype)\n    Z, Y, X = _AX[\"z\"], _AX[\"y\"], _AX[\"x\"]\n\n    for n in range(nt):\n        gam = {1: _Db(vx, X, inv_h), 2: _Db(vy, Y, inv_h),\n               3: _Db(vz, Z, inv_h),\n               4: _Df(vz, Y, inv_h) + _Df(vy, Z, inv_h),\n               5: _Df(vz, X, inv_h) + _Df(vx, Z, inv_h),\n               6: _Df(vy, X, inv_h) + _Df(vx, Y, inv_h)}\n        moved = {}\n\n        def strain_at(J, pos):\n            key = (J, pos)\n            if key not in moved:\n                moved[key] = (gam[J] if _VPOS[J] == pos\n                              else _move(gam[J], _VPOS[J], pos))\n            return moved[key]\n\n        for I in range(1, 7):\n            pos = _VPOS[I]\n            rate = None\n            for J in range(1, 7):\n                if not active[(I, J)]:\n                    continue\n                term = cij(I, J) * strain_at(J, pos)\n                rate = term if rate is None else rate + term\n            if rate is not None:\n                s[I] += dt * rate\n\n        wn = wavelet[n]\n        for I in (1, 2, 3):\n            flat = s[I].ravel()\n            flat[src_idx_d] += wn * src_w_d\n        # (ravel is a view; the scatter lands in s[I])\n\n        vx += (dt / rho_d) * (_Df(s[1], X, inv_h) + _Db(s[6], Y, inv_h)\n                              + _Db(s[5], Z, inv_h))\n        vy += (dt / rho_d) * (_Db(s[6], X, inv_h) + _Df(s[2], Y, inv_h)\n                              + _Db(s[4], Z, inv_h))\n        vz += (dt / rho_d) * (_Db(s[5], X, inv_h) + _Db(s[4], Y, inv_h)\n                              + _Df(s[3], Z, inv_h))\n\n        field = -(s[1] + s[2] + s[3]) / 3.0\n        flat = field.reshape(B, -1)\n        if rec_groups is not None:\n            rec[:, n, :] = (flat[:, idx_mat] * w_mat).sum(axis=-1)\n        else:\n            rec[:, n, :] = flat[:, rec_lin]\n\n    if use_gpu:\n        import cupy as cp\n        rec = cp.asnumpy(rec).astype(np.float64)\n    return rec\n", "simulation/ringfwi/fwi.py": "\"\"\"Full waveform inversion for a ring array (2D acoustic).\n\nThe forward model is a second-order leapfrog integration of the acoustic wave\nequation in squared-slowness form ``m d2p/dt2 = laplacian(p) + f`` (see the\nmodule docstring of :mod:`ringfwi.solver`). The inverse solver is adjoint-state\nfull waveform inversion.\n\nRather than approximate the adjoint with the continuous imaging condition, the\ngradient here is the *exact discrete adjoint* of the leapfrog scheme, obtained\nby differentiating the discrete Lagrangian. For the update\n\n    p^n = 2 p^{n-1} - p^{n-2} + S (L p^{n-1} + f^{n-1}),   S = dt^2 / m\n\nthe adjoint field satisfies the time-reversed recursion\n\n    lam^k = 2 lam^{k+1} - lam^{k+2} + L (S lam^{k+1}) - R^T r^k\n\ndriven by the data residual r, and the gradient of the misfit with respect to\nthe squared slowness is\n\n    g_i = (1 / m_i) * sum_n lam^n_i * (p^n - 2 p^{n-1} + p^{n-2})_i.\n\nBecause it is the exact discrete adjoint, it matches a finite-difference\ngradient to machine-ish precision (see tests/test_gradient.py).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom .solver import _laplacian\n\n\ndef _forward(m, h, dt, nt, sources, rec_idx=None, sponge=None, store=False,\n             rec_groups=None):\n    \"\"\"Leapfrog forward integration with clean p^n indexing.\n\n    ``sources`` is a list of (index, series); ``index`` is a grid index tuple\n    (``(iy, ix)`` in 2D, ``(iz, iy, ix)`` in 3D) and ``series`` has length\n    ``nt``, the sample used when advancing to level ``n`` being ``series[n-1]``.\n\n    Receivers are either single points (``rec_idx``) or finite-aperture groups\n    (``rec_groups``, a list of ``(idx_list, weights)``); a group records the\n    weighted-average pressure over its footprint.\n\n    Works in any dimension: the array shape follows ``m.shape``.\n\n    Returns (rec, hist) where ``rec[n]`` and ``hist[n]`` hold p at level n.\n    \"\"\"\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    S = (dt * dt) / m\n\n    p_prev = np.zeros(shape)  # p^{n-2}\n    p_cur = np.zeros(shape)   # p^{n-1}\n    lap = np.zeros(shape)\n\n    n_rx = (len(rec_groups) if rec_groups is not None\n            else (len(rec_idx) if rec_idx is not None else 0))\n    rec = None if n_rx == 0 else np.zeros((nt, n_rx))\n    hist = None if not store else np.zeros((nt,) + shape, dtype=np.float64)\n\n    for n in range(1, nt):\n        _laplacian(p_cur, inv_h2, lap)\n        for idx, series in sources:\n            lap[idx] += series[n - 1]\n        p_new = 2.0 * p_cur - p_prev + S * lap\n        if sponge is not None:\n            p_new *= sponge\n        p_prev, p_cur = p_cur, p_new\n        if hist is not None:\n            hist[n] = p_cur\n        if rec is not None:\n            if rec_groups is not None:\n                for j, (idxs, w) in enumerate(rec_groups):\n                    rec[n, j] = sum(wi * p_cur[ix] for ix, wi in zip(idxs, w))\n            else:\n                for j, idx in enumerate(rec_idx):\n                    rec[n, j] = p_cur[idx]\n\n    return rec, hist\n\n\ndef _tx_sources(geom, s, wavelet, footprints):\n    \"\"\"Transmit sources for element ``s``: a point, or its weighted footprint.\"\"\"\n    if footprints is None:\n        return [(geom.element_index(s), wavelet)]\n    idxs, w = footprints[s]\n    return [(ix, wavelet * wi) for ix, wi in zip(idxs, w)]\n\n\ndef simulate_wavefield(m, geom, src_element, wavelet, dt, h, nt, sponge=None):\n    \"\"\"Return the full pressure-field history for one transmitting element.\n\n    Useful for visualising wave propagation through the specimen.\n    \"\"\"\n    src_idx = geom.element_index(src_element)\n    _, hist = _forward(m, h, dt, nt, [(src_idx, wavelet)], None, sponge, store=True)\n    return hist\n\n\ndef forward_fmc(m, geom, wavelet, dt, h, nt, sponge=None, src_list=None,\n                footprints=None):\n    \"\"\"Simulate a full-matrix-capture dataset (each element transmits in turn).\n\n    ``footprints`` (from :func:`ringfwi.geometry.build_footprints`) models finite\n    -aperture elements; when ``None`` each element is a single grid point.\n    \"\"\"\n    if src_list is None:\n        src_list = list(range(geom.n_elements))\n    else:\n        src_list = list(src_list)\n    rec_idx = None if footprints is not None else geom.idx\n    data = np.zeros((len(src_list), nt, geom.n_elements))\n    for i, s in enumerate(src_list):\n        rec, _ = _forward(m, h, dt, nt, _tx_sources(geom, s, wavelet, footprints),\n                          rec_idx, sponge, rec_groups=footprints)\n        data[i] = rec\n    return data\n\n\n# Time-vs-amplitude balance for the graph-space OT misfit: both coordinates\n# are normalised to O(1) (time by the window, amplitude by the per-trace\n# observed maximum), so 1.0 weights them equally.\nGSOT_ETA = 1.0\n\n\ndef _hilb(x):\n    \"\"\"Analytic signal along time (axis 0).\"\"\"\n    from scipy.signal import hilbert\n    return hilbert(x, axis=0)\n\n\ndef _adjoint_residual(dsyn, dobs, misfit_type=\"l2\"):\n    \"\"\"Misfit value and adjoint source for one transmit's data (nt, n_rx).\n\n    - \"l2\":  least-squares waveform misfit; adjoint source is the residual.\n    - \"gcn\": global correlation norm (normalised cross-correlation) per trace,\n      a robust misfit that widens the convergence basin against cycle skipping.\n    - \"envelope\": L2 on Hilbert envelopes (Bozdag-style). Phase-insensitive, so\n      it tolerates waveform distortion from unmodelled physics (anisotropy,\n      elasticity, dispersion) while keeping arrival and amplitude information.\n    - \"egcn\": GCN on envelopes \u2014 additionally insensitive to per-trace\n      amplitude scale.\n    - \"traveltime\": cross-correlation traveltime lags per trace\n      (Luo & Schuster). Purely kinematic: exactly the observable that\n      direction-dependent (anisotropic) wave speeds perturb. Lag is measured\n      in samples with parabolic sub-sample refinement; the adjoint source is\n      the classic weighted time-derivative of the synthetic.\n    - \"gsot\": graph-space optimal transport (Metivier et al.), the state of\n      the art for cycle-skipping robustness. See the implementation note in\n      the branch below; heavier per evaluation (a Hungarian assignment per\n      trace).\n    \"\"\"\n    if misfit_type == \"l2\":\n        r = dsyn - dobs\n        return 0.5 * float(np.sum(r * r)), r\n    if misfit_type == \"gcn\":\n        eps = 1e-12\n        ns = np.sqrt(np.sum(dsyn * dsyn, axis=0)) + eps      # (n_rx,)\n        no = np.sqrt(np.sum(dobs * dobs, axis=0)) + eps\n        shat = dsyn / ns\n        ohat = dobs / no\n        c = np.sum(shat * ohat, axis=0)                      # correlation per trace\n        J = float(np.sum(1.0 - c))\n        adj = -(ohat - c * shat) / ns                        # d(1 - c)/d(dsyn)\n        return J, adj\n    if misfit_type == \"envelope\":\n        sa = _hilb(dsyn)\n        Es = np.abs(sa)\n        Eo = np.abs(_hilb(dobs))\n        dE = Es - Eo\n        J = 0.5 * float(np.sum(dE * dE))\n        Er = Es + 1e-12 * (Es.max() + 1e-300)\n        # dJ/d(dsyn) = dE*d/E - H[dE*H(d)/E]   (H^T = -H for the FFT Hilbert)\n        adj = dE * dsyn / Er - np.imag(_hilb(dE * np.imag(sa) / Er))\n        return J, adj\n    if misfit_type == \"egcn\":\n        sa = _hilb(dsyn)\n        Es = np.abs(sa)\n        Eo = np.abs(_hilb(dobs))\n        eps = 1e-12\n        ns = np.sqrt(np.sum(Es * Es, axis=0)) + eps\n        no = np.sqrt(np.sum(Eo * Eo, axis=0)) + eps\n        shat = Es / ns\n        ohat = Eo / no\n        c = np.sum(shat * ohat, axis=0)\n        J = float(np.sum(1.0 - c))\n        rE = -(ohat - c * shat) / ns                         # dJ/dE_syn\n        Er = Es + 1e-12 * (Es.max() + 1e-300)\n        adj = rE * dsyn / Er - np.imag(_hilb(rE * np.imag(sa) / Er))\n        return J, adj\n    if misfit_type == \"gsot\":\n        # Graph-space optimal transport (Metivier et al.): each trace is a\n        # point cloud {(t_i, d_i)}; an optimal assignment between synthetic\n        # and observed clouds gives J = sum_i |x_i - y_sigma(i)|^2. With the\n        # assignment fixed the misfit is quadratic, so the adjoint source is\n        # exactly 2(d - d_obs[sigma]) (chain-ruled through the per-trace\n        # amplitude normalisation). Convexifies against cycle skipping: a\n        # time-shifted arrival costs its shift, not a full cycle mismatch.\n        # Cost: one nt x nt Hungarian assignment per trace (keep nt <~ 600).\n        from scipy.optimize import linear_sum_assignment\n\n        nt, n_rx = dsyn.shape\n        tau = np.arange(nt, dtype=float)[:, None] / nt          # (nt, 1)\n        dt2 = GSOT_ETA ** 2 * (tau - tau.T) ** 2                # (nt, nt)\n        J = 0.0\n        adj = np.zeros_like(dsyn)\n        for j in range(n_rx):\n            A = float(np.max(np.abs(dobs[:, j]))) + 1e-30\n            shat = dsyn[:, j] / A\n            ohat = dobs[:, j] / A\n            C = (shat[:, None] - ohat[None, :]) ** 2 + dt2\n            rows, cols = linear_sum_assignment(C)\n            J += float(C[rows, cols].sum())\n            adj[:, j] = 2.0 * (shat - ohat[cols]) / A\n        return J, adj\n    if misfit_type == \"traveltime\":\n        nt, n_rx = dsyn.shape\n        J = 0.0\n        adj = np.zeros_like(dsyn)\n        for j in range(n_rx):\n            s = dsyn[:, j]\n            o = dobs[:, j]\n            if not (np.any(s) and np.any(o)):\n                continue\n            xc = np.correlate(s, o, mode=\"full\")             # lag k at index k+nt-1\n            k = int(np.argmax(xc))\n            # parabolic sub-sample refinement\n            if 0 < k < 2 * nt - 2:\n                y0, y1, y2 = xc[k - 1], xc[k], xc[k + 1]\n                den = y0 - 2.0 * y1 + y2\n                delta = 0.5 * (y0 - y2) / den if abs(den) > 0 else 0.0\n                delta = float(np.clip(delta, -0.5, 0.5))\n            else:\n                delta = 0.0\n            lag = (k - (nt - 1)) + delta                     # samples, syn late > 0\n            J += 0.5 * lag * lag\n            sdot = np.gradient(s)\n            denom = float(np.dot(sdot, sdot)) + 1e-300\n            adj[:, j] = -lag * sdot / denom\n        return float(J), adj\n    raise ValueError(f\"unknown misfit_type {misfit_type!r}\")\n\n\ndef misfit(m, geom, wavelet, dt, h, nt, dobs, sponge=None, src_list=None,\n           misfit_type=\"l2\", footprints=None, time_weights=None):\n    \"\"\"Waveform misfit only (a forward pass, no gradient).\n\n    ``time_weights`` optionally windows the data: a list over transmits of\n    (nt, n_rx) weight arrays (for example a P-arrival mute that removes the\n    late shear/coda energy an acoustic operator cannot model).\n    \"\"\"\n    dsyn = forward_fmc(m, geom, wavelet, dt, h, nt, sponge, src_list, footprints)\n    J = 0.0\n    for i in range(dsyn.shape[0]):\n        if time_weights is not None:\n            W = time_weights[i]\n            Ji, _ = _adjoint_residual(dsyn[i] * W, dobs[i] * W, misfit_type)\n        else:\n            Ji, _ = _adjoint_residual(dsyn[i], dobs[i], misfit_type)\n        J += Ji\n    return J\n\n\ndef misfit_and_gradient(m, geom, wavelet, dt, h, nt, dobs, sponge=None, src_list=None,\n                        misfit_type=\"l2\", footprints=None, time_weights=None):\n    \"\"\"Waveform misfit and its adjoint-state gradient (``misfit_type``: l2 or gcn).\n\n    ``footprints`` models finite-aperture elements consistently on transmit and\n    receive; the adjoint source is spread over each receiver's footprint.\n    ``time_weights`` windows the data per transmit (see :func:`misfit`); the\n    adjoint source is weighted by the same window (exact chain rule).\n\n    Returns\n    -------\n    J : float\n    g : (ny, nx) ndarray\n        Gradient of J with respect to the squared-slowness field.\n    \"\"\"\n    if src_list is None:\n        src_list = list(range(geom.n_elements))\n    else:\n        src_list = list(src_list)\n    rec_idx = None if footprints is not None else geom.idx\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    S = (dt * dt) / m\n\n    J = 0.0\n    g = np.zeros(shape)\n    lap = np.zeros(shape)\n\n    for i, s in enumerate(src_list):\n        # Forward pass, storing the full history.\n        dsyn, U = _forward(m, h, dt, nt, _tx_sources(geom, s, wavelet, footprints),\n                           rec_idx, sponge, store=True, rec_groups=footprints)\n        if time_weights is not None:\n            W = time_weights[i]\n            Ji, res = _adjoint_residual(dsyn * W, dobs[i] * W, misfit_type)\n            res = res * W                       # chain rule through the window\n        else:\n            Ji, res = _adjoint_residual(dsyn, dobs[i], misfit_type)   # adjoint source\n        J += Ji\n\n        # Backward adjoint recursion: lam^k = 2 lam^{k+1} - lam^{k+2}\n        #                                     + L(S lam^{k+1}) - R^T r^k\n        lam_p1 = np.zeros(shape)  # lam^{k+1}\n        lam_p2 = np.zeros(shape)  # lam^{k+2}\n        for k in range(nt - 1, 0, -1):\n            _laplacian(S * lam_p1, inv_h2, lap)\n            lam_k = 2.0 * lam_p1 - lam_p2 + lap\n            if sponge is not None:\n                lam_k *= sponge\n            # inject -R^T r^k at receiver points (spread over footprints)\n            if footprints is not None:\n                for j, (idxs, w) in enumerate(footprints):\n                    for ix, wi in zip(idxs, w):\n                        lam_k[ix] -= res[k, j] * wi\n            else:\n                for j, idx in enumerate(rec_idx):\n                    lam_k[idx] -= res[k, j]\n\n            # Gradient accumulation: g_i += (1/m_i) lam^k (p^k - 2p^{k-1} + p^{k-2})\n            d2p = U[k] - 2.0 * U[k - 1] + (U[k - 2] if k >= 2 else 0.0)\n            g += lam_k * d2p\n\n            lam_p2 = lam_p1\n            lam_p1 = lam_k\n\n    g /= m\n    return J, g\n\n\n# ---------------------------------------------------------------------------\n# Gauss-Newton (\"Jacobian iteration\") machinery for voxel FWI.\n#\n# At voxel scale the Jacobian cannot be formed column-by-column, but it can be\n# APPLIED matrix-free: J v is the Born (linearised) forward, J^T w is the\n# existing exact adjoint. The Gauss-Newton system (J^T J + mu I) dm = -g is\n# then solved with conjugate gradients \u2014 truncated Gauss-Newton FWI, the\n# operator form of the reduced-model Jacobian iteration.\n#\n# The Born source is the EXACT discrete linearisation of the leapfrog scheme:\n# differentiating p^n = 2p^{n-1} - p^{n-2} + (dt^2/m)(L p^{n-1} + f) in m\n# along v gives  dp^n = 2dp^{n-1} - dp^{n-2} + (dt^2/m) L dp^{n-1}\n#                      - (v/m)(U^n - 2U^{n-1} + U^{n-2}).\n# ---------------------------------------------------------------------------\n\ndef _born_forward(m, h, dt, nt, U, v, rec_idx, sponge=None, rec_groups=None):\n    \"\"\"Exact discrete linearised forward: data perturbation J.v for one source.\n\n    ``U`` is the stored background wavefield history of that source.\n    \"\"\"\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    S = (dt * dt) / m\n    vm = v / m\n\n    dp_prev = np.zeros(shape)\n    dp_cur = np.zeros(shape)\n    lap = np.zeros(shape)\n    n_rx = len(rec_groups) if rec_groups is not None else len(rec_idx)\n    rec = np.zeros((nt, n_rx))\n\n    for n in range(1, nt):\n        _laplacian(dp_cur, inv_h2, lap)\n        d2U = U[n] - 2.0 * U[n - 1] + (U[n - 2] if n >= 2 else 0.0)\n        dp_new = 2.0 * dp_cur - dp_prev + S * lap - vm * d2U\n        if sponge is not None:\n            dp_new *= sponge\n        dp_prev, dp_cur = dp_cur, dp_new\n        if rec_groups is not None:\n            for j, (idxs, w) in enumerate(rec_groups):\n                rec[n, j] = sum(wi * dp_cur[ix] for ix, wi in zip(idxs, w))\n        else:\n            for j, idx in enumerate(rec_idx):\n                rec[n, j] = dp_cur[idx]\n    return rec\n\n\ndef _adjoint_apply(m, h, dt, nt, U, res, rec_idx, sponge=None, rec_groups=None):\n    \"\"\"Exact adjoint J^T res for one source, given its background history U.\"\"\"\n    shape = m.shape\n    inv_h2 = 1.0 / (h * h)\n    S = (dt * dt) / m\n    g = np.zeros(shape)\n    lap = np.zeros(shape)\n    lam_p1 = np.zeros(shape)\n    lam_p2 = np.zeros(shape)\n    for k in range(nt - 1, 0, -1):\n        _laplacian(S * lam_p1, inv_h2, lap)\n        lam_k = 2.0 * lam_p1 - lam_p2 + lap\n        if sponge is not None:\n            lam_k *= sponge\n        if rec_groups is not None:\n            for j, (idxs, w) in enumerate(rec_groups):\n                for ix, wi in zip(idxs, w):\n                    lam_k[ix] -= res[k, j] * wi\n        else:\n            for j, idx in enumerate(rec_idx):\n                lam_k[idx] -= res[k, j]\n        d2p = U[k] - 2.0 * U[k - 1] + (U[k - 2] if k >= 2 else 0.0)\n        g += lam_k * d2p\n        lam_p2 = lam_p1\n        lam_p1 = lam_k\n    return g / m\n\n\ndef gn_hessian_vector(m, geom, wavelet, dt, h, nt, v, sponge=None,\n                      src_list=None, footprints=None, wavefields=None):\n    \"\"\"Gauss-Newton Hessian-vector product (J^T J) v, summed over sources.\n\n    ``wavefields`` optionally supplies precomputed background histories (one\n    per source) to avoid re-running the background forward on every call.\n    \"\"\"\n    if src_list is None:\n        src_list = list(range(geom.n_elements))\n    else:\n        src_list = list(src_list)\n    rec_idx = None if footprints is not None else geom.idx\n    out = np.zeros_like(m)\n    for i, s in enumerate(src_list):\n        if wavefields is not None:\n            U = wavefields[i]\n        else:\n            _, U = _forward(m, h, dt, nt, _tx_sources(geom, s, wavelet, footprints),\n                            None, sponge, store=True)\n        dd = _born_forward(m, h, dt, nt, U, v, rec_idx, sponge, footprints)\n        out += _adjoint_apply(m, h, dt, nt, U, dd, rec_idx, sponge, footprints)\n    return out\n\n\ndef _invert_gauss_newton(m0, geom, wavelet, dt, h, nt, dobs, sponge, src_list,\n                         n_iter, update_mask, m_bounds, n_linesearch, verbose,\n                         progress, footprints, n_cg, gn_damp):\n    \"\"\"Truncated Gauss-Newton FWI (L2): CG on (J^T J + mu I) dm = -g.\n\n    Each outer iteration costs roughly (2 + 2*n_cg) wave solves per source\n    (about n_cg times a gradient-descent iteration), but the curvature-aware\n    step converges in far fewer outer iterations.\n    \"\"\"\n    if src_list is None:\n        src_list = list(range(geom.n_elements))\n    else:\n        src_list = list(src_list)\n    m = m0.copy()\n    eff_lo = eff_hi = None\n    if m_bounds is not None:\n        eff_lo = np.minimum(m_bounds[0], m0)\n        eff_hi = np.maximum(m_bounds[1], m0)\n    mask = update_mask if update_mask is not None else 1.0\n    history = []\n\n    # Cache background wavefields for the CG loop when memory allows.\n    cache_bytes = len(src_list) * nt * m.size * 8\n    use_cache = cache_bytes < 4e8\n\n    for it in range(n_iter):\n        J, g = misfit_and_gradient(m, geom, wavelet, dt, h, nt, dobs, sponge,\n                                   src_list, \"l2\", footprints)\n        history.append(J)\n        if verbose:\n            print(f\"  GN iter {it:2d}  misfit = {J:.6e}\")\n\n        gm = g * mask\n        if float(np.max(np.abs(gm))) == 0.0:\n            break\n\n        wavefields = None\n        if use_cache:\n            wavefields = []\n            for s in src_list:\n                _, U = _forward(m, h, dt, nt,\n                                _tx_sources(geom, s, wavelet, footprints),\n                                None, sponge, store=True)\n                wavefields.append(U)\n\n        def A(x):\n            hv = gn_hessian_vector(m, geom, wavelet, dt, h, nt, x * mask,\n                                   sponge, src_list, footprints, wavefields)\n            return hv * mask\n\n        # Damping scaled by the Rayleigh quotient of the gradient direction.\n        Hg = A(gm)\n        mu = gn_damp * float(gm.ravel() @ Hg.ravel()) / (float(gm.ravel() @ gm.ravel()) + 1e-300)\n\n        # Conjugate gradients on (A + mu I) p = -gm.\n        b = -gm\n        x = np.zeros_like(m)\n        r = b.copy()\n        d = r.copy()\n        rs = float(r.ravel() @ r.ravel())\n        rs0 = rs\n        for _cg in range(n_cg):\n            Ad = A(d) + mu * d\n            alpha = rs / (float(d.ravel() @ Ad.ravel()) + 1e-300)\n            x += alpha * d\n            r -= alpha * Ad\n            rs_new = float(r.ravel() @ r.ravel())\n            if rs_new < 1e-10 * rs0:\n                break\n            d = r + (rs_new / rs) * d\n            rs = rs_new\n\n        # Backtracking line search along the Gauss-Newton step.\n        step = 1.0\n        accepted = False\n        for _ls in range(n_linesearch):\n            m_try = m + step * x\n            if m_bounds is not None:\n                clipped = np.clip(m_try, eff_lo, eff_hi)\n                m_try = (np.where(update_mask > 0, clipped, m_try)\n                         if update_mask is not None else clipped)\n            J_try = misfit(m_try, geom, wavelet, dt, h, nt, dobs, sponge,\n                           src_list, \"l2\", footprints)\n            if J_try < J:\n                accepted = True\n                break\n            step *= 0.5\n        if not accepted:\n            if verbose:\n                print(\"  GN line search failed to reduce misfit; stopping\")\n            break\n        m = m_try\n        if progress is not None:\n            progress(it + 1, n_iter)\n\n    J_final = misfit(m, geom, wavelet, dt, h, nt, dobs, sponge, src_list,\n                     \"l2\", footprints)\n    history.append(J_final)\n    return m, history\n\n\ndef invert(\n    m0,\n    geom,\n    wavelet,\n    dt,\n    h,\n    nt,\n    dobs,\n    sponge=None,\n    src_list=None,\n    n_iter=15,\n    step_frac=0.02,\n    update_mask=None,\n    m_bounds=None,\n    smooth_sigma=1.0,\n    n_linesearch=8,\n    verbose=False,\n    backend=None,\n    misfit_type=\"l2\",\n    footprints=None,\n    progress=None,\n    time_weights=None,\n    optimizer=\"gd\",\n    n_cg=8,\n    gn_damp=1e-2,\n):\n    \"\"\"Preconditioned steepest-descent FWI with a backtracking line search.\n\n    The gradient is optionally Gaussian-smoothed (``smooth_sigma`` cells) to\n    suppress the source/receiver imprint, then a backtracking line search along\n    the descent direction guarantees the misfit never increases.\n\n    ``backend`` optionally supplies faster ``misfit_and_gradient`` and ``misfit``\n    implementations (for example the C++ ``uap`` module); it must be\n    signature-compatible with this module. Defaults to the pure-Python core.\n    ``progress`` is an optional callback called as ``progress(done, total)``\n    after each completed iteration (for GUI progress reporting).\n\n    ``optimizer``: \"gd\" (preconditioned steepest descent, default) or\n    \"gauss-newton\" (truncated Gauss-Newton \"Jacobian iteration\": conjugate\n    gradients on matrix-free (J^T J + mu I) dm = -g with the exact discrete\n    Born linearisation; L2 misfit only; ~n_cg times the cost per outer\n    iteration but curvature-aware steps).\n\n    Returns (m, history) where ``history`` is the misfit per accepted iteration.\n    \"\"\"\n    from scipy.ndimage import gaussian_filter\n\n    if optimizer in (\"gauss-newton\", \"gn\"):\n        if misfit_type != \"l2\":\n            raise ValueError(\"Gauss-Newton is defined for the L2 misfit; \"\n                             \"select misfit_type='l2'.\")\n        if time_weights is not None:\n            raise ValueError(\"Gauss-Newton does not support time_weights yet.\")\n        return _invert_gauss_newton(m0, geom, wavelet, dt, h, nt, dobs, sponge,\n                                    src_list, n_iter, update_mask, m_bounds,\n                                    n_linesearch, verbose, progress, footprints,\n                                    n_cg, gn_damp)\n\n    if (footprints is None and time_weights is None and backend is not None\n            and misfit_type in (\"l2\", \"gcn\")):\n        # The C++ backend implements l2 and gcn (point elements); the other\n        # misfits (envelope/egcn/traveltime) run on the Python reference.\n        mg = (lambda mm, g, w, d_, h_, n_, ob, sp, sl:\n              backend.misfit_and_gradient(mm, g, w, d_, h_, n_, ob, sp, sl,\n                                          misfit_type=misfit_type))\n        mf = (lambda mm, g, w, d_, h_, n_, ob, sp, sl:\n              backend.misfit(mm, g, w, d_, h_, n_, ob, sp, sl,\n                             misfit_type=misfit_type))\n    elif misfit_type == \"l2\" and footprints is None and time_weights is None:\n        mg = misfit_and_gradient\n        mf = misfit\n    else:\n        # Finite-aperture footprints and windowed data use the Python\n        # reference (the C++ backend is point-element only).\n        mg = (lambda mm, g, w, d_, h_, n_, ob, sp, sl:\n              misfit_and_gradient(mm, g, w, d_, h_, n_, ob, sp, sl, misfit_type,\n                                  footprints, time_weights))\n        mf = (lambda mm, g, w, d_, h_, n_, ob, sp, sl:\n              misfit(mm, g, w, d_, h_, n_, ob, sp, sl, misfit_type,\n                     footprints, time_weights))\n\n    m = m0.copy()\n    # Effective bounds never push a cell across its own starting value, so a\n    # region that starts outside the bounds (for example a couplant bath that is\n    # inside the update mask) is not corrupted by clipping.\n    eff_lo = eff_hi = None\n    if m_bounds is not None:\n        eff_lo = np.minimum(m_bounds[0], m0)\n        eff_hi = np.maximum(m_bounds[1], m0)\n    history = []\n    J, g = mg(m, geom, wavelet, dt, h, nt, dobs, sponge, src_list)\n    for it in range(n_iter):\n        history.append(J)\n        if verbose:\n            print(f\"  iter {it:2d}  misfit = {J:.6e}\")\n\n        gm = g * update_mask if update_mask is not None else g.copy()\n        if smooth_sigma:\n            gm = gaussian_filter(gm, smooth_sigma)\n            if update_mask is not None:\n                gm = gm * update_mask\n        gmax = float(np.max(np.abs(gm)))\n        if gmax == 0.0:\n            break\n\n        direction = -gm\n        step = step_frac * float(np.mean(m)) / gmax\n        accepted = False\n        for _ in range(n_linesearch):\n            m_try = m + step * direction\n            if m_bounds is not None:\n                clipped = np.clip(m_try, eff_lo, eff_hi)\n                # Only enforce bounds where the model is allowed to change, so a\n                # couplant bath outside the update region is left untouched.\n                m_try = np.where(update_mask > 0, clipped, m_try) if update_mask is not None else clipped\n            J_try = mf(m_try, geom, wavelet, dt, h, nt, dobs, sponge, src_list)\n            if J_try < J:\n                accepted = True\n                break\n            step *= 0.5\n        if not accepted:\n            if verbose:\n                print(\"  line search failed to reduce misfit; stopping\")\n            break\n\n        m = m_try\n        J, g = mg(m, geom, wavelet, dt, h, nt, dobs, sponge, src_list)\n        if progress is not None:\n            progress(it + 1, n_iter)\n\n    history.append(J)\n    return m, history\n\n\ndef p_window_weights(dobs, dt, f0, onset_frac=0.2, keep_cycles=2.5,\n                     taper_cycles=0.75):\n    \"\"\"Per-trace P-arrival mute windows from the observed data.\n\n    For each transmit/receiver trace, the onset is picked from the envelope\n    (first sample above ``onset_frac`` of the trace maximum); the window keeps\n    ``keep_cycles`` of f0 after the onset and cosine-tapers off over\n    ``taper_cycles``. This removes the later shear/mode-converted coda that an\n    acoustic operator cannot model, which otherwise dominates the misfit.\n\n    Returns a list over transmits of (nt, n_rx) weight arrays for\n    ``time_weights``.\n    \"\"\"\n    from scipy.signal import hilbert\n\n    n_tx, nt, n_rx = dobs.shape\n    keep = keep_cycles / f0 / dt\n    taper = max(1.0, taper_cycles / f0 / dt)\n    t_idx = np.arange(nt)[:, None]\n    weights = []\n    for i in range(n_tx):\n        env = np.abs(hilbert(dobs[i], axis=0))\n        thresh = onset_frac * (env.max(axis=0, keepdims=True) + 1e-30)\n        onset = np.argmax(env > thresh, axis=0)         # (n_rx,)\n        end = onset + keep\n        ramp = (end + taper - t_idx) / taper\n        W = np.clip(ramp, 0.0, 1.0)\n        W = 0.5 - 0.5 * np.cos(np.pi * W)               # smooth cosine roll-off\n        weights.append(W)\n    return weights\n\n\ndef fwi_from_dataset(dataset, start_c=None, update_frac=0.95, m_bounds=None,\n                     n_iter=12, step_frac=0.03, verbose=False, **invert_kw):\n    \"\"\"Run FWI directly on a portable :class:`~ringfwi.dataset.Dataset`.\n\n    Rebuilds a computational grid from the dataset, maps the physical element\n    positions onto grid indices, and inverts. This closes the pipeline: any\n    dataset (simulated or, in future, from hardware) can be reconstructed by the\n    same call, so FWI and TFM are interchangeable on the same data.\n\n    Parameters\n    ----------\n    dataset : Dataset\n    start_c : ndarray, optional\n        Starting sound-speed model on the reconstruction grid. Defaults to a\n        homogeneous medium at the dataset's nominal speed.\n    update_frac : float\n        Update only within this fraction of the array radius.\n\n    Returns\n    -------\n    dict with keys: c (recovered velocity), history, extent, h, geom.\n    \"\"\"\n    from .geometry import GridArray\n    from .phantom import velocity_to_m, m_to_velocity\n\n    ds = dataset\n    dim = ds.geometry.dim\n\n    # Reconstruction grid: reuse the acquisition grid if the dataset carries it,\n    # otherwise choose a spacing from the wavelength.\n    if ds.ground_truth is not None:\n        h = ds.ground_truth[\"h_m\"]\n        shape = ds.ground_truth[\"c\"].shape\n    else:\n        ppw = 5.0\n        h = ds.nominal_speed_m_s / (ds.tx_centre_freq_hz * ppw)\n        npix = int(round(2.2 * ds.geometry.radius_m / h)) + 1\n        shape = (npix,) * dim\n    n = shape[0]\n    domain = (n - 1) * h\n\n    # Map centred physical element positions to grid index tuples.\n    abspos = ds.geometry.element_pos + domain / 2.0\n    idx = [tuple(int(round(p[a] / h)) for a in reversed(range(dim))) for p in abspos]\n    geom = GridArray(idx=idx, n=n, h=h, radius_m=ds.geometry.radius_m, domain_m=domain)\n\n    # Starting model and update region.\n    if start_c is None:\n        start_c = np.full(shape, ds.nominal_speed_m_s)\n    m0 = velocity_to_m(start_c)\n\n    centre = domain / 2.0\n    coords = np.mgrid[tuple(slice(0, n) for _ in range(dim))].astype(float) * h\n    # Radial distance in the transverse plane. In 3D the array axis is axis 0\n    # (z), so the transverse plane is axes (1, 2); the update region is a\n    # cylinder, full extent along the axis. In 2D both axes are transverse.\n    transverse = range(dim) if dim == 2 else range(1, dim)\n    r = np.sqrt(sum((coords[a] - centre) ** 2 for a in transverse))\n    update_mask = (r <= ds.geometry.radius_m * update_frac).astype(float)\n\n    m_rec, history = invert(\n        m0, geom, ds.tx_wavelet, ds.dt, h, ds.n_samples, ds.data,\n        src_list=list(ds.tx_elements), n_iter=n_iter, step_frac=step_frac,\n        update_mask=update_mask, m_bounds=m_bounds, verbose=verbose, **invert_kw,\n    )\n\n    return {\n        \"c\": m_to_velocity(m_rec),\n        \"history\": history,\n        \"extent\": (-centre, domain - centre),\n        \"h\": h,\n        \"geom\": geom,\n    }\n", "simulation/ringfwi/geometry.py": "\"\"\"Ring-array acquisition geometry.\n\nA ring array places ``n_elements`` transducers evenly around a circle of a\ngiven radius, centred in a square imaging domain. This mirrors the\ncircumferential scanning geometry used for cylindrical specimens such as ice\ncores, pipe sections, or laboratory tomography phantoms. In a full-matrix\ncapture (FMC) acquisition each element transmits in turn while every element\nrecords, so a ring of N elements yields an N-by-N multistatic dataset.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\n\n\n@dataclass\nclass RingArray:\n    \"\"\"Ring of transducer elements mapped onto a finite-difference grid.\n\n    Parameters\n    ----------\n    n_elements : int\n        Number of transducer elements around the ring.\n    radius_m : float\n        Ring radius in metres.\n    domain_m : float\n        Side length of the square imaging domain in metres.\n    h : float\n        Grid spacing in metres.\n    \"\"\"\n\n    n_elements: int\n    radius_m: float\n    domain_m: float\n    h: float\n\n    def __post_init__(self):\n        self.n = int(round(self.domain_m / self.h)) + 1\n        centre = self.domain_m / 2.0\n        angles = np.linspace(0.0, 2.0 * np.pi, self.n_elements, endpoint=False)\n        xs = centre + self.radius_m * np.cos(angles)\n        ys = centre + self.radius_m * np.sin(angles)\n        self.angles = angles\n        self.xy = np.column_stack([xs, ys])\n        # Nearest grid index for each element (iy, ix); note row = y, col = x.\n        self.idx = [\n            (int(round(y / self.h)), int(
