round(x / self.h))) for x, y in self.xy\n        ]\n\n    @property\n    def grid_shape(self):\n        return (self.n, self.n)\n\n    def element_index(self, k):\n        \"\"\"Grid (iy, ix) of element ``k``.\"\"\"\n        return self.idx[k]\n\n    def receiver_indices(self, exclude=None):\n        \"\"\"All element grid points, optionally excluding one element.\"\"\"\n        return [ij for k, ij in enumerate(self.idx) if k != exclude]\n\n    @property\n    def element_positions(self):\n        \"\"\"Element (x, y) positions in metres, origin at the array centre.\"\"\"\n        return self.xy - self.domain_m / 2.0\n\n    array_type = \"ring\"\n\n\n@dataclass\nclass CylinderArray:\n    \"\"\"Cylindrical array: rings of elements stacked along the axis (3D).\n\n    A single planar ring only images one slice. Stacking ``n_rings`` rings along\n    the z axis gives an axial aperture, which is what makes true 3D\n    reconstruction possible. The specimen sits inside the cylinder.\n\n    Parameters\n    ----------\n    n_rings : int\n        Number of rings along the axis.\n    per_ring : int\n        Elements per ring.\n    radius_m : float\n        Ring radius, metres.\n    height_m : float\n        Axial span covered by the outermost rings, metres.\n    domain_m : float\n        Side length of the cubic imaging domain, metres.\n    h : float\n        Grid spacing, metres.\n    \"\"\"\n\n    n_rings: int\n    per_ring: int\n    radius_m: float\n    height_m: float\n    domain_m: float\n    h: float\n\n    def __post_init__(self):\n        self.n = int(round(self.domain_m / self.h)) + 1\n        c = self.domain_m / 2.0\n        if self.n_rings == 1:\n            zs = np.array([c])\n        else:\n            zs = c + np.linspace(-self.height_m / 2.0, self.height_m / 2.0, self.n_rings)\n        ang = np.linspace(0.0, 2.0 * np.pi, self.per_ring, endpoint=False)\n\n        xyz = []\n        for z in zs:\n            for a in ang:\n                xyz.append([c + self.radius_m * np.cos(a),\n                            c + self.radius_m * np.sin(a), z])\n        self.xyz = np.asarray(xyz)  # absolute coords, metres (x, y, z)\n        # Grid index per element (iz, iy, ix); axis order is (z, y, x).\n        self.idx = [\n            (int(round(z / self.h)), int(round(y / self.h)), int(round(x / self.h)))\n            for x, y, z in self.xyz\n        ]\n        self.n_elements = len(self.idx)\n\n    @property\n    def grid_shape(self):\n        return (self.n, self.n, self.n)\n\n    def element_index(self, k):\n        return self.idx[k]\n\n    @property\n    def element_positions(self):\n        \"\"\"Element (x, y, z) positions in metres, origin at the array centre.\"\"\"\n        return self.xyz - self.domain_m / 2.0\n\n    array_type = \"cylinder\"\n\n\ndef _fibonacci_directions(n, hemisphere=False):\n    \"\"\"n near-uniform unit vectors on a sphere (or upper hemisphere).\"\"\"\n    i = np.arange(n) + 0.5\n    z = (1.0 - i / n) if hemisphere else (1.0 - 2.0 * i / n)   # cos(polar angle)\n    r = np.sqrt(np.clip(1.0 - z * z, 0.0, 1.0))\n    phi = np.pi * (1.0 + 5.0 ** 0.5) * i                       # golden angle\n    return np.column_stack([r * np.cos(phi), r * np.sin(phi), z])\n\n\n@dataclass\nclass ShellArray:\n    \"\"\"Elements near-uniformly distributed on a spherical shell (3D).\n\n    A full sphere gives the largest 3D aperture; a hemisphere is a one-sided\n    (limited-aperture) acquisition. The specimen sits inside the shell.\n    \"\"\"\n\n    n_elements: int\n    radius_m: float\n    domain_m: float\n    h: float\n    hemisphere: bool = False\n\n    def __post_init__(self):\n        self.n = int(round(self.domain_m / self.h)) + 1\n        c = self.domain_m / 2.0\n        dirs = _fibonacci_directions(self.n_elements, hemisphere=self.hemisphere)\n        self.xyz = c + self.radius_m * dirs                    # absolute coords, metres\n        self.idx = [\n            (int(round(z / self.h)), int(round(y / self.h)), int(round(x / self.h)))\n            for x, y, z in self.xyz\n        ]\n\n    @property\n    def grid_shape(self):\n        return (self.n, self.n, self.n)\n\n    def element_index(self, k):\n        return self.idx[k]\n\n    @property\n    def element_positions(self):\n        return self.xyz - self.domain_m / 2.0\n\n    @property\n    def array_type(self):\n        return \"hemisphere\" if self.hemisphere else \"sphere\"\n\n\ndef HemisphereArray(n_elements, radius_m, domain_m, h):\n    \"\"\"Elements on the upper hemisphere (limited-aperture 3D acquisition).\"\"\"\n    return ShellArray(n_elements, radius_m, domain_m, h, hemisphere=True)\n\n\ndef SphereArray(n_elements, radius_m, domain_m, h):\n    \"\"\"Elements on a full spherical shell (maximal 3D aperture).\"\"\"\n    return ShellArray(n_elements, radius_m, domain_m, h, hemisphere=False)\n\n\ndef _tangent_basis(normal):\n    \"\"\"One (2D) or two (3D) unit vectors spanning the plane normal to ``normal``.\"\"\"\n    normal = np.asarray(normal, float)\n    if normal.size == 2:\n        return [np.array([-normal[1], normal[0]])]\n    ref = np.array([0.0, 0.0, 1.0])\n    if abs(np.dot(normal, ref)) > 0.9:\n        ref = np.array([1.0, 0.0, 0.0])\n    t1 = np.cross(normal, ref); t1 /= np.linalg.norm(t1)\n    t2 = np.cross(normal, t1)\n    return [t1, t2]\n\n\ndef build_footprints(geom, width_m, shape=\"flat\", height_m=None, max_pts=9):\n    \"\"\"Finite-aperture element footprints on the finite-difference grid.\n\n    Each element is a flat aperture lying in the plane tangent to the array\n    surface, defined by its 3D shape:\n\n    - ``\"point\"``  \u2014 single grid point (also the result of any width <= one cell).\n    - ``\"rect\"``   \u2014 rectangle ``width_m`` (lateral, in-plane) by ``height_m``\n      (elevation, along the array axis in 3D). In 2D this is a line segment of\n      ``width_m``; height is the out-of-plane dimension and is ignored.\n    - ``\"disc\"``   \u2014 elliptical disc with axes ``width_m`` x ``height_m``\n      (a circular disc when they are equal). In 2D, a line segment.\n    - ``\"flat\"``   \u2014 backwards-compatible alias for a square: rect with\n      ``height_m = width_m``.\n\n    For cylinder arrays the tangent frame is taken about the radial direction in\n    the ring plane, so width runs circumferentially and height runs axially.\n    The aperture is sampled onto grid points; on transmit every point is driven,\n    on receive the pressure is averaged over them.\n\n    Returns a list over elements of ``(idx_list, weights)`` where ``idx_list``\n    holds grid-index tuples and ``weights`` sums to one.\n    \"\"\"\n    pos = np.asarray(geom.element_positions, float)     # centred coords, metres\n    dim = pos.shape[1]\n    half = geom.domain_m / 2.0\n    h = geom.h\n    n = geom.n\n    if height_m is None or shape == \"flat\":\n        height_m = width_m\n    point = shape == \"point\" or (width_m <= h and height_m <= h)\n    is_cyl = getattr(geom, \"array_type\", \"\") == \"cylinder\"\n\n    def _offsets(extent):\n        npt = int(np.clip(round(extent / h) + 1, 1, max_pts))\n        return np.linspace(-extent / 2.0, extent / 2.0, npt) if npt > 1 else np.zeros(1)\n\n    footprints = []\n    for k in range(len(pos)):\n        if point:\n            footprints.append(([geom.element_index(k)], np.array([1.0])))\n            continue\n        p = pos[k]\n        pn = p.copy()\n        if is_cyl:\n            pn[2] = 0.0            # radial normal in the ring plane -> t2 axial\n        norm = np.linalg.norm(pn)\n        normal = pn / norm if norm > 0 else np.eye(dim)[0]\n        tangents = _tangent_basis(normal)\n        extents = [width_m] + ([height_m] if len(tangents) > 1 else [])\n        grids = [_offsets(e) for e in extents]\n        seen = {}\n        for combo in np.array(np.meshgrid(*grids)).reshape(len(grids), -1).T:\n            if shape == \"disc\":\n                u = combo[0] / (width_m / 2.0 + 1e-30)\n                v = (combo[1] / (height_m / 2.0 + 1e-30)) if len(combo) > 1 else 0.0\n                if u * u + v * v > 1.0 + 1e-9:\n                    continue\n                # ellipse test in the tangent plane\n            disp = sum(c * t for c, t in zip(combo, tangents))\n            xyz = p + half + disp                       # absolute coords, metres\n            ijk = tuple(int(np.clip(round(xyz[d] / h), 0, n - 1))\n                        for d in range(dim - 1, -1, -1))  # axis order (z,y,x)\n            seen[ijk] = True\n        idx_list = list(seen.keys())\n        footprints.append((idx_list, np.full(len(idx_list), 1.0 / len(idx_list))))\n    return footprints\n\n\n@dataclass\nclass GridArray:\n    \"\"\"Minimal array geometry defined directly by grid index tuples.\n\n    Used when reconstructing a computational grid from a portable Dataset (which\n    stores only physical element positions), so FWI can run on data that came\n    from any source, including hardware.\n    \"\"\"\n\n    idx: list\n    n: int\n    h: float\n    radius_m: float\n    domain_m: float\n\n    @property\n    def n_elements(self):\n        return len(self.idx)\n\n    def element_index(self, k):\n        return self.idx[k]\n", "simulation/ringfwi/imaging.py": "\"\"\"Delay-and-sum imaging: the total focusing method (TFM).\n\nTFM is the reference full-matrix-capture imaging algorithm. For each image point\nit sums the contribution of every transmit/receive pair, sampling each trace at\nthe two-way travel time from the transmitting element to the point to the\nreceiving element, assuming a constant background speed:\n\n    I(r) = sum_{tx, rx}  s_{tx,rx}( (|r - p_tx| + |r - p_rx|) / c )\n\nUsing the analytic (Hilbert) signal and taking the magnitude gives an envelope\nimage. This is qualitative reflectivity imaging, complementary to the\nquantitative sound-speed maps from FWI, and it is fast. It is dimension-general:\nelement positions and image points may be 2D or 3D.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef image_axes(dataset, npix, half_size=None):\n    \"\"\"Return the per-axis coordinate vectors of a centred image grid (metres).\"\"\"\n    half = half_size if half_size is not None else dataset.geometry.radius_m * 0.95\n    return [np.linspace(-half, half, npix) for _ in range(dataset.geometry.dim)]\n\n\ndef tfm(dataset, npix=120, half_size=None, envelope=True):\n    \"\"\"Total focusing method image of a :class:`~ringfwi.dataset.Dataset`.\n\n    Parameters\n    ----------\n    npix : int\n        Pixels per axis of the (square/cubic) image.\n    half_size : float, optional\n        Half-width of the image region in metres (defaults to 0.95 * ring radius).\n    envelope : bool\n        If True, return the analytic-signal envelope magnitude.\n\n    Returns\n    -------\n    image : ndarray\n        2D or 3D image, shape ``(npix,) * dim``.\n    axes : list of ndarray\n        The coordinate vector along each axis (metres).\n    \"\"\"\n    from scipy.signal import hilbert\n\n    dim = dataset.geometry.dim\n    axes = image_axes(dataset, npix, half_size)\n    grids = np.meshgrid(*axes, indexing=\"ij\")\n    pts = np.stack([g.ravel() for g in grids], axis=1)  # (P, dim)\n\n    epos = dataset.geometry.element_pos                 # (N, dim)\n    tx_elements = np.asarray(dataset.tx_elements)\n    c = dataset.nominal_speed_m_s\n    fs = dataset.sample_rate_hz\n    nt = dataset.n_samples\n\n    # Distance from every image point to every element: (P, N).\n    d = np.sqrt(((pts[:, None, :] - epos[None, :, :]) ** 2).sum(axis=2))\n\n    analytic = hilbert(dataset.data, axis=1)            # (n_tx, nt, n_rx) complex\n    acc = np.zeros(pts.shape[0], dtype=complex)\n\n    for i, te in enumerate(tx_elements):\n        d_tx = d[:, te]\n        for j in range(dataset.n_rx):\n            t = (d_tx + d[:, j]) / c\n            k = np.round(t * fs).astype(np.int64)\n            valid = (k >= 0) & (k < nt)\n            acc[valid] += analytic[i, k[valid], j]\n\n    image = np.abs(acc) if envelope else acc.real\n    return image.reshape([npix] * dim), axes\n", "simulation/ringfwi/phantom.py": "\"\"\"Synthetic velocity phantoms for a cylindrical specimen.\n\nModels are returned as squared-slowness fields (m = 1 / c**2) because that is\nthe parameter the solver and the FWI gradient use directly. Helper conversions\nbetween velocity and squared slowness are provided.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef velocity_to_m(c):\n    return 1.0 / (c * c)\n\n\ndef m_to_velocity(m):\n    return 1.0 / np.sqrt(m)\n\n\ndef coupling_background(shape, c_specimen, c_couplant, radius_m, h):\n    \"\"\"Circular specimen of velocity ``c_specimen`` in a ``c_couplant`` bath.\n\n    Returns a velocity field. The specimen disc is centred in the domain; the\n    surrounding couplant (for example water) fills the corners so the ring array\n    always sees a continuous medium.\n    \"\"\"\n    n = shape[0]\n    centre = (n - 1) * h / 2.0\n    y, x = np.mgrid[0:n, 0:n] * h\n    r = np.hypot(x - centre, y - centre)\n    c = np.where(r <= radius_m, c_specimen, c_couplant)\n    return c.astype(float)\n\n\ndef add_inclusion(c, centre_frac, radius_m, c_inclusion, h):\n    \"\"\"Add a circular velocity inclusion (a flaw / anomaly) to a velocity field.\n\n    ``centre_frac`` is (fx, fy) in [0, 1] domain fractions.\n    \"\"\"\n    n = c.shape[0]\n    domain = (n - 1) * h\n    cx, cy = centre_frac[0] * domain, centre_frac[1] * domain\n    y, x = np.mgrid[0:n, 0:n] * h\n    r = np.hypot(x - cx, y - cy)\n    out = c.copy()\n    out[r <= radius_m] = c_inclusion\n    return out\n\n\ndef smooth(field, sigma_cells):\n    \"\"\"Gaussian smoothing (used to build a starting model for FWI).\"\"\"\n    from scipy.ndimage import gaussian_filter\n\n    return gaussian_filter(field, sigma_cells)\n\n\ndef voronoi_polycrystal(shape, n_grains, radius_m, h, rng=None, relax=1):\n    \"\"\"Voronoi polycrystal filling a circular specimen (2D).\n\n    Models a polycrystalline solid such as glacial ice: the specimen disc is\n    tessellated into ``n_grains`` Voronoi cells (grains), each a single crystal\n    with its own crystallographic orientation. Grain shapes come from random\n    seed points assigned by nearest-seed distance (which *is* the Voronoi\n    tessellation, evaluated on the grid); ``relax`` Lloyd iterations move each\n    seed to its cell centroid for more equiaxed, physically plausible grains.\n\n    Returns\n    -------\n    labels : (n, n) int ndarray\n        Grain index per cell, -1 outside the specimen disc.\n    angles : (n_grains,) ndarray\n        One c-axis angle per grain, uniform on [0, pi).\n    theta_map : (n, n) ndarray\n        Per-cell c-axis angle (0 outside the specimen).\n    \"\"\"\n    if len(shape) != 2:\n        raise ValueError(\"voronoi_polycrystal is 2D (3D polycrystal is roadmap)\")\n    if rng is None:\n        rng = np.random.default_rng()\n    n = shape[0]\n    c = (n - 1) * h / 2.0\n    y, x = np.mgrid[0:n, 0:n].astype(float) * h\n    inside = np.hypot(x - c, y - c) <= radius_m\n\n    # Seeds uniform in the disc (rejection sampling).\n    seeds = []\n    while len(seeds) < n_grains:\n        p = rng.uniform(-radius_m, radius_m, size=2)\n        if np.hypot(*p) <= radius_m:\n            seeds.append(p + c)\n    seeds = np.asarray(seeds)\n\n    def _labels(s):\n        d2 = (x[..., None] - s[:, 0]) ** 2 + (y[..., None] - s[:, 1]) ** 2\n        return np.argmin(d2, axis=-1)\n\n    for _ in range(int(relax)):\n        lab = _labels(seeds)\n        for k in range(n_grains):\n            msk = (lab == k) & inside\n            if msk.any():\n                seeds[k] = [x[msk].mean(), y[msk].mean()]\n\n    labels = np.where(inside, _labels(seeds), -1)\n    angles = rng.uniform(0.0, np.pi, n_grains)\n    theta_map = np.where(labels >= 0, angles[np.clip(labels, 0, None)], 0.0)\n    return labels, angles, theta_map\n\n\ndef voronoi_polycrystal_3d(shape, n_grains, radius_m, h, rng=None, relax=1):\n    \"\"\"3D Voronoi polycrystal filling a cylindrical specimen.\n\n    The full-height cylinder of the given radius is tessellated into\n    ``n_grains`` 3D Voronoi cells; each grain gets a random 3D c-axis unit\n    vector (uniform on the upper hemisphere). Same construction as the 2D\n    version: nearest-seed assignment plus Lloyd relaxation.\n\n    Returns\n    -------\n    labels : (nz, ny, nx) int ndarray\n        Grain index per cell, -1 outside the specimen cylinder.\n    axes : (n_grains, 3) ndarray\n        Unit c-axis vector per grain.\n    colat_map : (nz, ny, nx) ndarray\n        Per-cell c-axis colatitude (angle to the cylinder axis; 0 outside).\n    \"\"\"\n    if rng is None:\n        rng = np.random.default_rng()\n    nz, ny, nx = shape\n    c = (nx - 1) * h / 2.0\n    zmax = (nz - 1) * h\n    z, y, x = np.mgrid[0:nz, 0:ny, 0:nx].astype(float) * h\n    inside = np.hypot(x - c, y - c) <= radius_m\n\n    seeds = []\n    while len(seeds) < n_grains:\n        p = rng.uniform(-radius_m, radius_m, size=2)\n        if np.hypot(*p) <= radius_m:\n            seeds.append([p[0] + c, p[1] + c, rng.uniform(0.0, zmax)])\n    seeds = np.asarray(seeds)\n\n    def _labels(s):\n        d2 = ((x[..., None] - s[:, 0]) ** 2 + (y[..., None] - s[:, 1]) ** 2\n              + (z[..., None] - s[:, 2]) ** 2)\n        return np.argmin(d2, axis=-1)\n\n    for _ in range(int(relax)):\n        lab = _labels(seeds)\n        for k in range(n_grains):\n            msk = (lab == k) & inside\n            if msk.any():\n                seeds[k] = [x[msk].mean(), y[msk].mean(), z[msk].mean()]\n\n    labels = np.where(inside, _labels(seeds), -1)\n    v = rng.standard_normal((n_grains, 3))\n    v[:, 2] = np.abs(v[:, 2])                       # upper hemisphere\n    axes = v / np.linalg.norm(v, axis=1, keepdims=True)\n    colat = np.arccos(np.clip(axes[:, 2], -1.0, 1.0))\n    colat_map = np.where(labels >= 0, colat[np.clip(labels, 0, None)], 0.0)\n    return labels, axes, colat_map\n\n\n# --- 3D phantoms ------------------------------------------------------------\n\ndef cylinder_background(shape, c_specimen, c_couplant, radius_m, h):\n    \"\"\"Cylindrical specimen along the z axis in a couplant bath (3D velocity).\n\n    ``shape`` is (nz, ny, nx). The specimen is a cylinder of the given radius\n    about the domain axis; the surrounding couplant fills the rest.\n    \"\"\"\n    nz, ny, nx = shape\n    cx = (nx - 1) * h / 2.0\n    cy = (ny - 1) * h / 2.0\n    z, y, x = np.mgrid[0:nz, 0:ny, 0:nx].astype(float) * h\n    r = np.hypot(x - cx, y - cy)\n    return np.where(r <= radius_m, c_specimen, c_couplant)\n\n\ndef sphere_background(shape, c_specimen, c_couplant, radius_m, h):\n    \"\"\"Spherical specimen in a couplant bath (3D velocity), for shell arrays.\"\"\"\n    nz, ny, nx = shape\n    cx = (nx - 1) * h / 2.0\n    cy = (ny - 1) * h / 2.0\n    cz = (nz - 1) * h / 2.0\n    z, y, x = np.mgrid[0:nz, 0:ny, 0:nx].astype(float) * h\n    r = np.sqrt((x - cx) ** 2 + (y - cy) ** 2 + (z - cz) ** 2)\n    return np.where(r <= radius_m, c_specimen, c_couplant)\n\n\ndef add_sphere(c, centre_frac, radius_m, c_inclusion, h):\n    \"\"\"Add a spherical velocity inclusion (a 3D flaw) to a velocity volume.\n\n    ``centre_frac`` is (fx, fy, fz) in [0, 1] domain fractions.\n    \"\"\"\n    nz, ny, nx = c.shape\n    cx = centre_frac[0] * (nx - 1) * h\n    cy = centre_frac[1] * (ny - 1) * h\n    cz = centre_frac[2] * (nz - 1) * h\n    z, y, x = np.mgrid[0:nz, 0:ny, 0:nx].astype(float) * h\n    r = np.sqrt((x - cx) ** 2 + (y - cy) ** 2 + (z - cz) ** 2)\n    out = c.copy()\n    out[r <= radius_m] = c_inclusion\n    return out\n", "simulation/ringfwi/plugins.py": "\"\"\"Algorithm plugin interface.\n\nThe contract is deliberately small: an algorithm is a callable that takes a\n:class:`~ringfwi.dataset.Dataset` (plus optional parameters) and returns a\nresult (an image or a model). Algorithms register by name, so a researcher can\ndrop in a new beamformer, inversion, or DSP chain and run it on the same data as\nthe built-ins, on equal footing.\n\n    from ringfwi import plugins\n\n    @plugins.register(\"my_method\", description=\"my custom imaging\")\n    def my_method(dataset, **params):\n        ...\n        return image\n\n    result = plugins.run(\"my_method\", dataset)\n\nThis is what makes the platform a place to try current algorithms and DSP,\nrather than a fixed pipeline. The same registry is intended to back the C++ and\nMATLAB implementations, discovered by the same names.\n\"\"\"\n\nfrom __future__ import annotations\n\n_REGISTRY = {}\n\n\ndef register(name, description=\"\", output=\"image\"):\n    \"\"\"Decorator: register ``fn`` as an algorithm callable(dataset, **params).\"\"\"\n    def deco(fn):\n        _REGISTRY[name] = {\"fn\": fn, \"description\": description, \"output\": output}\n        return fn\n    return deco\n\n\ndef available():\n    \"\"\"Return {name: description} for all registered algorithms.\"\"\"\n    return {k: v[\"description\"] for k, v in _REGISTRY.items()}\n\n\ndef info(name):\n    \"\"\"Return the registry entry for ``name``.\"\"\"\n    return _REGISTRY[name]\n\n\ndef run(name, dataset, **params):\n    \"\"\"Run a registered algorithm on a dataset.\"\"\"\n    if name not in _REGISTRY:\n        raise KeyError(f\"unknown algorithm {name!r}; available: {sorted(_REGISTRY)}\")\n    return _REGISTRY[name][\"fn\"](dataset, **params)\n\n\n# --- built-in algorithms ----------------------------------------------------\n\n@register(\"tfm\", description=\"Total focusing method (delay-and-sum) envelope image\")\ndef _tfm(dataset, npix=120, half_size=None, envelope=True):\n    from .imaging import tfm\n    image, _axes = tfm(dataset, npix=npix, half_size=half_size, envelope=envelope)\n    return image\n\n\n@register(\"fwi\", description=\"Adjoint-state full waveform inversion (sound-speed model)\",\n          output=\"model\")\ndef _fwi(dataset, **params):\n    from .fwi import fwi_from_dataset\n    return fwi_from_dataset(dataset, **params)\n", "simulation/ringfwi/render3d.py": "\"\"\"3D rendering of sound-speed volumes as isosurfaces.\n\nTurns a 3D velocity model (true or reconstructed) into surface renders: the\nspecimen boundary as a translucent shell and any flaw as a solid blob. Provides\na static matplotlib figure (for reports) and an interactive Plotly figure (for\nthe GUI). Isosurfaces are extracted with marching cubes.\n\nA flaw is a low-speed region inside the specimen, but the couplant outside the\nspecimen is also low speed. To isolate the flaw, the couplant is filled up to\nthe specimen speed before extracting the flaw isosurface, so the surface wraps\nonly the flaw.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef _mesh(vol, level, h):\n    from skimage.measure import marching_cubes\n\n    if not (vol.min() < level < vol.max()):\n        return None\n    verts, faces, _, _ = marching_cubes(vol, level=level, spacing=(h, h, h))\n    return verts, faces\n\n\ndef surfaces(vol, h, c_couplant, c_specimen, c_flaw=None):\n    \"\"\"Return [(verts, faces, colour, opacity, name)] for a velocity volume.\"\"\"\n    out = []\n    lvl_spec = (c_couplant + c_specimen) / 2.0\n    m = _mesh(vol, lvl_spec, h)\n    if m is not None:\n        out.append((m[0], m[1], \"#8fbf8f\", 0.15, \"specimen\"))\n\n    if c_flaw is not None and abs(c_flaw - c_specimen) > 50:\n        # Fill the couplant (everything at or below the specimen threshold) up to\n        # the specimen speed, so only the flaw remains as a low/high anomaly.\n        filled = np.where(vol <= lvl_spec, c_specimen, vol)\n        lvl_flaw = (c_flaw + c_specimen) / 2.0\n        colour = \"#3060c0\" if c_flaw < c_specimen else \"#c03030\"\n        m = _mesh(filled, lvl_flaw, h)\n        if m is not None:\n            out.append((m[0], m[1], colour, 0.92, \"flaw\"))\n    return out\n\n\ndef add_isosurfaces(ax, surfs, vol_shape, h, title=\"\"):\n    \"\"\"Add precomputed isosurface meshes to a matplotlib 3D axis.\"\"\"\n    from mpl_toolkits.mplot3d.art3d import Poly3DCollection\n\n    for verts, faces, colour, alpha, _name in surfs:\n        xyz = verts[:, ::-1] * 1e3          # (z,y,x) -> (x,y,z), metres -> mm\n        tri = Poly3DCollection(xyz[faces], alpha=alpha)\n        tri.set_facecolor(colour)\n        tri.set_edgecolor(\"none\")\n        ax.add_collection3d(tri)\n    span = np.array(vol_shape) * h * 1e3\n    ax.set_xlim(0, span[2]); ax.set_ylim(0, span[1]); ax.set_zlim(0, span[0])\n    ax.set_xlabel(\"x (mm)\"); ax.set_ylabel(\"y (mm)\"); ax.set_zlabel(\"z (mm)\")\n    ax.set_box_aspect(span[::-1])\n    ax.set_title(title)\n\n\ndef matplotlib_render(vol, h, c_couplant, c_specimen, c_flaw=None, title=\"\"):\n    \"\"\"Static 3D isosurface figure (matplotlib).\"\"\"\n    import matplotlib.pyplot as plt\n\n    fig = plt.figure(figsize=(4.8, 4.8))\n    ax = fig.add_subplot(111, projection=\"3d\")\n    add_isosurfaces(ax, surfaces(vol, h, c_couplant, c_specimen, c_flaw), vol.shape, h, title)\n    return fig\n\n\ndef add_elements_plotly(fig, positions_m):\n    \"\"\"Overlay transducer element positions (absolute (x, y, z) metres) as points.\"\"\"\n    import plotly.graph_objects as go\n\n    p = np.asarray(positions_m, float) * 1e3\n    fig.add_trace(go.Scatter3d(\n        x=p[:, 0], y=p[:, 1], z=p[:, 2], mode=\"markers\",\n        marker=dict(size=3.2, color=\"#00e5ff\", symbol=\"circle\"), name=\"elements\"))\n    return fig\n\n\ndef array3d_figure(geom, el_shape=\"point\", width_m=0.0, height_m=None, title=\"\"):\n    \"\"\"Interactive 3D render of the array and its transducer elements (Plotly).\n\n    Draws the array surface (the ring circle, or one circle per ring of a\n    cylinder) and every element as its physical 3D shape: a rectangular patch\n    ``width_m`` x ``height_m`` tangent to the array surface, an elliptical disc,\n    or a point marker. Width runs circumferentially, height axially. A 2D ring\n    is drawn as its physical 3D counterpart (elements standing on the ring\n    plane), since real transducers have elevation even when the model is 2D.\n    \"\"\"\n    import plotly.graph_objects as go\n\n    pos = np.asarray(geom.element_positions, float)      # centred coords, metres\n    if pos.shape[1] == 2:                                # lift 2D ring into 3D\n        pos = np.column_stack([pos, np.zeros(len(pos))])\n    if height_m is None:\n        height_m = width_m\n    pmm = pos * 1e3\n    w2, h2 = width_m * 1e3 / 2.0, height_m * 1e3 / 2.0\n\n    fig = go.Figure()\n    # Array surface: one circle per distinct ring height.\n    r_mm = geom.radius_m * 1e3\n    th = np.linspace(0, 2 * np.pi, 121)\n    for z0 in np.unique(np.round(pmm[:, 2], 6)):\n        fig.add_trace(go.Scatter3d(\n            x=r_mm * np.cos(th), y=r_mm * np.sin(th), z=np.full_like(th, z0),\n            mode=\"lines\", line=dict(color=\"#888888\", width=2, dash=\"dash\"),\n            showlegend=False, hoverinfo=\"skip\"))\n\n    if el_shape == \"point\" or width_m <= 0:\n        fig.add_trace(go.Scatter3d(\n            x=pmm[:, 0], y=pmm[:, 1], z=pmm[:, 2], mode=\"markers\",\n            marker=dict(size=4, color=\"#00b8d4\"), name=\"elements\"))\n    else:\n        for k, p in enumerate(pmm):\n            nrm = np.array([p[0], p[1], 0.0])\n            nn = np.linalg.norm(nrm)\n            nrm = nrm / nn if nn > 0 else np.array([1.0, 0.0, 0.0])\n            t1 = np.array([-nrm[1], nrm[0], 0.0])        # circumferential\n            t2 = np.array([0.0, 0.0, 1.0])               # axial\n            if el_shape == \"disc\":\n                ang = np.linspace(0, 2 * np.pi, 20, endpoint=False)\n                ring_pts = [p + w2 * np.cos(a) * t1 + h2 * np.sin(a) * t2 for a in ang]\n                verts = np.array([p] + ring_pts)\n                m = len(ring_pts)\n                i = np.zeros(m, int); j = np.arange(1, m + 1); kk = np.roll(j, -1)\n            else:                                        # rect\n                verts = np.array([p - w2 * t1 - h2 * t2, p + w2 * t1 - h2 * t2,\n                                  p + w2 * t1 + h2 * t2, p - w2 * t1 + h2 * t2])\n                i = np.array([0, 0]); j = np.array([1, 2]); kk = np.array([2, 3])\n            fig.add_trace(go.Mesh3d(\n                x=verts[:, 0], y=verts[:, 1], z=verts[:, 2], i=i, j=j, k=kk,\n                color=\"#00b8d4\", opacity=0.95, flatshading=True,\n                name=f\"element {k}\", showlegend=False))\n\n    span = max(r_mm + max(w2, h2), 1.0)\n    fig.update_layout(\n        title=title, scene_aspectmode=\"data\",\n        scene=dict(xaxis_title=\"x (mm)\", yaxis_title=\"y (mm)\", zaxis_title=\"z (mm)\",\n                   xaxis_range=[-1.15 * span, 1.15 * span],\n                   yaxis_range=[-1.15 * span, 1.15 * span]),\n        margin=dict(l=0, r=0, t=30, b=0), height=430)\n    return fig\n\n\ndef grain_colors(grain_values, vmin=0.0, vmax=90.0, cmap_name=\"twilight\"):\n    \"\"\"Map per-grain scalar values to plotly rgb strings via a matplotlib cmap.\"\"\"\n    from matplotlib import colormaps\n\n    cmap = colormaps[cmap_name]\n    out = {}\n    for k, v in enumerate(np.asarray(grain_values, float)):\n        t = (v - vmin) / (vmax - vmin + 1e-30)\n        r, g, b, _ = cmap(min(max(t, 0.0), 1.0))\n        out[k] = f\"rgb({int(255 * r)},{int(255 * g)},{int(255 * b)})\"\n    return out\n\n\ndef polycrystal_figure(labels, grain_values, h, title=\"\", vmin=0.0, vmax=90.0,\n                       cmap_name=\"twilight\", melt_mask=None, opacity=0.55):\n    \"\"\"Interactive 3D render of a Voronoi polycrystal (Plotly).\n\n    Each grain is extracted with marching cubes and coloured by its scalar\n    ``grain_values[k]`` (for example the c-axis colatitude in degrees) mapped\n    through a matplotlib colormap. An optional ``melt_mask`` renders a fluid\n    pocket as a translucent blue body.\n    \"\"\"\n    import plotly.graph_objects as go\n    from matplotlib import colormaps\n    from skimage.measure import marching_cubes\n\n    colors = grain_colors(grain_values, vmin, vmax, cmap_name)\n    fig = go.Figure()\n    for k in np.unique(labels[labels >= 0]):\n        mask = np.pad((labels == k).astype(float), 1)      # close border surfaces\n        try:\n            verts, faces, _, _ = marching_cubes(mask, 0.5, spacing=(h, h, h))\n        except (ValueError, RuntimeError):\n            continue\n        verts = verts - h                                   # undo the padding shift\n        fig.add_trace(go.Mesh3d(\n            x=verts[:, 2] * 1e3, y=verts[:, 1] * 1e3, z=verts[:, 0] * 1e3,\n            i=faces[:, 0], j=faces[:, 1], k=faces[:, 2],\n            color=colors[int(k)],\n            opacity=opacity, flatshading=True, name=f\"grain {k}\",\n            hovertext=f\"grain {k}: {float(grain_values[k]):.0f}\", showlegend=False))\n    if melt_mask is not None and melt_mask.any():\n        mask = np.pad(melt_mask.astype(float), 1)\n        m = _mesh(mask, 0.5, h)\n        if m is not None:\n            verts, faces = m\n            verts = verts - h\n            fig.add_trace(go.Mesh3d(\n                x=verts[:, 2] * 1e3, y=verts[:, 1] * 1e3, z=verts[:, 0] * 1e3,\n                i=faces[:, 0], j=faces[:, 1], k=faces[:, 2],\n                color=\"#3060c0\", opacity=0.55, flatshading=True, name=\"fluid pocket\",\n                showlegend=False))\n    fig.update_layout(\n        title=title, scene_aspectmode=\"data\",\n        scene=dict(xaxis_title=\"x (mm)\", yaxis_title=\"y (mm)\", zaxis_title=\"z (mm)\"),\n        margin=dict(l=0, r=0, t=30, b=0), height=460)\n    return fig\n\n\ndef plotly_figure(vol, h, c_couplant, c_specimen, c_flaw=None, title=\"\"):\n    \"\"\"Interactive 3D isosurface figure (Plotly).\"\"\"\n    import plotly.graph_objects as go\n\n    fig = go.Figure()\n    for verts, faces, colour, alpha, name in surfaces(vol, h, c_couplant, c_specimen, c_flaw):\n        z, y, x = verts[:, 0] * 1e3, verts[:, 1] * 1e3, verts[:, 2] * 1e3\n        fig.add_trace(go.Mesh3d(\n            x=x, y=y, z=z, i=faces[:, 0], j=faces[:, 1], k=faces[:, 2],\n            color=colour, opacity=alpha, name=name, showscale=False, flatshading=True))\n    fig.update_layout(\n        title=title, scene_aspectmode=\"data\",\n        scene=dict(xaxis_title=\"x (mm)\", yaxis_title=\"y (mm)\", zaxis_title=\"z (mm)\"),\n        margin=dict(l=0, r=0, t=30, b=0), height=430)\n    return fig\n", "simulation/ringfwi/solver.py": "\"\"\"Finite-difference building blocks for the 2D acoustic forward model.\n\nThe wave equation is written in the symmetric squared-slowness form\n\n    m(x) d2p/dt2 = laplacian(p) + f(x, t),        m(x) = 1 / c(x)**2\n\nand integrated with a second-order-in-time, second-order-in-space leapfrog\nscheme. Because the operator ``m d2/dt2 - laplacian`` is self-adjoint, the exact\ndiscrete adjoint used by the FWI gradient (see :mod:`ringfwi.fwi`) shares this\nsame stencil.\n\nThis module holds the reusable pieces: the discrete Laplacian and an optional\nboundary sponge. The time-stepping engine itself lives in :mod:`ringfwi.fwi`\nalongside its exact adjoint so the two can never drift apart.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef make_sponge(shape, width=25, strength=0.08):\n    \"\"\"Return a multiplicative damping mask (values in (0, 1]).\n\n    The mask is 1.0 in the interior and tapers smoothly toward the edges. Note\n    that the current FWI gradient is the exact adjoint of the *sponge-free*\n    scheme; absorbing boundaries with a matching adjoint (a split-field PML) are\n    on the roadmap. The mask is provided for forward-only visualisation.\n    \"\"\"\n    ny, nx = shape\n    idx = np.arange(width)\n    taper = np.exp(-((strength * (width - idx)) ** 2))\n\n    px = np.ones(nx)\n    px[:width] = taper\n    px[-width:] = taper[::-1]\n\n    py = np.ones(ny)\n    py[:width] = taper\n    py[-width:] = taper[::-1]\n\n    return np.outer(py, px)\n\n\ndef _laplacian(p, inv_h2, out):\n    \"\"\"Second-order finite-difference Laplacian, written into ``out``.\n\n    Dimension-general: a 5-point stencil in 2D, a 7-point stencil in 3D, and so\n    on. Only interior cells are filled; the one-cell border stays zero.\n    \"\"\"\n    ndim = p.ndim\n    out[...] = 0.0\n    inner = tuple(slice(1, -1) for _ in range(ndim))\n    acc = -2.0 * ndim * p[inner]\n    for ax in range(ndim):\n        plus = list(inner)\n        minus = list(inner)\n        plus[ax] = slice(2, None)\n        minus[ax] = slice(0, -2)\n        acc = acc + p[tuple(plus)] + p[tuple(minus)]\n    out[inner] = acc * inv_h2\n    return out\n", "simulation/ringfwi/sources.py": "\"\"\"Source wavelets.\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef ricker(nt, dt, f0, t0=None):\n    \"\"\"Ricker (Mexican-hat) wavelet, the standard FWI test source.\n\n    Parameters\n    ----------\n    nt : int\n        Number of samples.\n    dt : float\n        Time step, seconds.\n    f0 : float\n        Centre frequency, Hz.\n    t0 : float, optional\n        Time shift of the peak; defaults to 1 / f0 so the wavelet is causal.\n    \"\"\"\n    if t0 is None:\n        t0 = 1.0 / f0\n    t = np.arange(nt) * dt - t0\n    a = (np.pi * f0 * t) ** 2\n    return (1.0 - 2.0 * a) * np.exp(-a)\n\n\ndef gabor(nt, dt, f0, frac_bw=0.6, t0=None):\n    \"\"\"Gaussian-modulated cosine (Gabor) wavelet with a controllable bandwidth.\n\n    ``frac_bw`` is the fractional -6 dB bandwidth: smaller means a longer, more\n    narrow-band pulse; larger means a shorter, broadband pulse. This models a\n    transducer of a given bandwidth more realistically than the fixed-shape\n    Ricker.\n    \"\"\"\n    sigma_f = frac_bw * f0 / 2.3548           # FWHM -> Gaussian sigma (frequency)\n    sigma_t = 1.0 / (2.0 * np.pi * sigma_f)\n    if t0 is None:\n        t0 = 3.0 * sigma_t\n    t = np.arange(nt) * dt - t0\n    return np.exp(-t ** 2 / (2.0 * sigma_t ** 2)) * np.cos(2.0 * np.pi * f0 * t)\n\n\ndef hann_tone_burst(nt, dt, f0, n_cycles=1, t0=None):\n    \"\"\"Hann-tapered sinusoidal burst.\n\n    Matches the single-cycle Hann-tapered excitation used in the IUS 2026\n    ice-core simulation framework, so forward-model behaviour is comparable.\n    \"\"\"\n    if t0 is None:\n        t0 = 0.0\n    t = np.arange(nt) * dt\n    dur = n_cycles / f0\n    w = np.zeros(nt)\n    mask = (t >= t0) & (t <= t0 + dur)\n    tau = t[mask] - t0\n    env = 0.5 * (1.0 - np.cos(2.0 * np.pi * tau / dur))\n    w[mask] = env * np.sin(2.0 * np.pi * f0 * tau)\n    return w\n", "simulation/ringfwi/transducer.py": "\"\"\"Transducer transmit model: from a pulser excitation to an acoustic wavelet.\n\nA piezoelectric transducer does not emit the electrical drive directly; it emits\nits impulse response to it. Modelling that response (a band-limited resonance)\nturns the FPGA pulser's bipolar square-wave excitation into the acoustic wavelet\nthat actually propagates. This closes the transmit path: the pulse the digital\nlogic generates is the pulse the simulation launches.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef pulser_excitation(half_period, n_halfcycles, dead_time):\n    \"\"\"Digital bipolar excitation at clock resolution (+1 / -1 / 0 per clock).\n\n    Matches ``tx_pulser.sv``: each half-cycle is ``dead_time`` idle clocks then\n    the active polarity, alternating positive and negative.\n    \"\"\"\n    x = np.zeros(int(n_halfcycles) * int(half_period))\n    for hc in range(int(n_halfcycles)):\n        for cnt in range(int(half_period)):\n            if cnt >= dead_time:\n                x[hc * half_period + cnt] = 1.0 if hc % 2 == 0 else -1.0\n    return x\n\n\ndef transducer_impulse_response(fc, frac_bw, fs, n=None):\n    \"\"\"Gaussian-modulated cosine impulse response (a standard transducer model).\n\n    fc : centre frequency (Hz); frac_bw : fractional -6 dB bandwidth; fs : Hz.\n    \"\"\"\n    sigma_f = frac_bw * fc / 2.3548        # FWHM -> Gaussian sigma in frequency\n    sigma_t = 1.0 / (2.0 * np.pi * sigma_f)\n    if n is None:\n        n = int(6.0 * sigma_t * fs) | 1    # odd length window\n    t = (np.arange(n) - n // 2) / fs\n    h = np.exp(-t ** 2 / (2.0 * sigma_t ** 2)) * np.cos(2.0 * np.pi * fc * t)\n    s = np.sum(np.abs(h))\n    return h / s if s > 0 else h\n\n\ndef acoustic_wavelet(exc_clk, clk_hz, fs, fc, frac_bw, n_out=None):\n    \"\"\"Resample a clock-rate excitation to ``fs`` and convolve with the transducer.\n\n    Returns the normalised acoustic transmit wavelet at sample rate ``fs``.\n    \"\"\"\n    return transmit_chain(exc_clk, clk_hz, fs, fc, frac_bw, n_out=n_out)\n\n\n# --- FPGA-producible excitations ---------------------------------------------\n# A digital pulser cannot synthesise an arbitrary analytic wavelet: it drives\n# discrete levels {-1, 0, +1} at clock resolution. These generators cover the\n# standard experimental drive signals; everything downstream (filters and the\n# transducer response) is what turns them into the acoustic output.\n\ndef unipolar_pulse(width_clk):\n    \"\"\"Single unipolar spike of ``width_clk`` clocks (spike/impulse excitation).\"\"\"\n    return np.ones(int(max(1, width_clk)))\n\n\ndef square_chirp(clk_hz, f_lo, f_hi, dur_s):\n    \"\"\"Bipolar square linear-FM chirp at clock resolution (coded excitation).\"\"\"\n    nclk = int(round(dur_s * clk_hz))\n    t = np.arange(nclk) / clk_hz\n    k = (f_hi - f_lo) / dur_s\n    phase = 2.0 * np.pi * (f_lo * t + 0.5 * k * t * t)\n    return np.sign(np.sin(phase) + 1e-12)\n\n\n# --- Analogue filters ---------------------------------------------------------\n\ndef lowpass(sig, fs, f_cut, order=4):\n    \"\"\"Causal Butterworth low-pass (models the TX output/matching filter).\"\"\"\n    from scipy.signal import butter, sosfilt\n\n    wn = min(f_cut / (fs / 2.0), 0.99)\n    sos = butter(order, wn, btype=\"low\", output=\"sos\")\n    return sosfilt(sos, sig)\n\n\ndef bandpass(sig, fs, f_lo, f_hi, order=2, axis=-1):\n    \"\"\"Causal Butterworth band-pass (models the RX analogue front end).\"\"\"\n    from scipy.signal import butter, sosfilt\n\n    lo = max(f_lo / (fs / 2.0), 1e-6)\n    hi = min(f_hi / (fs / 2.0), 0.99)\n    sos = butter(order, [lo, hi], btype=\"band\", output=\"sos\")\n    return sosfilt(sos, sig, axis=axis)\n\n\ndef transmit_chain(exc_clk, clk_hz, fs, fc, frac_bw, n_out=None,\n                   tx_cut_hz=None, tx_order=4):\n    \"\"\"Full transmit path: discrete FPGA drive -> TX filter -> transducer.\n\n    The clock-rate excitation is held zero-order onto the simulation sample\n    rate ``fs`` (still a stair-step: what the pulser really outputs), optionally\n    smoothed by the TX output filter, then convolved with the transducer\n    impulse response. Returns the normalised acoustic transmit wavelet.\n    \"\"\"\n    exc_clk = np.asarray(exc_clk, float)\n    nclk = len(exc_clk)\n    dur = nclk / clk_hz\n    n_exc = int(np.ceil(dur * fs))\n    t = np.arange(n_exc) / fs\n    idx = np.floor(t * clk_hz).astype(int)\n    exc = np.where(idx < nclk, exc_clk[np.clip(idx, 0, nclk - 1)], 0.0)\n\n    if tx_cut_hz is not None:\n        exc = lowpass(exc, fs, tx_cut_hz, tx_order)\n\n    h = transducer_impulse_response(fc, frac_bw, fs)\n    w = np.convolve(exc, h)                # transducer emits its response\n    m = np.max(np.abs(w))\n    if m > 0:\n        w = w / m\n    if n_out is not None:\n        if len(w) >= n_out:\n            w = w[:n_out]\n        else:\n            w = np.pad(w, (0, n_out - len(w)))\n    return w\n", "simulation/ringfwi/uarp_format.py": "\"\"\"UARP / UDSP v4.0 HDF5 format I/O.\n\nReads and writes acquisitions in the UARP UDSP data format (schema v4.0), so a\nring-matrix full-matrix-capture acquisition produced by OpenUSCT is stored in the\nformat the Leeds UARP toolbox ecosystem uses. This is a clean-room\nimplementation that conforms to the published schema layout (Set -> Series ->\nDimensions + Frames); it does not use any UARP source code.\n\nLayout (schema v4.0):\n\n    /                                Version, Timestamp, Description\n    /Series/Series000                Description, State, Platform, Source\n      /Dimensions\n        /Value                       Description, Unit, Scale (the sample value)\n        /Dimension1 (fast time)      Uniform.Size, Uniform.Stride, Uniform.Offset\n          /DimensionQuantity         Description, Unit, Scale\n        /Dimension2 (rx element)     Sparse.Points  (element positions)\n          /DimensionQuantity         Description, Unit, Scale\n      /Frames                        Size\n        /Frame000000 ...             one 2D [nt, n_rx] array per transmit; Delay\n\nBecause a real acquisition contains only the captured data, timing, and\ngeometry, OpenUSCT extras (the transmit wavelet, the assumed imaging speed, and\nsimulation ground truth) are not part of the UARP file; they are supplied\nseparately when processing.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom .dataset import ArrayGeometry, Dataset\n\nSCHEMA_VERSION = \"4.0\"\n\n\ndef to_uarp_set(dataset, path, description=\"OpenUSCT full-matrix-capture acquisition\",\n                timestamp=\"1970-01-01T00:00:00\"):\n    \"\"\"Write a :class:`~ringfwi.dataset.Dataset` as a UDSP v4.0 HDF5 Set.\"\"\"\n    import h5py\n\n    ds = dataset\n    tx = np.asarray(ds.tx_elements)\n    with h5py.File(path, \"w\") as f:\n        f.attrs[\"Version\"] = SCHEMA_VERSION\n        f.attrs[\"Timestamp\"] = timestamp\n        f.attrs[\"Description\"] = description\n\n        s0 = f.create_group(\"Series\").create_group(\"Series000\")\n        s0.attrs[\"Description\"] = \"Full-matrix capture channel data\"\n        s0.attrs[\"State\"] = \"Analytical\" if ds.ground_truth is not None else \"Measured\"\n        s0.attrs[\"Platform\"] = \"OpenUSCT\"\n        s0.attrs[\"Source\"] = \"Simulator\"\n\n        dims = s0.create_group(\"Dimensions\")\n        val = dims.create_group(\"Value\")\n        val.attrs[\"Description\"] = \"Signal amplitude\"\n        val.attrs[\"Unit\"] = \"Amplitude\"\n        val.attrs[\"Scale\"] = \"None\"\n\n        d1 = dims.create_group(\"Dimension1\")\n        d1.attrs[\"Description\"] = \"Fast time\"\n        d1.attrs[\"Uniform.Size\"] = ds.n_samples\n        d1.attrs[\"Uniform.Stride\"] = ds.dt\n        d1.attrs[\"Uniform.Offset\"] = 0.0\n        q1 = d1.create_group(\"DimensionQuantity\")\n        q1.attrs[\"Description\"] = \"Time\"; q1.attrs[\"Unit\"] = \"Seconds\"; q1.attrs[\"Scale\"] = \"None\"\n\n        d2 = dims.create_group(\"Dimension2\")\n        d2.attrs[\"Description\"] = \"Receive element\"\n        d2.create_dataset(\"Sparse.Points\", data=ds.geometry.element_pos)\n        q2 = d2.create_group(\"DimensionQuantity\")\n        q2.attrs[\"Description\"] = \"Element position\"; q2.attrs[\"Unit\"] = \"Metres\"; q2.attrs[\"Scale\"] = \"None\"\n\n        frames = s0.create_group(\"Frames\")\n        frames.attrs[\"Size\"] = ds.n_tx\n        for fidx in range(ds.n_tx):\n            fr = frames.create_dataset(\"Frame%06d\" % fidx,\n                                       data=ds.data[fidx].astype(np.float32), compression=\"gzip\")\n            fr.attrs[\"Description\"] = \"tx_element=%d\" % int(tx[fidx])\n            fr.attrs[\"Delay\"] = 0.0\n\n\ndef from_uarp_set(path, nominal_speed_m_s=1500.0):\n    \"\"\"Read a UDSP v4.0 HDF5 Set into a :class:`~ringfwi.dataset.Dataset`.\"\"\"\n    import h5py\n\n    with h5py.File(path, \"r\") as f:\n        s0 = f[\"Series\"][\"Series000\"]\n        dims = s0[\"Dimensions\"]\n        nt = int(dims[\"Dimension1\"].attrs[\"Uniform.Size\"])\n        dt = float(dims[\"Dimension1\"].attrs[\"Uniform.Stride\"])\n        epos = dims[\"Dimension2\"][\"Sparse.Points\"][()]\n\n        frames = s0[\"Frames\"]\n        keys = sorted(k for k in frames.keys() if k.startswith(\"Frame\"))\n        data = np.stack([frames[k][()] for k in keys], axis=0)\n\n        tx_elements = []\n        for k in keys:\n            desc = frames[k].attrs.get(\"Description\", \"\")\n            tx_elements.append(int(str(desc).split(\"=\")[1]) if \"=\" in str(desc) else len(tx_elements))\n\n    radius = float(np.max(np.linalg.norm(epos, axis=1)))\n    geom = ArrayGeometry(element_pos=epos, radius_m=radius, centre_freq_hz=0.0,\n                         array_type=\"cylinder\" if epos.shape[1] == 3 else \"ring\")\n    return Dataset(\n        geometry=geom,\n        data=data,\n        sample_rate_hz=1.0 / dt,\n        tx_wavelet=np.zeros(nt),\n        tx_centre_freq_hz=0.0,\n        nominal_speed_m_s=nominal_speed_m_s,\n        tx_elements=np.asarray(tx_elements),\n        ground_truth=None,\n    )\n", "simulation/ringfwi/voronoi_inv.py": "\"\"\"Voronoi-seed COF inversion: unknown grain geometry as a low-dimensional\nparametric unknown.\n\nThe literature answer to the voxel-field null space (Bodin & Sambridge 2009,\ntransdimensional Voronoi tomography; Kadu et al. 2017, parametric level-set\nFWI): when the target is piecewise-constant with unknown geometry, invert the\nGEOMETRY jointly with the properties at low dimension instead of thousands of\nvoxels. Here the model is G Voronoi seeds with a c-axis each -- five\nparameters per grain: [x, y, z, colatitude, azimuth] -- and the verified\nLevenberg-Marquardt machinery of :mod:`ringfwi.cof` closes the loop. The\nknown-geometry COF inversion is this method with the seeds frozen.\n\nFor differentiability the inversion uses a SOFT Voronoi assignment (softmax\nof negative squared distance, temperature ``tau_voxels`` grid cells): seed\nmotion then changes the misfit smoothly instead of voxel-by-voxel staircase\njumps, so finite-difference Jacobians are well behaved. Reported results use\nthe hard (argmin) labels.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom . import anisotropy as _an\nfrom . import axisfield as _af\nfrom . import elastic3d as _e3d\n\n_KEYS21 = _af.KEYS21\n\n\ndef grid_coords(shape, h):\n    \"\"\"Voxel-centre physical coordinates, columns (x, y, z), metres.\"\"\"\n    nz, ny, nx = shape\n    z, y, x = np.mgrid[0:nz, 0:ny, 0:nx].astype(float) * h\n    return x, y, z\n\n\ndef soft_weights(seeds, mask, h, tau_voxels=1.5):\n    \"\"\"(P, G) soft Voronoi weights over the mask voxels.\n\n    softmax(-d^2 / (2 (tau h)^2)) -- smooth in the seed positions, and the\n    hard argmin assignment in the limit tau -> 0.\n    \"\"\"\n    seeds = np.asarray(seeds, float).reshape(-1, 3)\n    x, y, z = grid_coords(mask.shape, h)\n    P = np.stack([x[mask], y[mask], z[mask]], axis=1)      # (P, 3)\n    d2 = ((P[:, None, :] - seeds[None]) ** 2).sum(-1)      # (P, G)\n    s2 = 2.0 * (tau_voxels * h) ** 2\n    a = -d2 / s2\n    a -= a.max(axis=1, keepdims=True)\n    w = np.exp(a)\n    w /= w.sum(axis=1, keepdims=True)\n    return w\n\n\ndef hard_labels(seeds, mask, h):\n    \"\"\"Nearest-seed labels over the mask (-1 outside), like the phantom.\"\"\"\n    seeds = np.asarray(seeds, float).reshape(-1, 3)\n    x, y, z = grid_coords(mask.shape, h)\n    P = np.stack([x[mask], y[mask], z[mask]], axis=1)\n    d2 = ((P[:, None, :] - seeds[None]) ** 2).sum(-1)\n    lab = np.full(mask.shape, -1, dtype=int)\n    lab[mask] = np.argmin(d2, axis=1)\n    return lab\n\n\ndef params_pack(seeds, axes):\n    \"\"\"(G,3) seeds + (G,3) axes -> flat (G*5,) [x y z colat azim] params.\"\"\"\n    from .cof import params_from_axes\n    ang = params_from_axes(axes)\n    return np.concatenate([np.asarray(seeds, float),\n                           ang], axis=1).ravel()\n\n\ndef params_unpack(params):\n    \"\"\"Flat params -> ((G,3) seeds, (G,3) axes).\"\"\"\n    from .cof import axes_from_params\n    p = np.asarray(params, float).reshape(-1, 5)\n    return p[:, :3].copy(), axes_from_params(p[:, 3:5])\n\n\ndef blended_maps(seeds, axes, mask, h, base6, Cbg, rho_bg, rho_mat,\n                 tau_voxels=1.5):\n    \"\"\"Full-grid 21 stiffness maps from soft-Voronoi-blended grain tensors.\"\"\"\n    from .cof import params_from_axes\n    ang = params_from_axes(axes)\n    C6g, _, _ = _af.axis_stiffness_and_derivs(ang[:, 0], ang[:, 1], base6)\n    w = soft_weights(seeds, mask, h, tau_voxels)           # (P, G)\n    Cmaps = {}\n    for key in _KEYS21:\n        i, j = int(key[1]) - 1, int(key[2]) - 1\n        m = np.array(Cbg[key], float, copy=True)\n        m[mask] = w @ C6g[:, i, j]\n        Cmaps[key] = m\n    rho = np.full(mask.shape, float(rho_bg))\n    rho[mask] = float(rho_mat)\n    return Cmaps, rho\n\n\ndef make_residual_seeds(mask, ring, h, dt, nt, wavelet, src_list, dobs,\n                        material=None, filter_fn=None, tau_voxels=1.5,\n                        device=\"auto\"):\n    \"\"\"Per-trace-normalised residual r(params) over [seeds, angles] per grain.\n\n    Same misfit convention as :func:`ringfwi.cof.make_residual` (observed\n    trace-energy normalisation, transmitter's own trace excluded), so J values\n    are directly comparable with the known-geometry COF inversion.\n    \"\"\"\n    mat = _an.ICE_MATERIAL if material is None else material\n    base6 = _an.ti_stiffness_6(**mat)\n    K = 1000.0 * 1480.0 ** 2\n    Cbg = {k: np.full(mask.shape,\n                      K if (int(k[1]) <= 3 and int(k[2]) <= 3) else 0.0)\n           for k in _KEYS21}\n    tr_norm = np.sqrt(np.sum(dobs ** 2, axis=1)) + 1e-30\n    w = np.ones_like(tr_norm)\n    for i, s in enumerate(src_list):\n        w[i, s] = 0.0\n\n    def residual(params):\n        seeds, axes = params_unpack(params)\n        Cmaps, rho = blended_maps(seeds, axes, mask, h, base6, Cbg,\n                                  1000.0, mat[\"rho\"], tau_voxels)\n        src_pts_list = [[(ring.element_index(s), 1.0)] for s in src_list]\n        d = _e3d.forward_batch(Cmaps, rho, h, dt, nt, src_pts_list, wavelet,\n                               rec_idx=ring.idx, device=device)\n        if filter_fn is not None:\n            d = filter_fn(d)\n        r = (d - dobs) * (w / tr_norm)[:, None, :]\n        return r.ravel()\n\n    return residual\n\n\ndef kmeans_seeds(mask, h, n_grains, seed=0, iters=25):\n    \"\"\"Geometric k-means of the specimen voxel coordinates -> (G, 3) seeds.\n\n    A neutral, geometry-free initial seed layout (roughly equal-volume cells\n    spread through the specimen).\n    \"\"\"\n    x, y, z = grid_coords(mask.shape, h)\n    P = np.stack([x[mask], y[mask], z[mask]], axis=1)\n    rng = np.random.default_rng(seed)\n    C = P[rng.choice(len(P), size=n_grains, replace=False)]\n    for _ in range(iters):\n        idx = np.argmin(((P[:, None, :] - C[None]) ** 2).sum(-1), axis=1)\n        for k in range(n_grains):\n            m = idx == k\n            if m.any():\n                C[k] = P[m].mean(0)\n    return C\n\n\ndef fd_steps(n_grains, h, seed_step_voxels=1.0, angle_step_deg=2.0):\n    \"\"\"Per-parameter FD step vector matching the [x y z colat azim] layout.\"\"\"\n    one = np.array([seed_step_voxels * h] * 3\n                   + [np.radians(angle_step_deg)] * 2)\n    return np.tile(one, n_grains)\n\n\n# ---------------------------------------------------------------------------\n# Simulated annealing over (seeds, axes): the basin-hopping global search the\n# greedy sweeps lack. Faithful to the stochastic spirit of transdimensional\n# Voronoi inversion (uphill moves accepted under a cooling temperature).\n# ---------------------------------------------------------------------------\n\ndef mask_points(mask, h):\n    \"\"\"(P, 3) physical (x, y, z) coordinates of the specimen voxels.\"\"\"\n    x, y, z = grid_coords(mask.shape, h)\n    return np.stack([x[mask], y[mask], z[mask]], axis=1)\n\n\ndef random_axis(rng):\n    \"\"\"Uniform random c-axis on the upper hemisphere.\"\"\"\n    v = rng.standard_normal(3)\n    v[2] = abs(v[2])\n    return v / np.linalg.norm(v)\n\n\ndef sa_move(seeds, axes, pts, h, rng):\n    \"\"\"One random annealing proposal; returns (seeds', axes', kind).\n\n    Move mix: local axis rotation, global axis redraw, local seed jitter,\n    global seed teleport (to a random specimen voxel), axis swap between two\n    grains. Local moves refine; global moves hop basins.\n    \"\"\"\n    G = len(seeds)\n    seeds = np.asarray(seeds, float).copy()\n    axes = np.asarray(axes, float).copy()\n    u = rng.random()\n    g = int(rng.integers(G))\n    if u < 0.30:                                   # local axis rotation\n        a = axes[g] + 0.26 * rng.standard_normal(3)     # ~15 deg\n        if a[2] < 0:\n            a = -a\n        axes[g] = a / np.linalg.norm(a)\n        kind = \"axis-local\"\n    elif u < 0.50:                                 # global axis redraw\n        axes[g] = random_axis(rng)\n        kind = \"axis-global\"\n    elif u < 0.75:                                 # local seed jitter\n        seeds[g] = seeds[g] + 1.5 * h * rng.standard_normal(3)\n        kind = \"seed-local\"\n    elif u < 0.85:                                 # seed teleport\n        seeds[g] = pts[int(rng.integers(len(pts)))]\n        kind = \"seed-global\"\n    else:                                          # swap two grains' axes\n        g2 = int(rng.integers(G))\n        axes[[g, g2]] = axes[[g2, g]]\n        kind = \"swap\"\n    return seeds, axes, kind\n\n\ndef sa_temperature(k, n_steps, J0, frac0=0.3, frac_end=1e-3):\n    \"\"\"Geometric cooling from frac0*J0 to frac_end*J0 over n_steps.\"\"\"\n    r = frac_end / frac0\n    return J0 * frac0 * (r ** (k / max(n_steps - 1, 1)))\n\n\ndef sa_tau(k, n_steps, tau0=1.5, tau_end=0.5):\n    \"\"\"Boundary-sharpness schedule for the annealing: soft Voronoi blending\n    (differentiable, forgiving) early, near-hard boundaries late, so the\n    final search no longer pays the soft-model misfit floor.\"\"\"\n    r = tau_end / tau0\n    return tau0 * (r ** (k / max(n_steps - 1, 1)))\n"},
      },
      document.getElementById("root"),
    );
  </script>
